<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nova Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ═══════════════════════════════════════════════════════════════
   DESIGN TOKENS
   ═══════════════════════════════════════════════════════════════ */
      :root {
        /* Brand */
        --port-gore: #202058;
        --blue-violet: #5a54bd;
        --downy-teal: #6bb3cd;

        /* Surfaces */
        --bg-root: #09090b;
        --bg-sidebar: #0c0c14;
        --bg-topbar: rgba(12, 12, 20, 0.82);
        --bg-content: #09090b;
        --bg-card: rgba(22, 22, 36, 0.65);
        --bg-card-hover: rgba(32, 32, 56, 0.7);
        --bg-drawer: rgba(12, 12, 22, 0.96);
        --bg-input: rgba(255, 255, 255, 0.04);
        --bg-input-focus: rgba(255, 255, 255, 0.07);

        /* Borders */
        --border-subtle: rgba(255, 255, 255, 0.06);
        --border-active: rgba(90, 84, 189, 0.5);
        --border-card: rgba(255, 255, 255, 0.08);

        /* Text */
        --text-primary: #e4e4e7;
        --text-secondary: #a1a1aa;
        --text-tertiary: #71717a;
        --text-accent: #8b85e0;
        --text-teal: #6bb3cd;

        /* Accent */
        --accent: #5a54bd;
        --accent-light: #7b75d4;
        --accent-glow: rgba(90, 84, 189, 0.15);
        --teal: #6bb3cd;
        --teal-glow: rgba(107, 179, 205, 0.12);

        /* Layout */
        --sidebar-w: 252px;
        --sidebar-collapsed-w: 64px;
        --topbar-h: 56px;
        --drawer-w: 384px;

        /* Radius */
        --radius-sm: 6px;
        --radius-md: 10px;
        --radius-lg: 14px;
        --radius-xl: 20px;

        /* Transitions */
        --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
        --transition-base: 200ms cubic-bezier(0.4, 0, 0.2, 1);
        --transition-slow: 350ms cubic-bezier(0.4, 0, 0.2, 1);

        /* Shadows */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 30px rgba(90, 84, 189, 0.15);
      }

      /* ═══════════════════════════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════════════════════════ */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        font-size: 14px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: var(--bg-root);
        color: var(--text-primary);
        overflow: hidden;
        height: 100vh;
        width: 100vw;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          transition-duration: 0.01ms !important;
        }
      }

      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.18);
      }

      /* ═══════════════════════════════════════════════════════════════
   LAYOUT SHELL
   ═══════════════════════════════════════════════════════════════ */
      .platform-shell {
        display: grid;
        grid-template-columns: var(--sidebar-w) 1fr;
        grid-template-rows: var(--topbar-h) 1fr;
        grid-template-areas:
          "sidebar topbar"
          "sidebar content";
        height: 100vh;
        width: 100vw;
        transition: grid-template-columns var(--transition-slow);
      }

      .platform-shell.sidebar-collapsed {
        grid-template-columns: var(--sidebar-collapsed-w) 1fr;
      }

      .platform-shell.sidebar-hidden {
        grid-template-columns: 0 1fr;
      }

      /* ═══════════════════════════════════════════════════════════════
   TOPBAR
   ═══════════════════════════════════════════════════════════════ */
      .topbar {
        grid-area: topbar;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 20px;
        background: var(--bg-topbar);
        backdrop-filter: blur(16px) saturate(1.5);
        -webkit-backdrop-filter: blur(16px) saturate(1.5);
        border-bottom: 1px solid var(--border-subtle);
        z-index: 100;
        height: var(--topbar-h);
      }

      .topbar-hamburger {
        display: none;
        background: none;
        border: none;
        color: var(--text-secondary);
        cursor: pointer;
        padding: 6px;
        border-radius: var(--radius-sm);
        transition: background var(--transition-fast);
      }
      .topbar-hamburger:hover {
        background: rgba(255, 255, 255, 0.06);
      }
      .topbar-hamburger svg {
        width: 20px;
        height: 20px;
      }

      .topbar-context {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 14px;
        background: var(--bg-input);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        cursor: pointer;
        transition: all var(--transition-fast);
        max-width: 320px;
        flex-shrink: 1;
        min-width: 0;
      }
      .topbar-context:hover {
        background: var(--bg-input-focus);
        border-color: var(--border-active);
      }
      .topbar-context-icon {
        color: var(--text-teal);
        flex-shrink: 0;
      }
      .topbar-context-icon svg {
        width: 16px;
        height: 16px;
      }
      .topbar-context-label {
        font-size: 13px;
        font-weight: 500;
        color: var(--text-secondary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .topbar-context-name {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-primary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .topbar-spacer {
        flex: 1;
      }

      .topbar-search {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 14px;
        background: var(--bg-input);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        cursor: pointer;
        transition: all var(--transition-fast);
        min-width: 200px;
      }
      .topbar-search:hover {
        background: var(--bg-input-focus);
        border-color: var(--border-active);
      }
      .topbar-search svg {
        width: 15px;
        height: 15px;
        color: var(--text-tertiary);
        flex-shrink: 0;
      }
      .topbar-search-text {
        font-size: 13px;
        color: var(--text-tertiary);
      }
      .topbar-search-kbd {
        font-size: 11px;
        font-weight: 500;
        color: var(--text-tertiary);
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid var(--border-subtle);
        border-radius: 4px;
        padding: 1px 6px;
        margin-left: auto;
        font-family: "Inter", monospace;
      }

      .topbar-actions {
        display: flex;
        align-items: center;
        gap: 2px;
      }

      .topbar-btn {
        background: none;
        border: none;
        color: var(--text-secondary);
        cursor: pointer;
        padding: 7px;
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        position: relative;
      }
      .topbar-btn:hover {
        background: rgba(255, 255, 255, 0.06);
        color: var(--text-primary);
      }
      .topbar-btn svg {
        width: 18px;
        height: 18px;
      }

      .topbar-avatar {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent), var(--teal));
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        color: #fff;
        cursor: pointer;
        transition: box-shadow var(--transition-fast);
        margin-left: 4px;
      }
      .topbar-avatar:hover {
        box-shadow:
          0 0 0 2px var(--accent-glow),
          var(--shadow-glow);
      }

      /* ═══════════════════════════════════════════════════════════════
   SIDEBAR
   ═══════════════════════════════════════════════════════════════ */
      .sidebar {
        grid-area: sidebar;
        display: flex;
        flex-direction: column;
        background: var(--bg-sidebar);
        border-right: 1px solid var(--border-subtle);
        overflow: hidden;
        z-index: 200;
        transition: width var(--transition-slow);
        width: var(--sidebar-w);
      }

      .sidebar-collapsed .sidebar {
        width: var(--sidebar-collapsed-w);
      }
      .sidebar-hidden .sidebar {
        width: 0;
        border-right: none;
      }

      /* Logo area */
      .sidebar-logo {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 16px;
        height: var(--topbar-h);
        border-bottom: 1px solid var(--border-subtle);
        flex-shrink: 0;
        cursor: pointer;
      }
      .sidebar-logo-mark {
        width: 28px;
        height: 28px;
        background: linear-gradient(135deg, var(--accent) 0%, var(--teal) 100%);
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        font-size: 14px;
        color: #fff;
        flex-shrink: 0;
        letter-spacing: -0.5px;
      }
      .sidebar-logo-text {
        font-size: 15px;
        font-weight: 700;
        color: var(--text-primary);
        letter-spacing: -0.3px;
        white-space: nowrap;
        overflow: hidden;
      }
      .sidebar-collapsed .sidebar-logo-text {
        opacity: 0;
        width: 0;
      }

      .sidebar-toggle {
        margin-left: auto;
        background: none;
        border: none;
        color: var(--text-tertiary);
        cursor: pointer;
        padding: 4px;
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        flex-shrink: 0;
      }
      .sidebar-toggle:hover {
        color: var(--text-secondary);
        background: rgba(255, 255, 255, 0.05);
      }
      .sidebar-toggle svg {
        width: 16px;
        height: 16px;
        transition: transform var(--transition-base);
      }
      .sidebar-collapsed .sidebar-toggle svg {
        transform: rotate(180deg);
      }
      .sidebar-collapsed .sidebar-toggle {
        margin-left: 0;
        margin: 0 auto;
      }

      /* Nav */
      .sidebar-nav {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 8px 0;
      }

      .sidebar-group {
        margin-bottom: 2px;
      }

      .sidebar-group-header {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 16px;
        font-size: 10.5px;
        font-weight: 700;
        color: var(--text-tertiary);
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        user-select: none;
        transition: color var(--transition-fast);
        white-space: nowrap;
      }
      .sidebar-group-header:hover {
        color: var(--text-secondary);
      }
      .sidebar-collapsed .sidebar-group-header {
        justify-content: center;
        padding: 6px 0;
        font-size: 0;
      }
      .sidebar-group-header .group-caret {
        width: 12px;
        height: 12px;
        transition: transform var(--transition-fast);
        flex-shrink: 0;
      }
      .sidebar-group.collapsed .group-caret {
        transform: rotate(-90deg);
      }
      .sidebar-group.collapsed .sidebar-group-items {
        display: none;
      }
      .sidebar-collapsed .group-caret {
        display: none;
      }

      .sidebar-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 7px 16px 7px 20px;
        cursor: pointer;
        color: var(--text-secondary);
        text-decoration: none;
        transition: all var(--transition-fast);
        position: relative;
        border-left: 3px solid transparent;
        white-space: nowrap;
        min-height: 36px;
      }
      .sidebar-item:hover {
        color: var(--text-primary);
        background: rgba(255, 255, 255, 0.03);
      }
      .sidebar-item.active {
        color: var(--text-primary);
        background: var(--accent-glow);
        border-left-color: var(--accent);
      }
      .sidebar-item-icon {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
        opacity: 0.7;
      }
      .sidebar-item.active .sidebar-item-icon {
        opacity: 1;
      }
      .sidebar-item-label {
        font-size: 13px;
        font-weight: 500;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .sidebar-collapsed .sidebar-item {
        justify-content: center;
        padding: 9px 0;
        border-left-width: 0;
        border-radius: 0;
      }
      .sidebar-collapsed .sidebar-item.active {
        background: var(--accent-glow);
        border-left: 3px solid var(--accent);
      }
      .sidebar-collapsed .sidebar-item-label {
        display: none;
      }

      /* Tooltip for collapsed sidebar */
      .sidebar-collapsed .sidebar-item {
        position: relative;
      }
      .sidebar-collapsed .sidebar-item::after {
        content: attr(data-tooltip);
        position: absolute;
        left: calc(100% + 10px);
        top: 50%;
        transform: translateY(-50%);
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        color: var(--text-primary);
        font-size: 12px;
        font-weight: 500;
        padding: 5px 10px;
        border-radius: var(--radius-sm);
        white-space: nowrap;
        pointer-events: none;
        opacity: 0;
        transition: opacity var(--transition-fast);
        z-index: 1000;
        box-shadow: var(--shadow-md);
      }
      .sidebar-collapsed .sidebar-item:hover::after {
        opacity: 1;
      }

      /* Sidebar footer */
      .sidebar-footer {
        padding: 12px 16px;
        border-top: 1px solid var(--border-subtle);
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
      }
      .sidebar-footer-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent), var(--teal));
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        color: #fff;
        flex-shrink: 0;
      }
      .sidebar-footer-info {
        overflow: hidden;
      }
      .sidebar-footer-name {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-primary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .sidebar-footer-role {
        font-size: 11px;
        color: var(--text-tertiary);
        white-space: nowrap;
      }
      .sidebar-collapsed .sidebar-footer-info {
        display: none;
      }
      .sidebar-collapsed .sidebar-footer {
        justify-content: center;
        padding: 12px 0;
      }

      /* Sidebar divider */
      .sidebar-divider {
        height: 1px;
        background: var(--border-subtle);
        margin: 6px 16px;
      }
      .sidebar-collapsed .sidebar-divider {
        margin: 6px 8px;
      }

      /* ═══════════════════════════════════════════════════════════════
   MAIN CONTENT AREA
   ═══════════════════════════════════════════════════════════════ */
      .content-area {
        grid-area: content;
        overflow: hidden;
        position: relative;
        background: var(--bg-content);
      }

      #module-frame {
        width: 100%;
        height: 100%;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 0;
        position: relative;
      }

      /* Fragment loading state */
      #module-frame.loading {
        opacity: 0.4;
        pointer-events: none;
        transition: opacity var(--transition-fast);
      }

      .module-loading-bar {
        position: absolute;
        top: 0;
        left: 0;
        height: 2px;
        background: linear-gradient(90deg, var(--accent), var(--teal));
        z-index: 50;
        transition: width 400ms ease;
        border-radius: 0 1px 1px 0;
      }

      /* ═══════════════════════════════════════════════════════════════
   NOVA AI FAB + DRAWER
   ═══════════════════════════════════════════════════════════════ */
      .nova-fab {
        position: fixed;
        bottom: 24px;
        right: 24px;
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent), var(--teal));
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 500;
        box-shadow:
          var(--shadow-lg),
          0 0 30px rgba(90, 84, 189, 0.3);
        transition: all var(--transition-base);
      }
      .nova-fab:hover {
        transform: scale(1.06);
        box-shadow:
          var(--shadow-lg),
          0 0 45px rgba(90, 84, 189, 0.45);
      }
      .nova-fab svg {
        width: 24px;
        height: 24px;
        color: #fff;
      }
      .nova-fab.hidden {
        display: none;
      }

      .nova-drawer {
        position: fixed;
        top: 0;
        right: -400px;
        width: var(--drawer-w);
        height: 100vh;
        background: var(--bg-drawer);
        backdrop-filter: blur(24px) saturate(1.5);
        -webkit-backdrop-filter: blur(24px) saturate(1.5);
        border-left: 1px solid var(--border-subtle);
        z-index: 600;
        display: flex;
        flex-direction: column;
        transition: right var(--transition-slow);
        box-shadow: -8px 0 40px rgba(0, 0, 0, 0.4);
      }
      .nova-drawer.open {
        right: 0;
      }

      .nova-drawer-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 18px;
        border-bottom: 1px solid var(--border-subtle);
        flex-shrink: 0;
      }
      .nova-drawer-title {
        font-size: 15px;
        font-weight: 700;
        background: linear-gradient(135deg, var(--accent-light), var(--teal));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .nova-drawer-context {
        font-size: 11px;
        color: var(--text-tertiary);
        background: var(--bg-input);
        padding: 2px 8px;
        border-radius: 100px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 160px;
      }
      .nova-drawer-close {
        margin-left: auto;
        background: none;
        border: none;
        color: var(--text-tertiary);
        cursor: pointer;
        padding: 4px;
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
      }
      .nova-drawer-close:hover {
        color: var(--text-primary);
        background: rgba(255, 255, 255, 0.06);
      }
      .nova-drawer-close svg {
        width: 18px;
        height: 18px;
      }

      .nova-drawer-messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px 18px;
      }

      .nova-drawer-welcome {
        text-align: center;
        padding: 40px 20px;
      }
      .nova-drawer-welcome-icon {
        width: 48px;
        height: 48px;
        margin: 0 auto 16px;
        background: linear-gradient(135deg, var(--accent), var(--teal));
        border-radius: var(--radius-lg);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .nova-drawer-welcome-icon svg {
        width: 24px;
        height: 24px;
        color: #fff;
      }
      .nova-drawer-welcome h3 {
        font-size: 16px;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 6px;
      }
      .nova-drawer-welcome p {
        font-size: 13px;
        color: var(--text-tertiary);
        line-height: 1.5;
      }

      .nova-drawer-suggestions {
        padding: 8px 18px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        border-top: 1px solid var(--border-subtle);
        flex-shrink: 0;
      }
      .nova-suggestion-chip {
        font-size: 12px;
        font-weight: 500;
        color: var(--text-accent);
        background: var(--accent-glow);
        border: 1px solid rgba(90, 84, 189, 0.2);
        border-radius: 100px;
        padding: 5px 12px;
        cursor: pointer;
        transition: all var(--transition-fast);
        white-space: nowrap;
      }
      .nova-suggestion-chip:hover {
        background: rgba(90, 84, 189, 0.25);
        border-color: rgba(90, 84, 189, 0.4);
      }

      .nova-drawer-input {
        display: flex;
        align-items: flex-end;
        gap: 8px;
        padding: 12px 18px;
        border-top: 1px solid var(--border-subtle);
        flex-shrink: 0;
      }
      .nova-input-field {
        flex: 1;
        background: var(--bg-input);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        color: var(--text-primary);
        font-family: "Inter", sans-serif;
        font-size: 13px;
        padding: 10px 14px;
        resize: none;
        min-height: 40px;
        max-height: 120px;
        outline: none;
        transition: border-color var(--transition-fast);
      }
      .nova-input-field::placeholder {
        color: var(--text-tertiary);
      }
      .nova-input-field:focus {
        border-color: var(--border-active);
      }

      .nova-send-btn {
        background: linear-gradient(135deg, var(--accent), var(--teal));
        border: none;
        border-radius: var(--radius-md);
        color: #fff;
        cursor: pointer;
        padding: 9px 12px;
        transition: all var(--transition-fast);
        flex-shrink: 0;
      }
      .nova-send-btn:hover {
        opacity: 0.9;
        transform: scale(1.03);
      }
      .nova-send-btn svg {
        width: 18px;
        height: 18px;
      }

      /* Nova drawer overlay for mobile */
      .nova-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 550;
        opacity: 0;
        pointer-events: none;
        transition: opacity var(--transition-base);
      }
      .nova-overlay.visible {
        opacity: 1;
        pointer-events: auto;
      }

      /* ═══════════════════════════════════════════════════════════════
   COMMAND PALETTE (Cmd+K)
   ═══════════════════════════════════════════════════════════════ */
      .cmd-palette-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        z-index: 900;
        display: none;
        align-items: flex-start;
        justify-content: center;
        padding-top: 18vh;
      }
      .cmd-palette-overlay.open {
        display: flex;
      }

      .cmd-palette {
        width: 520px;
        max-width: 92vw;
        background: var(--bg-sidebar);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        box-shadow:
          var(--shadow-lg),
          0 0 60px rgba(90, 84, 189, 0.15);
        overflow: hidden;
      }

      .cmd-palette-input-wrap {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 18px;
        border-bottom: 1px solid var(--border-subtle);
      }
      .cmd-palette-input-wrap svg {
        width: 18px;
        height: 18px;
        color: var(--text-tertiary);
        flex-shrink: 0;
      }
      .cmd-palette-input {
        flex: 1;
        background: none;
        border: none;
        color: var(--text-primary);
        font-family: "Inter", sans-serif;
        font-size: 15px;
        outline: none;
      }
      .cmd-palette-input::placeholder {
        color: var(--text-tertiary);
      }

      .cmd-palette-results {
        max-height: 360px;
        overflow-y: auto;
        padding: 6px 0;
      }

      .cmd-palette-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 18px;
        cursor: pointer;
        transition: background var(--transition-fast);
      }
      .cmd-palette-item:hover,
      .cmd-palette-item.selected {
        background: rgba(255, 255, 255, 0.04);
      }
      .cmd-palette-item.selected {
        background: var(--accent-glow);
      }
      .cmd-palette-item-icon {
        width: 32px;
        height: 32px;
        border-radius: var(--radius-sm);
        background: var(--bg-input);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .cmd-palette-item-icon svg {
        width: 16px;
        height: 16px;
        color: var(--text-secondary);
      }
      .cmd-palette-item-text {
        flex: 1;
        min-width: 0;
      }
      .cmd-palette-item-title {
        font-size: 13px;
        font-weight: 500;
        color: var(--text-primary);
      }
      .cmd-palette-item-desc {
        font-size: 11px;
        color: var(--text-tertiary);
        margin-top: 1px;
      }
      .cmd-palette-item-kbd {
        font-size: 11px;
        color: var(--text-tertiary);
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border-subtle);
        border-radius: 4px;
        padding: 2px 6px;
      }

      .cmd-palette-footer {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 10px 18px;
        border-top: 1px solid var(--border-subtle);
        font-size: 11px;
        color: var(--text-tertiary);
      }
      .cmd-palette-footer kbd {
        font-family: "Inter", monospace;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid var(--border-subtle);
        border-radius: 3px;
        padding: 1px 5px;
        font-size: 10px;
      }

      /* ═══════════════════════════════════════════════════════════════
   DASHBOARD HOME
   ═══════════════════════════════════════════════════════════════ */
      .dashboard-home {
        padding: 40px 48px;
        max-width: 1200px;
        margin: 0 auto;
      }

      .dashboard-hero {
        margin-bottom: 40px;
      }
      .dashboard-hero h1 {
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -0.5px;
        background: linear-gradient(
          135deg,
          var(--text-primary) 0%,
          var(--text-secondary) 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 6px;
      }
      .dashboard-hero p {
        font-size: 15px;
        color: var(--text-tertiary);
        line-height: 1.5;
      }

      .dashboard-quick-actions {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 12px;
        margin-bottom: 48px;
      }

      .quick-action-card {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 16px 18px;
        background: var(--bg-card);
        border: 1px solid var(--border-card);
        border-radius: var(--radius-md);
        cursor: pointer;
        transition: all var(--transition-base);
      }
      .quick-action-card:hover {
        background: var(--bg-card-hover);
        border-color: var(--border-active);
        transform: translateY(-1px);
        box-shadow: var(--shadow-md);
      }
      .quick-action-icon {
        width: 40px;
        height: 40px;
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .quick-action-icon svg {
        width: 20px;
        height: 20px;
      }
      .quick-action-text h3 {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-primary);
      }
      .quick-action-text p {
        font-size: 11px;
        color: var(--text-tertiary);
        margin-top: 2px;
      }

      .dashboard-section-title {
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: var(--text-tertiary);
        margin-bottom: 16px;
      }

      .dashboard-modules-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 12px;
        margin-bottom: 48px;
      }

      .module-card {
        padding: 20px;
        background: var(--bg-card);
        border: 1px solid var(--border-card);
        border-radius: var(--radius-md);
        cursor: pointer;
        transition: all var(--transition-base);
        position: relative;
        overflow: hidden;
      }
      .module-card:hover {
        background: var(--bg-card-hover);
        border-color: var(--border-active);
        transform: translateY(-1px);
        box-shadow: var(--shadow-md);
      }
      .module-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(90deg, var(--accent), var(--teal));
        opacity: 0;
        transition: opacity var(--transition-fast);
      }
      .module-card:hover::before {
        opacity: 1;
      }

      .module-card-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 10px;
      }
      .module-card-icon {
        width: 36px;
        height: 36px;
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .module-card-icon svg {
        width: 18px;
        height: 18px;
      }
      .module-card-group {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        padding: 2px 7px;
        border-radius: 100px;
        background: var(--bg-input);
      }
      .module-card h3 {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-primary);
        margin-bottom: 4px;
      }
      .module-card p {
        font-size: 12px;
        color: var(--text-tertiary);
        line-height: 1.45;
      }

      /* Group colors */
      .group-plan {
        background: rgba(90, 84, 189, 0.12);
        color: var(--accent-light);
      }
      .group-plan svg {
        color: var(--accent-light);
      }
      .group-intel {
        background: rgba(107, 179, 205, 0.12);
        color: var(--teal);
      }
      .group-intel svg {
        color: var(--teal);
      }
      .group-optimize {
        background: rgba(251, 191, 36, 0.1);
        color: #fbbf24;
      }
      .group-optimize svg {
        color: #fbbf24;
      }
      .group-talent {
        background: rgba(168, 85, 247, 0.1);
        color: #a855f7;
      }
      .group-talent svg {
        color: #a855f7;
      }
      .group-comply {
        background: rgba(34, 197, 94, 0.1);
        color: #22c55e;
      }
      .group-comply svg {
        color: #22c55e;
      }

      /* ═══════════════════════════════════════════════════════════════
   AURORA BACKGROUND EFFECT
   ═══════════════════════════════════════════════════════════════ */
      .aurora-bg {
        position: fixed;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        pointer-events: none;
        z-index: 0;
        opacity: 0.3;
        background:
          radial-gradient(
            ellipse at 20% 20%,
            rgba(90, 84, 189, 0.08) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse at 80% 80%,
            rgba(107, 179, 205, 0.06) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse at 50% 50%,
            rgba(32, 32, 88, 0.05) 0%,
            transparent 70%
          );
        animation: aurora-drift 30s ease-in-out infinite alternate;
      }

      @keyframes aurora-drift {
        0% {
          transform: translate(0, 0) rotate(0deg);
        }
        50% {
          transform: translate(-3%, 2%) rotate(1deg);
        }
        100% {
          transform: translate(2%, -2%) rotate(-1deg);
        }
      }

      /* ═══════════════════════════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════════════════════════ */

      /* Laptop: collapse sidebar */
      @media (max-width: 1280px) {
        .platform-shell:not(.sidebar-expanded) {
          grid-template-columns: var(--sidebar-collapsed-w) 1fr;
        }
        .platform-shell:not(.sidebar-expanded) .sidebar {
          width: var(--sidebar-collapsed-w);
        }
        .platform-shell:not(.sidebar-expanded) .sidebar-logo-text,
        .platform-shell:not(.sidebar-expanded) .sidebar-item-label,
        .platform-shell:not(.sidebar-expanded) .sidebar-group-header,
        .platform-shell:not(.sidebar-expanded) .sidebar-footer-info {
          display: none;
        }
        .platform-shell:not(.sidebar-expanded) .sidebar-item {
          justify-content: center;
          padding: 9px 0;
        }
        .platform-shell:not(.sidebar-expanded) .sidebar-footer {
          justify-content: center;
          padding: 12px 0;
        }
      }

      /* Tablet: hide sidebar, show hamburger */
      @media (max-width: 1024px) {
        .platform-shell {
          grid-template-columns: 0 1fr !important;
        }
        .sidebar {
          position: fixed;
          top: 0;
          left: -260px;
          width: var(--sidebar-w) !important;
          height: 100vh;
          z-index: 700;
          transition: left var(--transition-slow);
        }
        .sidebar.mobile-open {
          left: 0;
        }
        .topbar-hamburger {
          display: flex;
        }
        .topbar-search {
          min-width: 140px;
        }
        .topbar-search-text {
          display: none;
        }
        .nova-drawer {
          width: 100vw;
          right: -100vw;
        }
        .nova-drawer.open {
          right: 0;
        }
        .dashboard-home {
          padding: 24px 20px;
        }
      }

      /* Mobile */
      @media (max-width: 768px) {
        .topbar-context {
          display: none;
        }
        .topbar-search {
          min-width: 0;
          flex: 1;
        }
        .dashboard-home {
          padding: 20px 16px;
        }
        .dashboard-hero h1 {
          font-size: 22px;
        }
        .dashboard-quick-actions {
          grid-template-columns: 1fr 1fr;
        }
        .dashboard-modules-grid {
          grid-template-columns: 1fr;
        }
      }

      /* Sidebar mobile overlay */
      .sidebar-mobile-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 650;
        opacity: 0;
        pointer-events: none;
        transition: opacity var(--transition-base);
      }
      .sidebar-mobile-overlay.visible {
        opacity: 1;
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <div class="aurora-bg" aria-hidden="true"></div>

    <!-- ════════════════════════ PLATFORM SHELL ════════════════════════ -->
    <div class="platform-shell" id="platform-shell">
      <!-- ── SIDEBAR ── -->
      <aside
        class="sidebar"
        id="sidebar"
        role="navigation"
        aria-label="Main navigation"
      >
        <!-- Logo -->
        <div
          class="sidebar-logo"
          onclick="NovaRouter.navigate('')"
          title="Nova Platform Home"
        >
          <div class="sidebar-logo-mark">N</div>
          <span class="sidebar-logo-text">Nova Platform</span>
          <button
            class="sidebar-toggle"
            onclick="
              event.stopPropagation();
              NovaSidebar.toggle();
            "
            aria-label="Toggle sidebar"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M15 18l-6-6 6-6" />
            </svg>
          </button>
        </div>

        <!-- Navigation -->
        <nav class="sidebar-nav" id="sidebar-nav"></nav>

        <!-- Divider + utilities -->
        <div class="sidebar-divider"></div>
        <div style="padding: 2px 0 6px">
          <a
            class="sidebar-item"
            data-route="api-portal"
            data-tooltip="API Portal"
            onclick="NovaRouter.navigate('api-portal')"
          >
            <svg
              class="sidebar-item-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M4 17l6-6-6-6" />
              <path d="M12 19h8" />
            </svg>
            <span class="sidebar-item-label">API Portal</span>
          </a>
        </div>

        <!-- Footer -->
        <div class="sidebar-footer">
          <div class="sidebar-footer-avatar">SC</div>
          <div class="sidebar-footer-info">
            <div class="sidebar-footer-name">Shubham Singh Chandel</div>
            <div class="sidebar-footer-role">CHO @ Joveo</div>
          </div>
        </div>
      </aside>

      <!-- ── TOPBAR ── -->
      <header class="topbar" role="banner">
        <button
          class="topbar-hamburger"
          onclick="NovaSidebar.toggleMobile()"
          aria-label="Open navigation"
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          >
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>

        <!-- Campaign context -->
        <div
          class="topbar-context"
          id="topbar-context"
          onclick="NovaCampaignPicker.open()"
        >
          <span class="topbar-context-icon">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
            </svg>
          </span>
          <span class="topbar-context-label">Campaign:</span>
          <span class="topbar-context-name" id="topbar-campaign-name"
            >No campaign selected</span
          >
        </div>

        <div class="topbar-spacer"></div>

        <!-- Search trigger -->
        <div
          class="topbar-search"
          onclick="NovaCmdPalette.open()"
          role="button"
          tabindex="0"
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <span class="topbar-search-text">Search modules...</span>
          <span class="topbar-search-kbd" aria-hidden="true">&#8984;K</span>
        </div>

        <!-- Right actions -->
        <div class="topbar-actions">
          <button
            class="topbar-btn"
            title="Nova AI (&#8984;/)"
            onclick="NovaDrawer.toggle()"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M12 2a7 7 0 0 1 7 7c0 3-2 5.5-4 7l-1 4h-4l-1-4c-2-1.5-4-4-4-7a7 7 0 0 1 7-7z"
              />
              <line x1="10" y1="22" x2="14" y2="22" />
            </svg>
          </button>
          <button
            class="topbar-btn"
            title="Help"
            onclick="
              window.open('https://www.linkedin.com/in/chandel13/', '_blank')
            "
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="10" />
              <path d="M9 9a3 3 0 1 1 3.5 2.9c-.5.3-1 .8-1 1.6V15" />
              <circle cx="12" cy="18" r="0.5" fill="currentColor" />
            </svg>
          </button>
        </div>

        <div class="topbar-avatar" title="Shubham Singh Chandel">SC</div>
      </header>

      <!-- ── CONTENT AREA ── -->
      <main class="content-area">
        <div
          class="module-loading-bar"
          id="loading-bar"
          style="width: 0%"
        ></div>
        <div id="module-frame" role="main"></div>
      </main>
    </div>

    <!-- ── SIDEBAR MOBILE OVERLAY ── -->
    <div
      class="sidebar-mobile-overlay"
      id="sidebar-overlay"
      onclick="NovaSidebar.closeMobile()"
    ></div>

    <!-- ── NOVA AI FAB ── -->
    <button
      class="nova-fab"
      id="nova-fab"
      onclick="NovaDrawer.open()"
      title="Nova AI (&#8984;/)"
    >
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path
          d="M12 2a7 7 0 0 1 7 7c0 3-2 5.5-4 7l-1 4h-4l-1-4c-2-1.5-4-4-4-7a7 7 0 0 1 7-7z"
        />
        <line x1="10" y1="22" x2="14" y2="22" />
      </svg>
    </button>

    <!-- ── NOVA AI DRAWER ── -->
    <div
      class="nova-overlay"
      id="nova-overlay"
      onclick="NovaDrawer.close()"
    ></div>
    <aside
      class="nova-drawer"
      id="nova-drawer"
      role="complementary"
      aria-label="Nova AI Assistant"
    >
      <div class="nova-drawer-header">
        <div class="nova-drawer-title">Nova AI</div>
        <div class="nova-drawer-context" id="nova-drawer-context">
          Dashboard
        </div>
        <button
          class="nova-drawer-close"
          onclick="NovaDrawer.close()"
          aria-label="Close Nova AI"
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <div class="nova-drawer-messages" id="nova-messages">
        <div class="nova-drawer-welcome">
          <div class="nova-drawer-welcome-icon">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M12 2a7 7 0 0 1 7 7c0 3-2 5.5-4 7l-1 4h-4l-1-4c-2-1.5-4-4-4-7a7 7 0 0 1 7-7z"
              />
              <line x1="10" y1="22" x2="14" y2="22" />
            </svg>
          </div>
          <h3>Hey, I'm Nova</h3>
          <p>
            Your AI assistant for recruitment intelligence. I know your active
            campaign and can help across all modules.
          </p>
        </div>
      </div>
      <div class="nova-drawer-suggestions" id="nova-suggestions">
        <button
          class="nova-suggestion-chip"
          onclick="NovaDrawer.sendSuggestion('Start new campaign')"
        >
          Start new campaign
        </button>
        <button
          class="nova-suggestion-chip"
          onclick="NovaDrawer.sendSuggestion('What\'s trending in hiring?')"
        >
          What's trending?
        </button>
        <button
          class="nova-suggestion-chip"
          onclick="NovaDrawer.sendSuggestion('Show platform overview')"
        >
          Platform overview
        </button>
      </div>
      <div class="nova-drawer-input">
        <textarea
          class="nova-input-field"
          id="nova-input"
          placeholder="Ask Nova anything..."
          rows="1"
          onkeydown="NovaDrawer.handleKey(event)"
        ></textarea>
        <button
          class="nova-send-btn"
          onclick="NovaDrawer.send()"
          aria-label="Send"
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="22" y1="2" x2="11" y2="13" />
            <polygon points="22 2 15 22 11 13 2 9 22 2" />
          </svg>
        </button>
      </div>
    </aside>

    <!-- ── COMMAND PALETTE ── -->
    <div
      class="cmd-palette-overlay"

      const GROUPS = [
        { id: "plan", label: "Plan", icon: "campaign" },

      /* ─────────────────────────────────────────────────────────────
   NOVA CONTEXT (shared state singleton)
   ───────────────────────────────────────────────────────────── */
      const NovaContext = (() => {
        const STORAGE_KEY = "nova_context_v1";
        const _listeners = {};
        let _debounceTimer = null;

        const state = {
          campaign: {
            id: null,
            name: "",
            client: "",
            budget: 0,
            currency: "USD",
            startDate: null,
            endDate: null,
            targetRoles: [],
            targetLocations: [],
            channels: [],
            industry: "",
            notes: "",
          },
          user: {
            name: "Shubham Singh Chandel",
            email: "shubhamsingh@Joveo.com",
            role: "admin",
            org: "Joveo",
          },
          nav: {
            activeGroup: "",
            activeModule: "",
            activeTab: "",
            previousModule: "",
            history: [],
          },
          shared: {
            lastPlanOutput: null,
            lastAuditResult: null,
            lastCompetitiveData: null,
            lastMarketSnapshot: null,
            selectedVendors: [],
            talentSignals: null,
          },
        };

        function _persistDebounced() {
          if (_debounceTimer) clearTimeout(_debounceTimer);
          _debounceTimer = setTimeout(() => {
            try {
              localStorage.setItem(
                STORAGE_KEY,
                JSON.stringify({
                  campaign: state.campaign,
                  user: state.user,
                  shared: state.shared,
                  _ts: Date.now(),
                }),
              );
            } catch (e) {
              /* localStorage full or unavailable */
            }
          }, 500);
        }

        function _loadFromLocal() {
          try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return false;
            const saved = JSON.parse(raw);
            // Check staleness (24h)
            if (Date.now() - (saved._ts || 0) > 86400000) return false;
            if (saved.campaign) Object.assign(state.campaign, saved.campaign);
            if (saved.user) Object.assign(state.user, saved.user);
            if (saved.shared) Object.assign(state.shared, saved.shared);
            return true;
          } catch (e) {
            return false;
          }
        }

        return {
          get campaign() {
            return state.campaign;
          },
          get user() {
            return state.user;
          },
          get nav() {
            return state.nav;
          },
          get shared() {
            return state.shared;
          },

          setCampaign(fields) {
            Object.assign(state.campaign, fields);
            _persistDebounced();
            this.emit("campaign:updated", state.campaign);
            _updateCampaignUI();
          },

          getCampaign() {
            return { ...state.campaign };
          },

          clearCampaign() {
            Object.keys(state.campaign).forEach((k) => {
              state.campaign[k] = Array.isArray(state.campaign[k])
                ? []
                : typeof state.campaign[k] === "number"
                  ? 0
                  : state.campaign[k] === null
                    ? null
                    : "";
            });
            state.campaign.currency = "USD";
            _persistDebounced();
            this.emit("campaign:updated", state.campaign);
            _updateCampaignUI();
          },

          setNav(fields) {
            if (
              state.nav.activeModule &&
              fields.activeModule &&
              fields.activeModule !== state.nav.activeModule
            ) {
              state.nav.previousModule = state.nav.activeModule;
            }
            Object.assign(state.nav, fields);
          },

          setShared(key, value) {
            state.shared[key] = value;
            _persistDebounced();
          },

          // PubSub
          subscribe(event, callback) {
            if (!_listeners[event]) _listeners[event] = [];
            _listeners[event].push(callback);
            return () => {
              _listeners[event] = _listeners[event].filter(
                (cb) => cb !== callback,
              );
            };
          },

          emit(event, data) {
            const cbs = _listeners[event] || [];
            cbs.forEach((cb) => {
              try {
                cb(data);
              } catch (e) {
                console.error(
                  `[NovaContext] Event handler error for "${event}":`,
                  e,
                );
              }
            });
          },

          init() {
            _loadFromLocal();
            _updateCampaignUI();
          },
        };
      })();

      function _updateCampaignUI() {
        const el = document.getElementById("topbar-campaign-name");
        if (el) {
          const name = NovaContext.campaign.name || NovaContext.campaign.client;
          el.textContent = name || "No campaign selected";
        }
      }

      /* ─────────────────────────────────────────────────────────────
   SIDEBAR BUILDER + CONTROLLER
   ───────────────────────────────────────────────────────────── */
      const NovaSidebar = (() => {
        let _collapsed = false;

        function build() {
          const nav = document.getElementById("sidebar-nav");
          let html = "";
          GROUPS.forEach((group) => {
            const groupModules = MODULES.filter((m) => m.group === group.id);
            html += `<div class="sidebar-group" data-group="${group.id}">`;
            html += `<div class="sidebar-group-header" onclick="NovaSidebar.toggleGroup('${group.id}')">`;
            html += `<svg class="group-caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`;
            html += `<span>${group.label.toUpperCase()}</span>`;
            html += `</div>`;
            html += `<div class="sidebar-group-items">`;
            groupModules.forEach((mod) => {
              html += `<a class="sidebar-item" data-route="${mod.route}" data-tooltip="${mod.label}" onclick="NovaRouter.navigate('${mod.route}')">`;
              html += `<span class="sidebar-item-icon">${ICONS[mod.icon] || ""}</span>`;
              html += `<span class="sidebar-item-label">${mod.label}</span>`;
              html += `</a>`;
            });
            html += `</div></div>`;
          });
          nav.innerHTML = html;
        }

        function setActive(route) {
          document.querySelectorAll(".sidebar-item").forEach((item) => {
            item.classList.toggle("active", item.dataset.route === route);
          });
        }

        return {
          build,
          setActive,

          toggle() {
            _collapsed = !_collapsed;

              .getElementById("platform-shell")
              .classList.toggle("sidebar-collapsed", _collapsed);
          },

          toggleGroup(groupId) {
            const el = document.querySelector(
              `.sidebar-group[data-group="${groupId}"]`,
            );

          },

          toggleMobile() {
            const sidebar = document.getElementById("sidebar");

            sidebar.classList.toggle("mobile-open", !isOpen);
            overlay.classList.toggle("visible", !isOpen);
          },

              .getElementById("sidebar-overlay")
              .classList.remove("visible");

      })();

      /* ─────────────────────────────────────────────────────────────
   ROUTER
   ───────────────────────────────────────────────────────────── */
      const NovaRouter = (() => {
        const _fragmentCache = {};
        let _currentRoute = null;

        function _getRouteConfig(hash) {
          const path = hash.replace(/^#?\/?/, "");
          if (!path || path === "home")
            return { fragment: null, route: "", module: null };
          const mod = MODULES.find((m) => m.route === path);
          if (mod)
            return { fragment: mod.fragment, route: mod.route, module: mod };
          // Partial match (group only)
          const byGroup = MODULES.find(
            (m) => m.route.startsWith(path + "/") || m.route === path,
          );
          if (byGroup)
            return {
              fragment: byGroup.fragment,
              route: byGroup.route,
              module: byGroup,
            };
          return { fragment: null, route: "", module: null };
        }

        async function _loadFragment(fragmentName) {
          if (_fragmentCache[fragmentName]) return _fragmentCache[fragmentName];
          const resp = await fetch(`/fragment/${fragmentName}`);
          if (!resp.ok) throw new Error(`Fragment load failed: ${resp.status}`);
          const html = await resp.text();
          _fragmentCache[fragmentName] = html;
          return html;
        }

        function _executeScripts(container) {
          const scripts = container.querySelectorAll("script");
          scripts.forEach((oldScript) => {
            const newScript = document.createElement("script");
            if (oldScript.src) {
              newScript.src = oldScript.src;
            } else {
              newScript.textContent = oldScript.textContent;
            }
            oldScript.parentNode.replaceChild(newScript, oldScript);
          });
        }

        function _showLoadingBar() {
          const bar = document.getElementById("loading-bar");
          bar.style.transition = "none";
          bar.style.width = "0%";
          requestAnimationFrame(() => {
            bar.style.transition = "width 400ms ease";
            bar.style.width = "70%";
          });
        }

        function _finishLoadingBar() {
          const bar = document.getElementById("loading-bar");
          bar.style.width = "100%";
          setTimeout(() => {
            bar.style.transition = "opacity 300ms ease";
            bar.style.opacity = "0";
            setTimeout(() => {
              bar.style.transition = "none";
              bar.style.width = "0%";
              bar.style.opacity = "1";
            }, 300);
          }, 200);
        }

        async function handleRoute() {
          const hash = location.hash || "#/";
          const config = _getRouteConfig(hash);

          if (config.route === _currentRoute) return;
          _currentRoute = config.route;

          const frame = document.getElementById("module-frame");

          // Update nav state
          if (config.module) {
            NovaContext.setNav({
              activeGroup: config.module.group || "",
              activeModule: config.module.id,
              activeTab: "",
            });
            NovaSidebar.setActive(config.module.route);
            // Update Nova drawer context
            const ctxEl = document.getElementById("nova-drawer-context");
            if (ctxEl) ctxEl.textContent = config.module.label;
          } else {
            NovaContext.setNav({
              activeGroup: "",
              activeModule: "",
              activeTab: "",
            });
            NovaSidebar.setActive("");
            const ctxEl = document.getElementById("nova-drawer-context");
            if (ctxEl) ctxEl.textContent = "Dashboard";
          }

          // Dashboard home
          if (!config.fragment) {
            frame.innerHTML = _buildDashboardHome();
            NovaContext.emit("module:loaded", {
              group: "",
              module: "home",
              tab: "",
            });
            return;
          }

          // Load fragment
          _showLoadingBar();
          frame.classList.add("loading");

          try {
            const html = await _loadFragment(config.fragment);
            frame.innerHTML = html;
            _executeScripts(frame);
            frame.scrollTop = 0;
            NovaContext.emit("module:loaded", {
              group: config.module.group,
              module: config.module.id,
              tab: "",
            });
          } catch (err) {
            console.error("[NovaRouter] Fragment load error:", err);
            frame.innerHTML = `
        <div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:16px;color:var(--text-tertiary);">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <div style="font-size:15px;font-weight:600;color:var(--text-secondary);">Module failed to load</div>
          <div style="font-size:13px;">Could not load "${config.fragment}". <a href="javascript:void(0)" onclick="NovaRouter.reload()" style="color:var(--text-teal);">Retry</a></div>
        </div>`;
          } finally {
            frame.classList.remove("loading");
            _finishLoadingBar();
          }
        }

        return {
          navigate(route) {
            location.hash = "#/" + route;
          },

          reload() {
            const hash = location.hash || "#/";
            const config = _getRouteConfig(hash);
            if (config.fragment) delete _fragmentCache[config.fragment];
            _currentRoute = null;
            handleRoute();
          },

          init() {
            window.addEventListener("hashchange", handleRoute);
            handleRoute();
          },

          clearCache() {
            Object.keys(_fragmentCache).forEach(
              (k) => delete _fragmentCache[k],
            );
          },
        };
      })();

      /* ─────────────────────────────────────────────────────────────

   ───────────────────────────────────────────────────────────── */
      function _buildDashboardHome() {
        const campaignName =
          NovaContext.campaign.name || NovaContext.campaign.client;

        const quickActions = [

        let html = `<div class="dashboard-home">`;

        // Hero

        html += `<p>${campaignName ? `Active campaign: ${_escHtml(campaignName)}` : "Select a campaign or create a new one to get started."}</p>`;
        html += `</div>`;

        // Quick actions
        html += `<div class="dashboard-section-title">Quick Actions</div>`;
        html += `<div class="dashboard-quick-actions">`;
        quickActions.forEach((a) => {
          html += `<div class="quick-action-card" onclick="NovaRouter.navigate('${a.route}')">`;
          html += `<div class="quick-action-icon ${a.color}">${ICONS[a.icon] || ""}</div>`;
          html += `<div class="quick-action-text"><h3>${a.label}</h3><p>${a.desc}</p></div>`;
          html += `</div>`;
        });
        html += `</div>`;

        // All modules grid
        html += `<div class="dashboard-section-title">All Modules</div>`;
        html += `<div class="dashboard-modules-grid">`;
        MODULES.filter((m) => m.group).forEach((mod) => {
          const groupClass = `group-${mod.group}`;
          const groupLabel =
            (GROUPS.find((g) => g.id === mod.group) || {}).label || "";
          html += `<div class="module-card" onclick="NovaRouter.navigate('${mod.route}')">`;
          html += `<div class="module-card-header">`;
          html += `<div class="module-card-icon ${groupClass}">${ICONS[mod.icon] || ""}</div>`;
          html += `<span class="module-card-group ${groupClass}">${groupLabel}</span>`;
          html += `</div>`;
          html += `<h3>${mod.label}</h3>`;
          html += `<p>${mod.desc}</p>`;
          html += `</div>`;
        });
        html += `</div>`;

        // Recent activity placeholder
        html += `<div class="dashboard-section-title">Recent Activity</div>`;
        html += `<div style="padding:32px;text-align:center;color:var(--text-tertiary);font-size:13px;background:var(--bg-card);border:1px solid var(--border-card);border-radius:var(--radius-md);">`;
        html += `Activity feed will appear here as you use the platform.`;
        html += `</div>`;

        html += `</div>`;
        return html;
      }

      function _getGreeting() {
        const h = new Date().getHours();
        const name = NovaContext.user.name
          ? NovaContext.user.name.split(" ")[0]
          : "";
        const prefix =
          h < 12 ? "Good morning" : h < 17 ? "Good afternoon" : "Good evening";
        return name ? `${prefix}, ${_escHtml(name)}` : prefix;
      }

      function _escHtml(str) {
        const el = document.createElement("span");
        el.textContent = str;
        return el.innerHTML;
      }

      /* ─────────────────────────────────────────────────────────────
   NOVA AI DRAWER
   ───────────────────────────────────────────────────────────── */
      const NovaDrawer = (() => {
        let _isOpen = false;

        return {
          open() {
            _isOpen = true;
            document.getElementById("nova-drawer").classList.add("open");
            document.getElementById("nova-fab").classList.add("hidden");
            // On mobile, show overlay
            if (window.innerWidth <= 1024) {
              document.getElementById("nova-overlay").classList.add("visible");
            }
            document.getElementById("nova-input").focus();
          },

          close() {
            _isOpen = false;
            document.getElementById("nova-drawer").classList.remove("open");
            document.getElementById("nova-fab").classList.remove("hidden");
            document.getElementById("nova-overlay").classList.remove("visible");
          },

          toggle() {
            _isOpen ? this.close() : this.open();
          },

          handleKey(e) {
            if (e.key === "Enter" && !e.shiftKey) {
              e.preventDefault();
              this.send();
            }
          },

          send() {
            const input = document.getElementById("nova-input");
            const text = (input.value || "").trim();
            if (!text) return;
            input.value = "";
            // Placeholder: echo the message
            const messages = document.getElementById("nova-messages");
            messages.innerHTML += `
        <div style="display:flex;gap:10px;margin-bottom:16px;">
          <div style="width:28px;height:28px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;">U</div>
          <div style="flex:1;font-size:13px;color:var(--text-primary);line-height:1.5;padding-top:4px;">${_escHtml(text)}</div>
        </div>
        <div style="display:flex;gap:10px;margin-bottom:16px;">
          <div style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--teal));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;">N</div>
          <div style="flex:1;font-size:13px;color:var(--text-secondary);line-height:1.5;padding-top:4px;">I'm Nova, your AI assistant. Full chat integration is coming soon. For now, use the <a href="/nova" style="color:var(--text-teal);">standalone Nova page</a> for full conversations.</div>
        </div>`;
            messages.scrollTop = messages.scrollHeight;
          },

          sendSuggestion(text) {
            document.getElementById("nova-input").value = text;
            this.send();
          },
        };
      })();

      /* ─────────────────────────────────────────────────────────────
   COMMAND PALETTE
   ───────────────────────────────────────────────────────────── */
      const NovaCmdPalette = (() => {
        let _selectedIdx = 0;
        let _items = [];

        function _render(filtered) {
          _items = filtered;
          _selectedIdx = 0;
          const container = document.getElementById("cmd-palette-results");
          if (!filtered.length) {
            container.innerHTML = `<div style="padding:24px;text-align:center;color:var(--text-tertiary);font-size:13px;">No results found</div>`;
            return;
          }
          container.innerHTML = filtered
            .map(
              (item, i) => `
      <div class="cmd-palette-item${i === 0 ? " selected" : ""}" data-idx="${i}" onclick="NovaCmdPalette.select(${i})" onmouseenter="NovaCmdPalette.hover(${i})">
        <div class="cmd-palette-item-icon group-${item.group || "plan"}">${ICONS[item.icon] || ""}</div>
        <div class="cmd-palette-item-text">
          <div class="cmd-palette-item-title">${item.label}</div>
          <div class="cmd-palette-item-desc">${item.desc}</div>
        </div>
      </div>
    `,
            )
            .join("");
        }

        return {
          open() {
            document.getElementById("cmd-palette").classList.add("open");
            const input = document.getElementById("cmd-palette-input");
            input.value = "";
            input.focus();
            _render(MODULES);
          },

          close() {
            document.getElementById("cmd-palette").classList.remove("open");
          },

          filter(query) {
            const q = query.toLowerCase().trim();
            if (!q) {
              _render(MODULES);
              return;
            }
            const filtered = MODULES.filter(
              (m) =>
                m.label.toLowerCase().includes(q) ||
                m.desc.toLowerCase().includes(q) ||
                (m.group || "").toLowerCase().includes(q),
            );
            _render(filtered);
          },

          select(idx) {
            const item = _items[idx];
            if (item) {
              this.close();
              NovaRouter.navigate(item.route);
            }
          },

          hover(idx) {
            _selectedIdx = idx;
            document.querySelectorAll(".cmd-palette-item").forEach((el, i) => {
              el.classList.toggle("selected", i === idx);
            });
          },

          handleKey(e) {
            if (e.key === "ArrowDown") {
              e.preventDefault();
              _selectedIdx = Math.min(_selectedIdx + 1, _items.length - 1);
              this.hover(_selectedIdx);
              const el =
                document.querySelectorAll(".cmd-palette-item")[_selectedIdx];
              if (el) el.scrollIntoView({ block: "nearest" });
            } else if (e.key === "ArrowUp") {
              e.preventDefault();
              _selectedIdx = Math.max(_selectedIdx - 1, 0);
              this.hover(_selectedIdx);
              const el =
                document.querySelectorAll(".cmd-palette-item")[_selectedIdx];
              if (el) el.scrollIntoView({ block: "nearest" });
            } else if (e.key === "Enter") {
              e.preventDefault();
              this.select(_selectedIdx);
            } else if (e.key === "Escape") {
              this.close();
            }
          },
        };
      })();

      // Campaign picker placeholder
      const NovaCampaignPicker = {
        open() {
          // Future: open a campaign selector modal
          const name = prompt("Enter campaign name (or leave empty to clear):");
          if (name !== null) {
            if (name.trim()) {
              NovaContext.setCampaign({ name: name.trim() });
            } else {
              NovaContext.clearCampaign();
            }
          }
        },
      };

      /* ─────────────────────────────────────────────────────────────
   KEYBOARD SHORTCUTS
   ───────────────────────────────────────────────────────────── */
      document.addEventListener("keydown", (e) => {
        const isMac = navigator.platform.toUpperCase().indexOf("MAC") >= 0;
        const mod = isMac ? e.metaKey : e.ctrlKey;

        // Cmd+K: open command palette
        if (mod && e.key === "k") {
          e.preventDefault();
          const paletteOpen = document
            .getElementById("cmd-palette")
            .classList.contains("open");
          paletteOpen ? NovaCmdPalette.close() : NovaCmdPalette.open();
          return;
        }

        // Cmd+/: toggle Nova AI
        if (mod && e.key === "/") {
          e.preventDefault();
          NovaDrawer.toggle();
          return;
        }

        // Escape: close overlays
        if (e.key === "Escape") {
          if (
            document.getElementById("cmd-palette").classList.contains("open")
          ) {
            NovaCmdPalette.close();
            return;
          }
          if (
            document.getElementById("nova-drawer").classList.contains("open")
          ) {
            NovaDrawer.close();
            return;
          }
        }

        // Forward keys to command palette if open
        if (document.getElementById("cmd-palette").classList.contains("open")) {
          if (["ArrowDown", "ArrowUp", "Enter"].includes(e.key)) {
            NovaCmdPalette.handleKey(e);
          }
        }

        // [ key: toggle sidebar (not in input)
        if (
          e.key === "[" &&
          !mod &&
          !["INPUT", "TEXTAREA", "SELECT"].includes(
            document.activeElement.tagName,
          )
        ) {
          NovaSidebar.toggle();
        }
      });

      /* ─────────────────────────────────────────────────────────────
   INIT
   ───────────────────────────────────────────────────────────── */
      document.addEventListener("DOMContentLoaded", () => {
        NovaContext.init();
        NovaSidebar.build();
        NovaRouter.init();
      });
    </script>
  </body>
</html>
