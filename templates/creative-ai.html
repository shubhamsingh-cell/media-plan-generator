<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="CreativeAI -- Generate multiple recruitment ad copy variants for A/B testing across channels."
    />
    <meta name="theme-color" content="#000000" />
    <title>CreativeAI | Recruitment Ad Copy Generator | Nova AI Suite</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%236366F1'/><text x='16' y='22' text-anchor='middle' fill='white' font-family='Inter,sans-serif' font-weight='800' font-size='18'>N</text></svg>"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #000000;
        --card: rgba(17, 17, 17, 0.8);
        --card-solid: #111111;
        --indigo: #6366f1;
        --indigo-light: #818cf8;
        --text: #d4d4d8;
        --muted: #a1a1a1;
        --success: #22c55e;
        --warning: #f59e0b;
        --error: #ef4444;
        --border: rgba(255, 255, 255, 0.08);
        --radius: 12px;
        --gradient: linear-gradient(135deg, #6366f1, #818cf8);
      }
      @media (prefers-reduced-motion: reduce) {
        .reveal-on-scroll {
          opacity: 1;
          transform: none;
          transition: none;
          filter: none;
        }
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          transition-duration: 0.01ms !important;
        }
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
      }
      ::selection {
        background: var(--indigo);
        color: #fff;
      }
      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        line-height: 1.6;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        background:
          radial-gradient(
            ellipse at 20% 50%,
            rgba(99, 102, 241, 0.06) 0%,
            transparent 50%
          ),
          radial-gradient(
            ellipse at 80% 20%,
            rgba(129, 140, 248, 0.04) 0%,
            transparent 50%
          );
      }
      /* Nav */
      nav {
        position: sticky;
        top: 0;
        z-index: 100;
        padding: 0.75rem 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border);
      }
      nav a {
        color: var(--muted);
        text-decoration: none;
        font-size: 0.875rem;
        font-weight: 500;
        transition: color 0.2s;
      }
      nav a:hover {
        color: var(--text);
      }
      .nav-brand {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .nav-brand span {
        font-weight: 700;
        font-size: 1.1rem;
        background: var(--gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .nav-links {
        display: flex;
        gap: 1.25rem;
        align-items: center;
      }
      /* Layout */
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
      }
      /* Header */
      .hero {
        text-align: center;
        margin-bottom: 2.5rem;
      }
      .hero h1 {
        font-size: 2.5rem;
        font-weight: 800;
        background: var(--gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 0.5rem;
      }
      .hero-icon {
        font-size: 2rem;
        margin-bottom: 0.5rem;
        display: block;
      }
      .hero p {
        color: var(--muted);
        font-size: 1.1rem;
        max-width: 640px;
        margin: 0 auto;
      }
      /* Card */
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1.5rem;
        margin-bottom: 1.5rem;
        backdrop-filter: blur(10px);
      }
      .card-title {
        font-size: 1.1rem;
        font-weight: 700;
        margin-bottom: 1rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .card-title .icon {
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(99, 102, 241, 0.12);
        border-radius: 8px;
        font-size: 0.85rem;
        flex-shrink: 0;
      }
      /* Form */
      .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 1rem;
      }
      .form-full {
        grid-column: 1 / -1;
      }
      label {
        display: block;
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--muted);
        margin-bottom: 0.35rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      input,
      select,
      textarea {
        width: 100%;
        padding: 0.65rem 0.85rem;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        font-size: 0.9rem;
        font-family: inherit;
        transition: border-color 0.2s;
      }
      textarea {
        resize: vertical;
        min-height: 80px;
        line-height: 1.5;
      }
      input:focus,
      select:focus,
      textarea:focus {
        outline: none;
        border-color: rgba(99, 102, 241, 0.5);
        box-shadow:
          0 0 0 3px rgba(99, 102, 241, 0.1),
          0 0 20px rgba(99, 102, 241, 0.05);
      }
      select option {
        background: #111;
        color: var(--text);
      }
      .btn {
        padding: 0.7rem 1.5rem;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
      }
      .btn-primary {
        background: var(--gradient);
        color: #fff;
      }
      .btn-primary:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }
      .btn-primary:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
      }
      .btn-row {
        display: flex;
        justify-content: center;
        margin-top: 1.25rem;
      }
      /* Results */
      #results {
        display: none;
      }
      .results-header {
        text-align: center;
        margin-bottom: 1.5rem;
      }
      .results-header h2 {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 0.25rem;
      }
      .results-header p {
        color: var(--muted);
        font-size: 0.9rem;
      }
      .variants-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1rem;
      }
      /* Variant cards with color coding */
      .variant-card {
        background: var(--card-solid);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1.5rem;
        position: relative;
        overflow: hidden;
        transition: border-color 0.2s;
      }
      .variant-card:hover {
        border-color: rgba(255, 255, 255, 0.15);
      }
      .variant-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
      }
      .variant-benefits::before {
        background: var(--indigo);
      }
      .variant-culture::before {
        background: var(--success);
      }
      .variant-growth::before {
        background: var(--warning);
      }
      .variant-impact::before {
        background: #ec4899;
      }
      .variant-data::before {
        background: #06b6d4;
      }
      .variant-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 0.75rem;
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      .variant-label {
        display: inline-block;
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        padding: 0.25rem 0.6rem;
        border-radius: 4px;
      }
      .variant-benefits .variant-label {
        background: rgba(99, 102, 241, 0.15);
        color: var(--indigo-light);
      }
      .variant-culture .variant-label {
        background: rgba(34, 197, 94, 0.15);
        color: var(--success);
      }
      .variant-growth .variant-label {
        background: rgba(245, 158, 11, 0.15);
        color: var(--warning);
      }
      .variant-impact .variant-label {
        background: rgba(236, 72, 153, 0.15);
        color: #ec4899;
      }
      .variant-data .variant-label {
        background: rgba(6, 182, 212, 0.15);
        color: #06b6d4;
      }
      .char-count {
        font-size: 0.75rem;
        color: var(--muted);
        font-weight: 500;
      }
      .char-count.over-limit {
        color: var(--error);
        font-weight: 600;
      }
      .copy-text {
        font-size: 0.95rem;
        line-height: 1.6;
        color: var(--text);
        margin-bottom: 1rem;
        white-space: pre-wrap;
      }
      .copy-btn {
        padding: 0.4rem 0.85rem;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--muted);
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
      }
      .copy-btn:hover {
        background: rgba(99, 102, 241, 0.12);
        color: var(--indigo-light);
        border-color: rgba(99, 102, 241, 0.3);
      }
      .copy-btn.copied {
        background: rgba(34, 197, 94, 0.12);
        color: var(--success);
        border-color: rgba(34, 197, 94, 0.3);
      }
      /* Platform tips */
      .tips-list {
        list-style: none;
      }
      .tips-list li {
        padding: 0.65rem 0;
        border-bottom: 1px solid var(--border);
        font-size: 0.9rem;
        color: var(--muted);
        display: flex;
        align-items: flex-start;
        gap: 0.5rem;
      }
      .tips-list li:last-child {
        border-bottom: none;
      }
      .tip-bullet {
        color: var(--indigo-light);
        font-weight: 700;
        flex-shrink: 0;
      }
      /* Footer */
      footer {
        text-align: center;
        padding: 2rem 1.5rem;
        color: var(--muted);
        font-size: 0.8rem;
        border-top: 1px solid var(--border);
        margin-top: 3rem;
      }
      footer a {
        color: var(--indigo-light);
        text-decoration: none;
      }
      footer a:hover {
        text-decoration: underline;
      }
      /* Responsive */
      @media (max-width: 768px) {
        .hero h1 {
          font-size: 1.75rem;
        }
        .form-grid {
          grid-template-columns: 1fr;
        }
        nav {
          padding: 0.75rem 1rem;
        }
      }

      /* -- Scroll reveal animations -- */
      .reveal-on-scroll {
        opacity: 0;
        transform: translateY(24px);
        filter: hue-rotate(40deg) saturate(0.5) brightness(0.8);
        transition:
          opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1),
          transform 0.6s cubic-bezier(0.4, 0, 0.2, 1),
          filter 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .reveal-on-scroll.visible {
        opacity: 1;
        transform: translateY(0);
        filter: none;
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="nav-brand">
        <span>CreativeAI</span>
      </div>
      <div class="nav-links">
        <a href="/">Hub</a>
        <a href="/media-plan">Media Plan</a>
      </div>
    </nav>

    <div class="container">
      <div class="hero">
        <span class="hero-icon" aria-hidden="true">&#10024;</span>
        <h1>CreativeAI</h1>
        <p>
          Generate multiple recruitment ad copy variants for A/B testing. Five
          distinct angles, tailored to your platform and tone.
        </p>
      </div>

      <!-- Input Form -->
      <div class="card reveal-on-scroll">
        <div class="card-title">
          <div class="icon">&#9881;</div>
          Copy Configuration
        </div>
        <form id="creativeForm" autocomplete="off">
          <div class="form-grid">
            <div>
              <label for="jobTitle">Job Title</label>
              <input
                type="text"
                id="jobTitle"
                placeholder="e.g. Senior Software Engineer"
                required
              />
            </div>
            <div>
              <label for="companyName">Company Name</label>
              <input
                type="text"
                id="companyName"
                placeholder="e.g. Acme Corp"
                required
              />
            </div>
            <div>
              <label for="tone">Tone</label>
              <select id="tone" required>
                <option value="">Select tone</option>
                <option value="Professional">Professional</option>
                <option value="Conversational">Conversational</option>
                <option value="Bold">Bold / Edgy</option>
                <option value="Empathetic">Empathetic</option>
                <option value="DataDriven">Data-Driven</option>
              </select>
            </div>
            <div>
              <label for="platform">Platform</label>
              <select id="platform" required>
                <option value="">Select platform</option>
                <option value="LinkedIn">LinkedIn</option>
                <option value="Indeed">Indeed</option>
                <option value="Facebook">Facebook</option>
                <option value="Instagram">Instagram</option>
                <option value="GoogleAds">Google Ads</option>
                <option value="Twitter">Twitter / X</option>
                <option value="Generic">Generic</option>
              </select>
            </div>
            <div>
              <label for="charLimit">Character Limit</label>
              <input
                type="number"
                id="charLimit"
                placeholder="280"
                min="50"
                max="2000"
                value="280"
              />
            </div>
            <div class="form-full">
              <label for="sellingPoints"
                >Key Selling Points (benefits, perks, culture)</label
              >
              <textarea
                id="sellingPoints"
                placeholder="e.g. Remote-first, unlimited PTO, $150K-$200K salary range, Series B startup, collaborative team, cutting-edge tech stack"
                rows="3"
              ></textarea>
            </div>
          </div>
          <div class="btn-row">
            <button type="submit" class="btn btn-primary" id="generateBtn">
              Generate Variants
            </button>
          </div>
        </form>
      </div>

      <!-- Results -->
      <div id="results">
        <div class="results-header reveal-on-scroll">
          <h2>Your Ad Copy Variants</h2>
          <p id="resultsMeta"></p>
        </div>

        <div class="variants-grid" id="variantsGrid"></div>

        <!-- Platform Tips -->
        <div class="card reveal-on-scroll" style="margin-top: 1.5rem">
          <div class="card-title">
            <div class="icon">&#9733;</div>
            Platform Best Practices
          </div>
          <ul class="tips-list" id="tipsList"></ul>
        </div>
      </div>
    </div>

    <footer class="reveal-on-scroll">
      <p>
        Nova AI Suite -- Built by
        <a
          href="https://www.linkedin.com/in/chandel13/"
          target="_blank"
          rel="noopener"
          >Shubham Singh Chandel</a
        >
      </p>
    </footer>

    <script>
      (function () {
        "use strict";

        // ── Utility ──

        function pick(arr) {
          return arr[Math.floor(Math.random() * arr.length)];
        }
        function pickN(arr, n) {
          var copy = arr.slice();
          var out = [];
          for (var i = 0; i < Math.min(n, copy.length); i++) {
            var idx = Math.floor(Math.random() * copy.length);
            out.push(copy.splice(idx, 1)[0]);
          }
          return out;
        }
        function shuffle(arr) {
          var copy = arr.slice();
          for (var i = copy.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = copy[i];
            copy[i] = copy[j];
            copy[j] = tmp;
          }
          return copy;
        }
        function escapeHtml(str) {
          var div = document.createElement("div");
          div.appendChild(document.createTextNode(str));
          return div.innerHTML;
        }
        function truncate(str, limit) {
          if (str.length <= limit) return str;
          return str.substring(0, limit - 3).replace(/\s+\S*$/, "") + "...";
        }

        // ── Selling Points Parser ──

        function parseSellingPoints(raw) {
          if (!raw || !raw.trim()) {
            return {
              benefits: ["competitive compensation", "great benefits"],
              culture: ["collaborative team", "innovative environment"],
              perks: ["flexible schedule", "growth opportunities"],
              keywords: [],
            };
          }
          var items = raw
            .split(/[,;\n]+/)
            .map(function (s) {
              return s.trim();
            })
            .filter(Boolean);

          var benefits = [];
          var culture = [];
          var perks = [];

          var benefitWords = [
            "salary",
            "pay",
            "$",
            "k",
            "compensation",
            "bonus",
            "equity",
            "stock",
            "401k",
            "insurance",
            "health",
            "dental",
            "vision",
            "pto",
            "vacation",
            "paid",
          ];
          var cultureWords = [
            "team",
            "culture",
            "collaborative",
            "inclusive",
            "diverse",
            "mission",
            "values",
            "people",
            "community",
            "supportive",
            "innovation",
            "innovative",
          ];

          items.forEach(function (item) {
            var lower = item.toLowerCase();
            var isBenefit = benefitWords.some(function (w) {
              return lower.indexOf(w) !== -1;
            });
            var isCulture = cultureWords.some(function (w) {
              return lower.indexOf(w) !== -1;
            });
            if (isBenefit) {
              benefits.push(item);
            } else if (isCulture) {
              culture.push(item);
            } else {
              perks.push(item);
            }
          });

          if (benefits.length === 0)
            benefits = ["competitive compensation", "strong benefits package"];
          if (culture.length === 0)
            culture = ["collaborative team environment"];
          if (perks.length === 0) perks = items.slice(0, 2);

          return {
            benefits: benefits,
            culture: culture,
            perks: perks,
            keywords: items,
          };
        }

        // ── Platform Config ──

        var PLATFORM_CONFIG = {
          LinkedIn: {
            defaultLimit: 500,
            hashtags: true,
            hashtagPrefix: "#",
            cta: "Apply",
            tips: [
              "Lead with the job title and seniority in the first line -- LinkedIn's feed truncates after ~150 characters on mobile.",
              "Tag the company page and use 3-5 relevant hashtags to boost organic reach beyond your follower base.",
              "Posts with a direct question in the opening line see 50% more engagement than statement-led posts.",
              "Avoid generic language like 'exciting opportunity' -- specificity in compensation and role impact drives 2x more clicks.",
            ],
          },
          Indeed: {
            defaultLimit: 500,
            hashtags: false,
            cta: "Apply Now",
            tips: [
              "Front-load salary information -- Indeed listings with transparent pay get up to 30% more applications.",
              "Keep the core pitch between 150-300 characters. Concise descriptions outperform walls of text on Indeed.",
              "Use action verbs and address the candidate directly with 'you' language to increase engagement.",
              "Include location and schedule details early -- these are top-3 decision factors for Indeed users.",
            ],
          },
          Facebook: {
            defaultLimit: 400,
            hashtags: true,
            hashtagPrefix: "#",
            cta: "Apply Now",
            tips: [
              "Use conversational, scroll-stopping first lines -- Facebook penalizes corporate jargon in ad relevance scores.",
              "Pair the copy with a real team photo or behind-the-scenes image for 3x more engagement than stock photos.",
              "Keep the primary text under 125 characters to avoid the 'See More' truncation on mobile feeds.",
              "Include a clear, single CTA -- multiple asks confuse users and reduce conversion rates by up to 40%.",
            ],
          },
          Instagram: {
            defaultLimit: 280,
            hashtags: true,
            hashtagPrefix: "#",
            cta: "Link in Bio",
            tips: [
              "Front-load the hook in the first line -- Instagram truncates captions after 125 characters in the feed.",
              "Use 5-10 targeted hashtags mixing role-specific and industry terms for optimal discovery without looking spammy.",
              "Stories and Reels outperform static feed posts for job ads -- keep copy punchy for overlay text.",
              "Emoji usage in job posts on Instagram increases engagement by 25%, but limit to 2-3 per post.",
            ],
          },
          GoogleAds: {
            defaultLimit: 180,
            hashtags: false,
            cta: "Apply",
            tips: [
              "Headlines max 30 characters, descriptions max 90 -- write multiple variants and let Google optimize combinations.",
              "Include the job title and location in at least one headline for quality score improvement.",
              "Use dynamic keyword insertion {KeyWord:Default} to match search intent and improve click-through rates.",
              "Add sitelink extensions for benefits page, company culture, and direct apply -- extensions improve CTR by 10-15%.",
            ],
          },
          Twitter: {
            defaultLimit: 280,
            hashtags: true,
            hashtagPrefix: "#",
            cta: "Apply",
            tips: [
              "Keep it under 280 characters total including hashtags. Tweets under 100 characters get 17% more engagement.",
              "Use 1-2 highly relevant hashtags max -- over-hashtagging on X looks spammy and reduces engagement.",
              "Thread longer job descriptions: hook in tweet 1, details in tweet 2, apply link in tweet 3.",
              "Posts with numbers and data points (salary ranges, team size) outperform vague descriptions on X.",
            ],
          },
          Generic: {
            defaultLimit: 500,
            hashtags: false,
            cta: "Apply",
            tips: [
              "Write platform-agnostic copy that can be adapted -- keep the core message under 200 characters.",
              "Structure copy with a hook, value proposition, and clear call-to-action in that order.",
              "Test multiple variants simultaneously -- even small wording changes can shift apply rates by 20-30%.",
              "Always include: role clarity, top 2-3 benefits, and a single next step for the candidate.",
            ],
          },
        };

        // ── COPY_TEMPLATES: 5+ structures per tone ──

        var COPY_TEMPLATES = {
          Professional: {
            "Benefits-First": [
              "{company} is hiring a {job}. We offer {benefit1}, {benefit2}, and {benefit3}. Join a team where your expertise is valued and rewarded. {cta}",
              "Open position: {job} at {company}. Our compensation package includes {benefit1} and {benefit2}. {perk1} included. {cta}",
              "{job} -- {company}. Total rewards: {benefit1}, {benefit2}, {benefit3}. Build your career with a company that invests in its people. {cta}",
              "We are seeking an exceptional {job}. At {company}, we believe in rewarding talent with {benefit1}, {benefit2}, and {perk1}. {cta}",
              "{company} | {job}. Industry-leading {benefit1} combined with {benefit2}. Your next career milestone starts here. {cta}",
              "Opportunity: {job} at {company}. Comprehensive package featuring {benefit1}, {benefit2}, and {benefit3}. Apply to learn more. {cta}",

        // ── Stat generators ──

        function generateStats() {
          var stats = shuffle([
            "92% employee retention rate year over year",
            "4.5/5 average employee satisfaction score",
            "3x faster career progression than industry average",
            "40% of leadership promoted from within",
            "Top 10% employer in our industry for compensation",

            "98% of new hires say onboarding exceeded expectations",
            "Zero layoffs in company history",

            "30% of revenue reinvested in employee development",
          ]);
          return stats;
        }

        // ── Main Generation Engine ──

        var VARIANT_TYPES = [
          "Benefits-First",
          "Culture-Forward",
          "Growth-Focused",
          "Impact-Driven",
          "Data-Backed",
        ];
        var VARIANT_CSS_CLASSES = [
          "variant-benefits",
          "variant-culture",
          "variant-growth",
          "variant-impact",
          "variant-data",
        ];

        function generateVariants(
          jobTitle,
          companyName,
          sellingPointsRaw,
          tone,
          platform,
          charLimit,
        ) {
          var parsed = parseSellingPoints(sellingPointsRaw);
          var platformConf =
            PLATFORM_CONFIG[platform] || PLATFORM_CONFIG.Generic;
          var limit = charLimit || platformConf.defaultLimit;
          var stats = generateStats();
          var impacts = shuffle(IMPACT_PHRASES);

          var toneTemplates = COPY_TEMPLATES[tone];
          if (!toneTemplates) toneTemplates = COPY_TEMPLATES.Professional;

          var variants = [];

          VARIANT_TYPES.forEach(function (variantType, idx) {
            var templates = toneTemplates[variantType];
            if (!templates || templates.length === 0) return;

            var template = pick(templates);

            // Build substitution variables
            var benefits = shuffle(parsed.benefits);
            var cultures = shuffle(parsed.culture);
            var perks = shuffle(
              parsed.perks.length > 0 ? parsed.perks : parsed.benefits,
            );

            var vars = {
              job: jobTitle,
              company: companyName,
              benefit1: benefits[0] || "competitive compensation",
              benefit2: benefits[1] || benefits[0] || "strong benefits",
              benefit3:
                benefits[2] ||
                (perks[0] !== benefits[0] ? perks[0] : "career growth"),
              culture1: cultures[0] || "a collaborative environment",
              culture2: cultures[1] || cultures[0] || "innovation and teamwork",
              perk1: perks[0] || "professional development",
              perk2: perks[1] || perks[0] || "flexible work arrangements",
              impact: impacts[idx] || impacts[0],
              stat1: stats[idx * 2] || stats[0],
              stat2: stats[idx * 2 + 1] || stats[1],
              cta: platformConf.cta || "Apply",
            };

            // Substitute
            var copy = template;
            for (var k in vars) {
              copy = copy.split("{" + k + "}").join(vars[k]);
            }

            // Platform-specific formatting
            if (platformConf.hashtags) {
              var hashtags = [];
              var jobWords = jobTitle.split(/\s+/);
              if (jobWords.length <= 3) {
                hashtags.push(
                  platformConf.hashtagPrefix +
                    jobWords.join("").replace(/[^a-zA-Z0-9]/g, ""),
                );
              }
              hashtags.push(platformConf.hashtagPrefix + "Hiring");
              hashtags.push(platformConf.hashtagPrefix + "Jobs");
              var hashtagStr = " " + hashtags.join(" ");
              if (copy.length + hashtagStr.length <= limit) {
                copy += hashtagStr;
              }
            }

            // Truncate to limit
            copy = truncate(copy, limit);

            variants.push({
              name: variantType,
              copy: copy,
              charCount: copy.length,
              limit: limit,
              cssClass: VARIANT_CSS_CLASSES[idx],
            });
          });

          return variants;
        }

        // ── Render ──

        function renderResults(variants, platform) {
          var grid = document.getElementById("variantsGrid");
          grid.innerHTML = "";

          variants.forEach(function (v, idx) {
            var card = document.createElement("div");
            card.className = "variant-card " + v.cssClass + " reveal-on-scroll";

            var overLimit = v.charCount > v.limit;
            var charClass = overLimit ? "char-count over-limit" : "char-count";

            var topDiv = document.createElement("div");
            topDiv.className = "variant-top";

            var labelSpan = document.createElement("span");
            labelSpan.className = "variant-label";
            labelSpan.textContent = v.name;
            topDiv.appendChild(labelSpan);

            var countSpan = document.createElement("span");
            countSpan.className = charClass;
            countSpan.textContent = v.charCount + " / " + v.limit + " chars";
            topDiv.appendChild(countSpan);

            card.appendChild(topDiv);

            var copyDiv = document.createElement("div");
            copyDiv.className = "copy-text";
            copyDiv.textContent = v.copy;
            card.appendChild(copyDiv);

            var copyBtn = document.createElement("button");
            copyBtn.className = "copy-btn";
            copyBtn.textContent = "Copy";
            copyBtn.setAttribute("data-copy", v.copy);
            copyBtn.addEventListener("click", function () {
              var text = this.getAttribute("data-copy");
              var btn = this;
              if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard
                  .writeText(text)
                  .then(function () {
                    btn.textContent = "Copied!";
                    btn.classList.add("copied");
                    setTimeout(function () {
                      btn.textContent = "Copy";
                      btn.classList.remove("copied");
                    }, 2000);
                  })
                  .catch(function () {
                    fallbackCopy(text, btn);
                  });
              } else {
                fallbackCopy(text, btn);
              }
            });
            card.appendChild(copyBtn);

            grid.appendChild(card);
          });

          // Platform tips
          var platformConf =
            PLATFORM_CONFIG[platform] || PLATFORM_CONFIG.Generic;
          var tipsList = document.getElementById("tipsList");
          tipsList.innerHTML = platformConf.tips
            .map(function (t) {
              return (
                '<li><span class="tip-bullet">--</span> ' +
                escapeHtml(t) +
                "</li>"
              );
            })
            .join("");

          // Meta
          document.getElementById("resultsMeta").textContent =
            "5 variants generated for " +
            platform +
            " -- click Copy to grab any variant.";
        }

        function fallbackCopy(text, btn) {
          var ta = document.createElement("textarea");
          ta.value = text;
          ta.style.position = "fixed";
          ta.style.left = "-9999px";
          document.body.appendChild(ta);
          ta.select();
          try {
            document.execCommand("copy");
            btn.textContent = "Copied!";
            btn.classList.add("copied");
            setTimeout(function () {
              btn.textContent = "Copy";
              btn.classList.remove("copied");
            }, 2000);
          } catch (err) {
            btn.textContent = "Failed";
            setTimeout(function () {
              btn.textContent = "Copy";
            }, 2000);
          }
          document.body.removeChild(ta);
        }

        // ── Platform change auto-updates char limit ──

        var platformDefaults = {
          LinkedIn: 500,
          Indeed: 500,
          Facebook: 400,
          Instagram: 280,
          GoogleAds: 180,
          Twitter: 280,
          Generic: 500,
        };

        document
          .getElementById("platform")
          .addEventListener("change", function () {
            var val = this.value;
            if (val && platformDefaults[val]) {
              document.getElementById("charLimit").value =
                platformDefaults[val];
            }
          });

        // ── Form Submit ──

        document
          .getElementById("creativeForm")
          .addEventListener("submit", function (e) {
            e.preventDefault();
            var jobTitle = document.getElementById("jobTitle").value.trim();
            var companyName = document
              .getElementById("companyName")
              .value.trim();
            var sellingPoints = document
              .getElementById("sellingPoints")
              .value.trim();
            var tone = document.getElementById("tone").value;
            var platform = document.getElementById("platform").value;
            var charLimit =
              parseInt(document.getElementById("charLimit").value, 10) || 280;

            if (!jobTitle || !companyName || !tone || !platform) return;

            var variants = generateVariants(
              jobTitle,
              companyName,
              sellingPoints,
              tone,
              platform,
              charLimit,
            );

            renderResults(variants, platform);

            var results = document.getElementById("results");
            results.style.display = "block";

            // Re-observe new reveal-on-scroll elements
            document
              .querySelectorAll(".reveal-on-scroll:not(.visible)")
              .forEach(function (el) {
                scrollObserver.observe(el);
              });

            results.scrollIntoView({ behavior: "smooth", block: "start" });
          });

        // ── Scroll Reveal ──

        var scrollObserver = new IntersectionObserver(
          function (entries) {
            entries.forEach(function (entry) {
              if (entry.isIntersecting) {
                entry.target.classList.add("visible");
                scrollObserver.unobserve(entry.target);
              }
            });
          },
          { threshold: 0.1, rootMargin: "0px 0px -40px 0px" },
        );
        document.querySelectorAll(".reveal-on-scroll").forEach(function (el) {
          scrollObserver.observe(el);
        });
      })();
    </script>
  </body>
</html>
