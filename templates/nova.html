<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nova AI - Recruitment Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ================================================================
         CSS CUSTOM PROPERTIES
         ================================================================ */
      :root {
        --bg-primary: #0f0f1a;
        --bg-secondary: #1a1a2e;
        --bg-tertiary: #16162a;
        --bg-input: #141425;
        --text-primary: #d4d4d8;
        --text-secondary: #888;
        --text-muted: #555;
        --accent-purple: #5a54bd;
        --accent-purple-light: #7b75d4;
        --accent-teal: #6bb3cd;
        --accent-teal-dim: rgba(107, 179, 205, 0.15);
        --accent-teal-glow: rgba(107, 179, 205, 0.3);
        --accent-green: #34d399;
        --accent-red: #f87171;
        --accent-orange: #ffaa00;
        --border-color: rgba(107, 179, 205, 0.1);
        --border-hover: rgba(107, 179, 205, 0.25);
        --msg-user-bg: #5a54bd;
        --msg-assistant-bg: #1a1a2e;
        --sidebar-width: 280px;
        --topbar-height: 56px;
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 18px;
        --radius-full: 9999px;
        --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 30px rgba(0, 0, 0, 0.5);
        --transition-fast: 150ms ease;
        --transition-normal: 200ms ease-out;
        --transition-slow: 300ms ease;
      }

      /* ================================================================
         RESET & BASE
         ================================================================ */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
        background: var(--bg-primary);
        color: var(--text-primary);
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        font-size: 15px;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      button {
        font-family: inherit;
        cursor: pointer;
        border: none;
        background: none;
        color: inherit;
      }
      a {
        color: var(--accent-teal);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }

      /* ================================================================
         APP LAYOUT
         ================================================================ */
      .app {
        display: flex;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
      }

      /* ================================================================
         SIDEBAR
         ================================================================ */
      .sidebar {
        width: var(--sidebar-width);
        background: var(--bg-secondary);
        border-right: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        transition:
          transform var(--transition-slow),
          width var(--transition-slow);
        z-index: 20;
      }
      .sidebar.collapsed {
        transform: translateX(calc(-1 * var(--sidebar-width)));
        width: 0;
        min-width: 0;
        border-right: none;
        overflow: hidden;
      }
      .sidebar-header {
        padding: 16px;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
        gap: 12px;
        flex-shrink: 0;
      }
      .sidebar-brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .sidebar-brand-icon {
        width: 32px;
        height: 32px;
        border-radius: var(--radius-sm);
        background: linear-gradient(
          135deg,
          var(--accent-purple),
          var(--accent-teal)
        );
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 14px;
        color: #fff;
        flex-shrink: 0;
      }
      .sidebar-brand-text {
        font-size: 16px;
        font-weight: 700;
        color: #fff;
        letter-spacing: 0.5px;
      }
      .sidebar-brand-text span {
        font-size: 11px;
        font-weight: 400;
        color: var(--text-secondary);
        display: block;
        letter-spacing: 0;
        margin-top: -2px;
      }
      .new-chat-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        padding: 10px 16px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border-color);
        background: transparent;
        color: var(--text-primary);
        font-size: 13px;
        font-weight: 500;
        transition: all var(--transition-fast);
      }
      .new-chat-btn:hover {
        background: rgba(107, 179, 205, 0.08);
        border-color: var(--accent-teal);
        color: var(--accent-teal);
      }
      .new-chat-btn svg {
        width: 16px;
        height: 16px;
      }

      /* Conversation list */
      .sidebar-conversations {
        flex: 1;
        overflow-y: auto;
        padding: 8px;
      }
      .sidebar-conversations::-webkit-scrollbar {
        width: 4px;
      }
      .sidebar-conversations::-webkit-scrollbar-thumb {
        background: var(--border-color);
        border-radius: 2px;
      }
      .conv-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: background var(--transition-fast);
        margin-bottom: 2px;
      }
      .conv-item:hover {
        background: rgba(107, 179, 205, 0.06);
      }
      .conv-item.active {
        background: rgba(107, 179, 205, 0.1);
      }
      .conv-item-icon {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
        color: var(--text-secondary);
      }
      .conv-item-text {
        flex: 1;
        min-width: 0;
      }
      .conv-item-title {
        font-size: 13px;
        color: var(--text-primary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .conv-item-date {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 1px;
      }
      .conv-item-delete {
        opacity: 0;
        padding: 4px;
        border-radius: 4px;
        color: var(--text-secondary);
        transition: all var(--transition-fast);
        flex-shrink: 0;
      }
      .conv-item:hover .conv-item-delete {
        opacity: 1;
      }
      .conv-item-delete:hover {
        color: var(--accent-red);
        background: rgba(248, 113, 113, 0.1);
      }
      .conv-item-delete svg {
        width: 14px;
        height: 14px;
      }

      /* Sidebar footer */
      .sidebar-footer {
        padding: 12px 16px;
        border-top: 1px solid var(--border-color);
        flex-shrink: 0;
      }
      .sidebar-footer-link {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px;
        border-radius: var(--radius-sm);
        font-size: 12px;
        color: var(--text-secondary);
        transition: all var(--transition-fast);
      }
      .sidebar-footer-link:hover {
        background: rgba(107, 179, 205, 0.06);
        color: var(--text-primary);
        text-decoration: none;
      }
      .sidebar-footer-link svg {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }

      /* ================================================================
         MAIN CONTENT AREA
         ================================================================ */
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
        position: relative;
      }

      /* ================================================================
         TOP BAR
         ================================================================ */
      .topbar {
        height: var(--topbar-height);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        border-bottom: 1px solid var(--border-color);
        background: rgba(15, 15, 26, 0.95);
        backdrop-filter: blur(12px);
        flex-shrink: 0;
        z-index: 10;
      }
      .topbar-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .sidebar-toggle {
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: var(--radius-sm);
        color: var(--text-secondary);
        transition: all var(--transition-fast);
      }
      .sidebar-toggle:hover {
        background: rgba(107, 179, 205, 0.08);
        color: var(--text-primary);
      }
      .sidebar-toggle svg {
        width: 20px;
        height: 20px;
      }
      .topbar-title {
        font-size: 15px;
        font-weight: 600;
        color: #fff;
      }
      .topbar-model {
        font-size: 11px;
        color: var(--text-secondary);
        padding: 2px 8px;
        border-radius: var(--radius-full);
        border: 1px solid var(--border-color);
        margin-left: 4px;
      }
      .topbar-right {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .topbar-btn {
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: var(--radius-sm);
        color: var(--text-secondary);
        transition: all var(--transition-fast);
        position: relative;
      }
      .topbar-btn:hover {
        background: rgba(107, 179, 205, 0.08);
        color: var(--text-primary);
      }
      .topbar-btn svg {
        width: 18px;
        height: 18px;
      }

      /* Orb accent */
      .orb-accent {
        position: absolute;
        top: 12px;
        left: 12px;
        width: 120px;
        height: 120px;
        pointer-events: none;
        z-index: 1;
        opacity: 0.6;
      }
      .orb-accent canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      /* ================================================================
         CHAT AREA
         ================================================================ */
      .chat-area {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        scroll-behavior: smooth;
      }
      .chat-area::-webkit-scrollbar {
        width: 6px;
      }
      .chat-area::-webkit-scrollbar-track {
        background: transparent;
      }
      .chat-area::-webkit-scrollbar-thumb {
        background: rgba(107, 179, 205, 0.15);
        border-radius: 3px;
      }
      .chat-area::-webkit-scrollbar-thumb:hover {
        background: rgba(107, 179, 205, 0.25);
      }
      .chat-container {
        max-width: 720px;
        margin: 0 auto;
        padding: 24px 20px 100px;
      }

      /* ================================================================
         WELCOME / EMPTY STATE
         ================================================================ */
      .welcome-screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 60vh;
        text-align: center;
        padding: 40px 20px;
      }
      .welcome-orb-container {
        width: 80px;
        height: 80px;
        margin-bottom: 24px;
        position: relative;
      }
      .welcome-orb {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: linear-gradient(
          135deg,
          var(--accent-purple),
          var(--accent-teal)
        );
        animation: welcome-pulse 3s ease-in-out infinite;
      }
      @keyframes welcome-pulse {
        0%,
        100% {
          transform: scale(1);
          box-shadow: 0 0 30px rgba(90, 84, 189, 0.3);
        }
        50% {
          transform: scale(1.05);
          box-shadow: 0 0 50px rgba(107, 179, 205, 0.4);
        }
      }
      .welcome-title {
        font-size: 28px;
        font-weight: 700;
        color: #fff;
        margin-bottom: 8px;
      }
      .welcome-subtitle {
        font-size: 15px;
        color: var(--text-secondary);
        max-width: 480px;
        margin-bottom: 32px;
        line-height: 1.6;
      }
      .suggestions-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        max-width: 560px;
        width: 100%;
      }
      .suggestion-card {
        text-align: left;
        padding: 14px 16px;
        border-radius: var(--radius-md);
        border: 1px solid var(--border-color);
        background: var(--bg-secondary);
        font-size: 13px;
        color: var(--text-primary);
        line-height: 1.5;
        transition: all var(--transition-fast);
      }
      .suggestion-card:hover {
        border-color: var(--accent-teal);
        background: rgba(107, 179, 205, 0.06);
        transform: translateY(-1px);
        box-shadow: var(--shadow-sm);
      }
      .suggestion-card-icon {
        font-size: 18px;
        margin-bottom: 6px;
        display: block;
      }

      /* ================================================================
         MESSAGE BUBBLES
         ================================================================ */
      .message {
        display: flex;
        gap: 12px;
        margin-bottom: 24px;
        animation: msg-slide-in var(--transition-normal) forwards;
        opacity: 0;
      }
      @keyframes msg-slide-in {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .message-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 600;
        margin-top: 2px;
      }
      .message-avatar.nova {
        background: linear-gradient(135deg, var(--accent-teal), #4a9db5);
        color: #fff;
      }
      .message-avatar.user {
        background: var(--accent-purple);
        color: #fff;
      }
      .message-body {
        flex: 1;
        min-width: 0;
      }
      .message-sender {
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 4px;
      }
      .message-sender.nova {
        color: var(--accent-teal);
      }
      .message-sender.user {
        color: var(--accent-purple-light);
      }
      .message-content {
        font-size: 15px;
        line-height: 1.7;
        color: var(--text-primary);
        word-wrap: break-word;
        overflow-wrap: break-word;
      }
      .message-content p {
        margin: 0 0 12px;
      }
      .message-content p:last-child {
        margin-bottom: 0;
      }
      .message-content h3 {
        font-size: 15px;
        font-weight: 600;
        color: #fff;
        margin: 16px 0 8px;
      }
      .message-content h3:first-child {
        margin-top: 0;
      }
      .message-content strong {
        font-weight: 600;
        color: #e8e8ec;
      }
      .message-content em {
        font-style: italic;
        color: var(--text-secondary);
      }
      .message-content ul,
      .message-content ol {
        margin: 8px 0;
        padding-left: 24px;
      }
      .message-content li {
        margin-bottom: 4px;
      }
      .message-content li::marker {
        color: var(--accent-teal);
      }
      .message-content a {
        color: var(--accent-teal);
        text-decoration: underline;
        text-underline-offset: 2px;
      }

      /* Tables in messages */
      .message-content table {
        border-collapse: collapse;
        width: 100%;
        margin: 12px 0;
        font-size: 13px;
        border-radius: var(--radius-sm);
        overflow: hidden;
      }
      .message-content th,
      .message-content td {
        border: 1px solid var(--border-color);
        padding: 8px 12px;
        text-align: left;
      }
      .message-content th {
        background: rgba(107, 179, 205, 0.08);
        color: var(--accent-teal);
        font-weight: 600;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.3px;
      }
      .message-content td {
        background: rgba(26, 26, 46, 0.5);
      }

      /* Inline code */
      .message-content code {
        background: rgba(107, 179, 205, 0.1);
        padding: 2px 6px;
        border-radius: 4px;
        font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
        font-size: 13px;
        color: var(--accent-teal);
      }

      /* Code blocks */
      .message-content pre {
        background: #0d0d18;
        border: 1px solid var(--border-color);
        border-radius: var(--radius-sm);
        padding: 16px;
        margin: 12px 0;
        overflow-x: auto;
        position: relative;
      }
      .message-content pre code {
        background: none;
        padding: 0;
        border-radius: 0;
        font-size: 13px;
        color: var(--text-primary);
        line-height: 1.6;
      }
      .code-block-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 16px;
        background: rgba(107, 179, 205, 0.06);
        border-bottom: 1px solid var(--border-color);
        border-radius: var(--radius-sm) var(--radius-sm) 0 0;
        font-size: 12px;
        color: var(--text-secondary);
      }
      .code-copy-btn {
        font-size: 11px;
        color: var(--text-secondary);
        padding: 4px 8px;
        border-radius: 4px;
        transition: all var(--transition-fast);
      }
      .code-copy-btn:hover {
        background: rgba(107, 179, 205, 0.1);
        color: var(--accent-teal);
      }

      /* Inline citations */
      .citation {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 20px;
        height: 20px;
        padding: 0 5px;
        border-radius: var(--radius-full);
        background: var(--accent-teal-dim);
        color: var(--accent-teal);
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        vertical-align: super;
        margin: 0 1px;
        transition: all var(--transition-fast);
        position: relative;
        text-decoration: none;
      }
      .citation:hover {
        background: var(--accent-teal-glow);
        text-decoration: none;
        transform: translateY(-1px);
      }
      .citation-tooltip {
        position: absolute;
        bottom: calc(100% + 8px);
        left: 50%;
        transform: translateX(-50%);
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-sm);
        padding: 8px 12px;
        font-size: 12px;
        color: var(--text-primary);
        white-space: nowrap;
        pointer-events: none;
        opacity: 0;
        transition: opacity var(--transition-fast);
        box-shadow: var(--shadow-md);
        z-index: 100;
      }
      .citation:hover .citation-tooltip {
        opacity: 1;
      }

      /* Source badges and confidence */
      .message-meta {
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid var(--border-color);
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: center;
      }
      .meta-badge {
        font-size: 11px;
        padding: 3px 8px;
        border-radius: var(--radius-full);
        background: var(--accent-teal-dim);
        color: var(--accent-teal);
        border: 1px solid rgba(107, 179, 205, 0.15);
      }
      .conf-badge {
        font-size: 11px;
        padding: 3px 8px;
        border-radius: var(--radius-full);
        font-weight: 600;
      }
      .conf-high {
        background: rgba(52, 211, 153, 0.1);
        color: var(--accent-green);
        border: 1px solid rgba(52, 211, 153, 0.2);
      }
      .conf-medium {
        background: rgba(255, 170, 0, 0.1);
        color: var(--accent-orange);
        border: 1px solid rgba(255, 170, 0, 0.2);
      }
      .conf-low {
        background: rgba(248, 113, 113, 0.1);
        color: var(--accent-red);
        border: 1px solid rgba(248, 113, 113, 0.2);
      }

      /* Timestamp */
      .message-time {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 6px;
      }

      /* Message action bar (hover) */
      .message-actions {
        display: flex;
        gap: 4px;
        margin-top: 8px;
        opacity: 0;
        transition: opacity var(--transition-fast);
      }
      .message:hover .message-actions {
        opacity: 1;
      }
      .msg-action-btn {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 12px;
        color: var(--text-secondary);
        transition: all var(--transition-fast);
      }
      .msg-action-btn:hover {
        background: rgba(107, 179, 205, 0.08);
        color: var(--text-primary);
      }
      .msg-action-btn.active {
        color: var(--accent-teal);
      }
      .msg-action-btn svg {
        width: 14px;
        height: 14px;
      }

      /* ================================================================
         THINKING INDICATOR
         ================================================================ */
      .thinking-wrapper {
        display: flex;
        gap: 12px;
        margin-bottom: 24px;
        animation: msg-slide-in var(--transition-normal) forwards;
      }
      .thinking-bubble {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .thinking-dots-pill {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 12px 18px;
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-lg);
      }
      .thinking-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent-teal);
        animation: thinking-pulse 1.4s infinite;
      }
      .thinking-dot:nth-child(2) {
        animation-delay: 0.2s;
      }
      .thinking-dot:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes thinking-pulse {
        0%,
        60%,
        100% {
          transform: scale(0.6);
          opacity: 0.3;
        }
        30% {
          transform: scale(1);
          opacity: 1;
        }
      }
      .thinking-text {
        font-size: 12px;
        color: var(--text-secondary);
        padding-left: 4px;
      }

      /* Skeleton loading */
      .skeleton-line {
        height: 14px;
        border-radius: 4px;
        background: linear-gradient(
          90deg,
          var(--bg-secondary) 25%,
          rgba(107, 179, 205, 0.06) 50%,
          var(--bg-secondary) 75%
        );
        background-size: 200% 100%;
        animation: skeleton-shimmer 1.5s infinite;
        margin-bottom: 8px;
      }
      .skeleton-line:nth-child(1) {
        width: 90%;
      }
      .skeleton-line:nth-child(2) {
        width: 75%;
      }

    <script>
      (function () {
        "use strict";

        // ========================================================================
        // CONSTANTS & STATE
        // ========================================================================
        var API_URL = "/api/chat";
        var MAX_CHARS = 4000;
        var STORAGE_KEY = "nova_conversations";
        var ACTIVE_KEY = "nova_active_conv";
        var MAX_HISTORY = 20;
        var MAX_STORED_MESSAGES = 100;

        var state = {
          conversations: {},
          activeConvId: null,
          isLoading: false,
          abortController: null,
          queryCount: 0,
          sidebarOpen: true,
        };

        // ========================================================================
        // DOM REFERENCES
        // ========================================================================
        var chatContainer = document.getElementById("chat-container");
        var chatArea = document.getElementById("chat-area");
        var chatInput = document.getElementById("chat-input");
        var sendBtn = document.getElementById("send-btn");
        var clearChatBtn = document.getElementById("clear-chat-btn");
        var newChatBtn = document.getElementById("new-chat-btn");
        var sidebarToggle = document.getElementById("sidebar-toggle");
        var sidebar = document.getElementById("sidebar");
        var sidebarOverlay = document.getElementById("sidebar-overlay");
        var convList = document.getElementById("conv-list");
        var charCount = document.getElementById("char-count");
        var toastContainer = document.getElementById("toast-container");

        // ========================================================================
        // UTILITIES
        // ========================================================================
        function generateId() {
          return (
            "conv-" + Date.now() + "-" + Math.random().toString(36).substr(2, 6)
          );
        }

        function formatTime(ts) {
          var d = new Date(ts);
          var now = new Date();
          var diff = now - d;
          if (diff < 60000) return "Just now";
          if (diff < 3600000) return Math.floor(diff / 60000) + "m ago";
          if (diff < 86400000) return Math.floor(diff / 3600000) + "h ago";
          if (diff < 604800000) return Math.floor(diff / 86400000) + "d ago";
          return d.toLocaleDateString("en-US", {
            month: "short",
            day: "numeric",
          });
        }

        function formatTimestamp(ts) {
          return new Date(ts).toLocaleTimeString("en-US", {
            hour: "numeric",
            minute: "2-digit",
            hour12: true,
          });
        }

        function getGreeting() {
          var h = new Date().getHours();
          return h < 12 ? "morning" : h < 17 ? "afternoon" : "evening";
        }

        function escapeHtml(str) {
          if (!str) return "";
          var el = document.createElement("div");
          el.appendChild(document.createTextNode(String(str)));
          return el.innerHTML;
        }

        // ========================================================================
        // TOAST NOTIFICATIONS
        // ========================================================================
        function showToast(message, type) {
          type = type || "success";
          var toast = document.createElement("div");
          toast.className = "toast " + type;
          toast.textContent = message;
          toastContainer.appendChild(toast);
          setTimeout(function () {
            toast.style.animation = "toast-out 0.3s ease forwards";
            setTimeout(function () {
              toast.remove();
            }, 300);
          }, 2500);
        }

        // ========================================================================
        // MARKDOWN RENDERER (vanilla JS, no deps)
        // ========================================================================
        function renderMarkdown(text) {
          if (!text) return "";
          var h = escapeHtml(text);

          // Code blocks with language
          h = h.replace(
            /```(\w+)?\n([\s\S]*?)```/g,
            function (match, lang, code) {
              var langLabel = lang ? escapeHtml(lang) : "code";
              return (
                '<div class="code-block-wrapper"><div class="code-block-header"><span>' +
                langLabel +
                '</span><button class="code-copy-btn" onclick="window.__novaCopyCode(this)" aria-label="Copy code">Copy</button></div>' +
                "<pre><code>" +
                code.trim() +
                "</code></pre></div>"
              );
            },
          );

          // Tables
          h = h.replace(
            /^(\|.+\|)\n(\|[-:\| ]+\|)\n((?:\|.+\|\n?)*)/gm,
            function (m, header, sep, body) {
              var hc = header.split("|").filter(function (c) {
                return c.trim() !== "";
              });
              var rows = body.trim().split("\n");
              var t = "<table><thead><tr>";
              hc.forEach(function (c) {
                t += "<th>" + c.trim() + "</th>";
              });
              t += "</tr></thead><tbody>";
              rows.forEach(function (r) {
                var cells = r.split("|").filter(function (c) {
                  return c.trim() !== "";
                });
                t += "<tr>";
                cells.forEach(function (c) {
                  t += "<td>" + c.trim() + "</td>";
                });
                t += "</tr>";
              });
              return t + "</tbody></table>";
            },
          );

          // Headers
          h = h.replace(/^### (.+)$/gm, "<h3>$1</h3>");
          h = h.replace(/^## (.+)$/gm, "<h3>$1</h3>");
          h = h.replace(/^# (.+)$/gm, "<h3>$1</h3>");

          // Bold and italic
          h = h.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
          h = h.replace(/\*(.+?)\*/g, "<em>$1</em>");

          // Inline code (but not inside pre/code blocks)
          h = h.replace(/`([^`]+)`/g, "<code>$1</code>");

          // Ordered lists
          h = h.replace(
            /^(\d+)\.\s+(.+)$/gm,
            '<li class="ol-item" value="$1">$2</li>',
          );
          h = h.replace(
            /((?:<li class="ol-item"[^>]*>.+<\/li>\n?)+)/g,
            "<ol>$1</ol>",
          );

          // Unordered lists
          h = h.replace(/^[-*]\s+(.+)$/gm, "<li>$1</li>");
          h = h.replace(/((?:<li>(?:(?!class=).)+<\/li>\n?)+)/g, "<ul>$1</ul>");

          // Links
          h = h.replace(
            /\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g,
            '<a href="$2" target="_blank" rel="noopener">$1</a>',
          );

          // Inline citations [1], [2], etc.
          h = h.replace(
            /\[(\d+)\]/g,
            '<span class="citation" data-cite="$1" tabindex="0" role="button" aria-label="Citation $1">$1</span>',
          );

          // Paragraphs
          h = h.replace(/\n\n/g, "</p><p>");
          h = h.replace(/\n/g, "<br/>");
          if (
            h.indexOf("<h3>") !== 0 &&
            h.indexOf("<ul>") !== 0 &&
            h.indexOf("<ol>") !== 0 &&
            h.indexOf("<table>") !== 0 &&
            h.indexOf("<div") !== 0
          ) {
            h = "<p>" + h + "</p>";
          }
          h = h.replace(/<p>\s*<\/p>/g, "");
          h = h.replace(/<p>\s*<br\/>\s*<\/p>/g, "");

          return h;
        }

        // Copy code block handler
        window.__novaCopyCode = function (btn) {
          var pre = btn
            .closest(".code-block-wrapper")
            .querySelector("pre code");
          if (!pre) return;
          navigator.clipboard.writeText(pre.textContent).then(function () {
            btn.textContent = "Copied!";
            setTimeout(function () {
              btn.textContent = "Copy";
            }, 1500);
          });
        };

        // ========================================================================
        // CONVERSATION PERSISTENCE (localStorage)
        // ========================================================================
        function loadConversations() {
          try {
            var stored = localStorage.getItem(STORAGE_KEY);
            if (stored) state.conversations = JSON.parse(stored);
            state.activeConvId = localStorage.getItem(ACTIVE_KEY) || null;
          } catch (e) {
            state.conversations = {};
          }
        }

        function saveConversations() {
          try {
            // Trim each conversation to MAX_STORED_MESSAGES
            var toSave = {};
            Object.keys(state.conversations).forEach(function (id) {
              var conv = state.conversations[id];
              toSave[id] = {
                id: conv.id,
                title: conv.title,
                messages: conv.messages.slice(-MAX_STORED_MESSAGES),
                createdAt: conv.createdAt,
                updatedAt: conv.updatedAt,
              };
            });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
            localStorage.setItem(ACTIVE_KEY, state.activeConvId || "");
          } catch (e) {}
        }

        function getActiveConv() {
          if (!state.activeConvId || !state.conversations[state.activeConvId]) {
            return null;
          }
          return state.conversations[state.activeConvId];
        }

        function createConversation() {
          var id = generateId();
          state.conversations[id] = {
            id: id,
            title: "New Chat",
            messages: [],
            createdAt: Date.now(),
            updatedAt: Date.now(),
          };
          state.activeConvId = id;
          saveConversations();
          renderSidebar();
          renderChat();
          return id;
        }

        function switchConversation(id) {
          if (!state.conversations[id]) return;
          state.activeConvId = id;
          saveConversations();
          renderSidebar();
          renderChat();
        }

        function deleteConversation(id) {
          delete state.conversations[id];
          if (state.activeConvId === id) {
            var keys = Object.keys(state.conversations);
            state.activeConvId = keys.length > 0 ? keys[keys.length - 1] : null;
          }
          saveConversations();
          renderSidebar();
          renderChat();
        }

        // Auto-title from first user message
        function updateConvTitle(conv) {
          if (!conv || conv.title !== "New Chat") return;
          var firstUser = conv.messages.find(function (m) {
            return m.role === "user";
          });
          if (firstUser) {
            var title = firstUser.content.substring(0, 50);
            if (firstUser.content.length > 50) title += "...";
            conv.title = title;
            saveConversations();
            renderSidebar();
          }
        }

        // ========================================================================
        // SIDEBAR RENDERING
        // ========================================================================
        function renderSidebar() {
          convList.innerHTML = "";
          var keys = Object.keys(state.conversations).sort(function (a, b) {
            return (
              (state.conversations[b].updatedAt || 0) -
              (state.conversations[a].updatedAt || 0)
            );
          });
          if (keys.length === 0) {
            var empty = document.createElement("div");
            empty.style.cssText =
              "padding:20px 12px;text-align:center;font-size:13px;color:var(--text-muted);";
            empty.textContent = "No conversations yet";
            convList.appendChild(empty);
            return;
          }
          keys.forEach(function (id) {
            var conv = state.conversations[id];
            var item = document.createElement("div");
            item.className =
              "conv-item" + (id === state.activeConvId ? " active" : "");
            item.setAttribute("role", "listitem");
            item.setAttribute("tabindex", "0");
            item.innerHTML =
              '<svg class="conv-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>' +
              '<div class="conv-item-text">' +
              '<div class="conv-item-title">' +
              escapeHtml(conv.title) +
              "</div>" +
              '<div class="conv-item-date">' +
              formatTime(conv.updatedAt || conv.createdAt) +
              "</div>" +
              "</div>" +
              '<button class="conv-item-delete" data-id="' +
              id +
              '" aria-label="Delete conversation" title="Delete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';

            item.addEventListener("click", function (e) {
              if (e.target.closest(".conv-item-delete")) return;
              switchConversation(id);
              closeSidebarMobile();
            });
            item
              .querySelector(".conv-item-delete")
              .addEventListener("click", function (e) {
                e.stopPropagation();
                deleteConversation(id);
              });
            item.addEventListener("keydown", function (e) {
              if (e.key === "Enter") {
                switchConversation(id);
                closeSidebarMobile();
              }
            });
            convList.appendChild(item);
          });
        }

        // ========================================================================
        // CHAT RENDERING
        // ========================================================================
        function renderChat() {
          chatContainer.innerHTML = "";
          var conv = getActiveConv();
          if (!conv || conv.messages.length === 0) {
            renderWelcome();
            return;
          }
          conv.messages.forEach(function (msg) {
            appendMessageDOM(msg, false);
          });
          scrollToBottom();
        }

        function renderWelcome() {
          var welcome = document.createElement("div");
          welcome.className = "welcome-screen";
          welcome.id = "welcome-screen";
          welcome.innerHTML =
            '<div class="welcome-orb-container"><div class="welcome-orb" aria-hidden="true"></div></div>' +
            '<div class="welcome-title">Good ' +
            getGreeting() +
            ". How can I help?</div>" +
            '<div class="welcome-subtitle">I have access to 10,238+ supply partners, real-time benchmarks across 70+ countries, salary data, demand signals, and comprehensive recruitment intelligence.</div>' +
            '<div class="suggestions-grid">' +
            '<button class="suggestion-card" data-query="What are the best job boards for software engineers?">' +
            '<span class="suggestion-card-icon" aria-hidden="true">&#x1F4BB;</span>Best job boards for software engineers' +
            "</button>" +
            '<button class="suggestion-card" data-query="Compare Indeed vs LinkedIn for nursing recruitment">' +
            '<span class="suggestion-card-icon" aria-hidden="true">&#x2696;</span>Compare Indeed vs LinkedIn for nursing' +
            "</button>" +
            '<button class="suggestion-card" data-query="Create a media plan for $50K budget in Texas">' +
            '<span class="suggestion-card-icon" aria-hidden="true">&#x1F4B0;</span>Create a $50K media plan for Texas' +
            "</button>" +
            '<button class="suggestion-card" data-query="What\'s the current unemployment rate impact on hiring?">' +
            '<span class="suggestion-card-icon" aria-hidden="true">&#x1F4CA;</span>Unemployment rate impact on hiring' +
            "</button>" +
            "</div>";
          chatContainer.appendChild(welcome);

          // Suggestion click handlers
          welcome.querySelectorAll(".suggestion-card").forEach(function (btn) {
            btn.addEventListener("click", function () {
              chatInput.value = btn.getAttribute("data-query");
              sendMessage();
            });
          });
        }

        function appendMessageDOM(msg, animate) {
          // Remove welcome screen if present
          var ws = document.getElementById("welcome-screen");
          if (ws) ws.remove();

          var wrapper = document.createElement("div");
          wrapper.className = "message";
          if (animate === false) wrapper.style.animation = "none";
          if (animate === false) wrapper.style.opacity = "1";

          var isUser = msg.role === "user";

          // Avatar
          var avatar = document.createElement("div");
          avatar.className = "message-avatar " + (isUser ? "user" : "nova");
          avatar.textContent = isUser ? "U" : "N";
          avatar.setAttribute("aria-hidden", "true");

          // Body
          var body = document.createElement("div");
          body.className = "message-body";

          // Sender name
          var sender = document.createElement("div");
          sender.className = "message-sender " + (isUser ? "user" : "nova");
          sender.textContent = isUser ? "You" : "Nova";

          // Content
          var content = document.createElement("div");
          content.className = "message-content";
          if (isUser) {
            content.textContent = msg.content;
          } else {
            content.innerHTML = renderMarkdown(msg.content);
          }

          body.appendChild(sender);
          body.appendChild(content);

          // Source badges and confidence (assistant only)
          if (!isUser) {
            var sources = msg.sources || [];
            var confidence = msg.confidence;
            if (
              sources.length > 0 ||
              (typeof confidence === "number" && confidence > 0)
            ) {
              var meta = document.createElement("div");
              meta.className = "message-meta";
              sources.forEach(function (src) {
                var b = document.createElement("span");
                b.className = "meta-badge";
                b.textContent = src;
                meta.appendChild(b);
              });
              if (typeof confidence === "number" && confidence > 0) {
                var pct = Math.round(confidence * 100);
                var cls = pct >= 75 ? "high" : pct >= 50 ? "medium" : "low";
                var cb = document.createElement("span");
                cb.className = "conf-badge conf-" + cls;
                var bd = msg.confidence_breakdown;
                if (bd && bd.grade) {
                  cb.textContent = "Grade " + bd.grade + " \u2022 " + pct + "%";
                } else {
                  cb.textContent = pct + "% confidence";
                }
                meta.appendChild(cb);
              }
              body.appendChild(meta);
            }

            // Action buttons (assistant only)
            var actions = document.createElement("div");
            actions.className = "message-actions";
            actions.innerHTML =
              '<button class="msg-action-btn copy-btn" aria-label="Copy message"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy</button>' +
              '<button class="msg-action-btn thumbs-up-btn" aria-label="Thumbs up"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg></button>' +
              '<button class="msg-action-btn thumbs-down-btn" aria-label="Thumbs down"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3zm7-13h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"/></svg></button>';

            // Wire copy button
            actions
              .querySelector(".copy-btn")
              .addEventListener("click", function () {
                navigator.clipboard.writeText(msg.content).then(function () {
                  showToast("Copied to clipboard", "success");
                });
              });

            // Wire thumbs
            actions
              .querySelector(".thumbs-up-btn")
              .addEventListener("click", function () {
                this.classList.toggle("active");
                actions
                  .querySelector(".thumbs-down-btn")
                  .classList.remove("active");
              });
            actions
              .querySelector(".thumbs-down-btn")
              .addEventListener("click", function () {
                this.classList.toggle("active");
                actions
                  .querySelector(".thumbs-up-btn")
                  .classList.remove("active");
              });

            body.appendChild(actions);
          }

          // Timestamp
          if (msg.timestamp) {
            var ts = document.createElement("div");
            ts.className = "message-time";
            ts.textContent = formatTimestamp(msg.timestamp);
            body.appendChild(ts);
          }

          wrapper.appendChild(avatar);
          wrapper.appendChild(body);
          chatContainer.appendChild(wrapper);
        }

        function scrollToBottom() {
          requestAnimationFrame(function () {
            chatArea.scrollTop = chatArea.scrollHeight;
          });
        }

        // ========================================================================
        // THINKING INDICATOR
        // ========================================================================
        var thinkingTexts = [
          "Nova is thinking...",
          "Searching knowledge base...",
          "Analyzing data sources...",
          "Cross-referencing benchmarks...",
          "Generating response...",
        ];

        function showThinking() {
          var existing = document.getElementById("thinking-wrapper");
          if (existing) existing.remove();

          var wrapper = document.createElement("div");
          wrapper.className = "thinking-wrapper";
          wrapper.id = "thinking-wrapper";
          wrapper.innerHTML =
            '<div class="message-avatar nova" aria-hidden="true">N</div>' +
            '<div class="thinking-bubble">' +
            '<div class="thinking-dots-pill" aria-label="Nova is thinking">' +
            '<div class="thinking-dot"></div>' +
            '<div class="thinking-dot"></div>' +
            '<div class="thinking-dot"></div>' +
            "</div>" +
            '<div class="thinking-text" id="thinking-text">' +
            thinkingTexts[0] +
            "</div>" +
            '<div class="skeleton-line"></div>' +
            '<div class="skeleton-line"></div>' +
            '<div class="skeleton-line"></div>' +
            "</div>";
          chatContainer.appendChild(wrapper);
          scrollToBottom();

          // Cycle thinking text
          var idx = 0;
          wrapper._thinkInterval = setInterval(function () {
            idx = (idx + 1) % thinkingTexts.length;
            var el = document.getElementById("thinking-text");
            if (el) el.textContent = thinkingTexts[idx];
          }, 2000);
        }

        function hideThinking() {
          var el = document.getElementById("thinking-wrapper");
          if (el) {
            if (el._thinkInterval) clearInterval(el._thinkInterval);
            el.remove();
          }
        }

        // ========================================================================
        // SEND MESSAGE
        // ========================================================================
        function sendMessage() {
          var text = chatInput.value.trim();
          if (!text || state.isLoading) return;
          if (text.length > MAX_CHARS) {
            showToast(
              "Message is too long (max " + MAX_CHARS + " chars)",
              "error",
            );
            return;
          }

          // Ensure we have an active conversation
          if (!getActiveConv()) {
            createConversation();
          }
          var conv = getActiveConv();

          // Add user message
          var userMsg = {
            role: "user",
            content: text,
            timestamp: Date.now(),
          };
          conv.messages.push(userMsg);
          conv.updatedAt = Date.now();
          updateConvTitle(conv);
          saveConversations();
          renderSidebar();

          appendMessageDOM(userMsg, true);
          scrollToBottom();

          chatInput.value = "";
          chatInput.style.height = "auto";
          updateCharCount();
          updateSendBtn();

          state.isLoading = true;
          sendBtn.disabled = true;
          showThinking();

          // Build history
          var history = [];
          conv.messages.forEach(function (m) {
            if (m.role === "user" || m.role === "assistant") {
              history.push({ role: m.role, content: m.content });
            }
          });

          state.abortController = new AbortController();
          var timeout = setTimeout(function () {
            if (state.abortController) state.abortController.abort();
          }, 60000);

          fetch(API_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-CSRF-Token": window.__csrfToken,
            },
            body: JSON.stringify({
              message: text,
              conversation_id: conv.id,
              history: history.slice(-MAX_HISTORY),
            }),
            signal: state.abortController.signal,
          })
            .then(function (r) {
              clearTimeout(timeout);
              if (!r.ok) throw new Error("HTTP " + r.status);
              return r.json();
            })
            .then(function (data) {
              hideThinking();
              state.queryCount++;

              var assistantMsg = {
                role: "assistant",
                content: data.response || "No response received.",
                sources: data.sources || [],
                confidence: data.confidence || 0,
                confidence_breakdown: data.confidence_breakdown || null,
                timestamp: Date.now(),
              };
              conv.messages.push(assistantMsg);
              conv.updatedAt = Date.now();
              saveConversations();

              appendMessageDOM(assistantMsg, true);
              scrollToBottom();
            })
            .catch(function (err) {
              clearTimeout(timeout);
              hideThinking();

              var errorMsg;
              if (err.name === "AbortError") {
                errorMsg =
                  "Response is taking longer than usual. Please try again.";
              } else if (err.message && err.message.indexOf("429") > -1) {
                errorMsg = "Nova is busy. Please wait a moment and try again.";
              } else {
                errorMsg = "Connection error. Please try again.";
              }

              var errBanner = document.createElement("div");
              errBanner.className = "error-banner";
              errBanner.innerHTML =
                "<span>" +
                escapeHtml(errorMsg) +
                "</span>" +
                '<button id="retry-btn">Retry</button>';
              chatContainer.appendChild(errBanner);
              scrollToBottom();

              errBanner
                .querySelector("#retry-btn")
                .addEventListener("click", function () {
                  errBanner.remove();
                  chatInput.value = text;
                  sendMessage();
                });
            })
            .finally(function () {
              state.isLoading = false;
              state.abortController = null;
              sendBtn.disabled = !chatInput.value.trim();
              chatInput.focus();
            });
        }

        // ========================================================================
        // INPUT HANDLERS
        // ========================================================================
        function updateSendBtn() {
          sendBtn.disabled = !chatInput.value.trim() || state.isLoading;
        }

        function updateCharCount() {
          var len = chatInput.value.length;
          charCount.textContent = len + " / " + MAX_CHARS;
          charCount.classList.toggle("visible", len > 100);
          if (len > MAX_CHARS) {
            charCount.style.color = "var(--accent-red)";
          } else {
            charCount.style.color = "";
          }
        }

        chatInput.addEventListener("input", function () {
          this.style.height = "auto";
          this.style.height = Math.min(this.scrollHeight, 200) + "px";
          updateSendBtn();
          updateCharCount();
        });

        chatInput.addEventListener("keydown", function (e) {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
          }
        });

        sendBtn.addEventListener("click", sendMessage);

        // ========================================================================
        // CLEAR / NEW CHAT
        // ========================================================================
        clearChatBtn.addEventListener("click", function () {
          var conv = getActiveConv();
          if (conv) {
            conv.messages = [];
            conv.title = "New Chat";
            conv.updatedAt = Date.now();
            saveConversations();
            renderSidebar();
            renderChat();
          }
        });

        newChatBtn.addEventListener("click", function () {
          createConversation();
          closeSidebarMobile();
          chatInput.focus();
        });

        // ========================================================================
        // SIDEBAR TOGGLE
        // ========================================================================
        function closeSidebarMobile() {
          if (window.innerWidth <= 1024) {
            sidebar.classList.add("collapsed");
            sidebarOverlay.classList.remove("visible");
            setTimeout(function () {
              sidebarOverlay.style.display = "none";
            }, 300);
          }
        }

        sidebarToggle.addEventListener("click", function () {
          var isCollapsed = sidebar.classList.contains("collapsed");
          if (isCollapsed) {
            sidebar.classList.remove("collapsed");
            if (window.innerWidth <= 1024) {
              sidebarOverlay.style.display = "block";
              requestAnimationFrame(function () {
                sidebarOverlay.classList.add("visible");
              });
            }
          } else {
            sidebar.classList.add("collapsed");
            sidebarOverlay.classList.remove("visible");
            setTimeout(function () {
              sidebarOverlay.style.display = "none";
            }, 300);
          }
        });

        sidebarOverlay.addEventListener("click", closeSidebarMobile);

        // Escape key closes sidebar on mobile
        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape") {
            closeSidebarMobile();
          }
        });

        // ========================================================================
        // ORB ACCENT ANIMATION (decorative mini orb)
        // ========================================================================
        (function () {
          var canvas = document.getElementById("orb-canvas");
          if (!canvas) return;
          var ctx = canvas.getContext("2d");
          var W = 240,
            H = 240;
          var CX = W / 2,
            CY = H / 2;
          var orbR = 40;
          var t = 0;
          var dots = [];
          for (var i = 0; i < 60; i++) {
            var phi = Math.acos(1 - 2 * Math.random());
            var theta = Math.random() * Math.PI * 2;
            dots.push({
              phi: phi,
              theta: theta,
              size: 0.8 + Math.random() * 0.8,
            });
          }
          function draw() {
            ctx.clearRect(0, 0, W, H);
            var rotY = t * 0.3;

            // Core glow
            var g = ctx.createRadialGradient(CX, CY, 0, CX, CY, orbR * 2);
            g.addColorStop(0, "rgba(90,84,189,0.15)");
            g.addColorStop(0.5, "rgba(107,179,205,0.06)");
            g.addColorStop(1, "rgba(0,0,0,0)");
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, W, H);

            dots.forEach(function (d) {
              var x = orbR * Math.sin(d.phi) * Math.cos(d.theta + rotY);
              var z = orbR * Math.sin(d.phi) * Math.sin(d.theta + rotY);
              var y = orbR * Math.cos(d.phi);
              var scale = 300 / (300 + z);
              var alpha =
                (0.3 + scale * 0.4) * (0.5 + 0.5 * Math.sin(t * 2 + d.phi));
              ctx.beginPath();
              ctx.arc(
                CX + x * scale,
                CY + y * scale,
                d.size * scale,
                0,
                Math.PI * 2,
              );
              ctx.fillStyle = "rgba(107,179,205," + alpha.toFixed(3) + ")";
              ctx.fill();
            });

            t += 0.016;
            requestAnimationFrame(draw);
          }
          draw();
        })();

        // ========================================================================
        // INIT
        // ========================================================================
        loadConversations();

        // Default: sidebar open on desktop, collapsed on mobile
        if (window.innerWidth <= 1024) {
          sidebar.classList.add("collapsed");
        }

        // If no conversations exist, or no active one, create fresh
        if (
          Object.keys(state.conversations).length === 0 ||
          !state.activeConvId
        ) {
          if (Object.keys(state.conversations).length > 0) {
            var keys = Object.keys(state.conversations).sort(function (a, b) {
              return (
                (state.conversations[b].updatedAt || 0) -
                (state.conversations[a].updatedAt || 0)
              );
            });
            state.activeConvId = keys[0];
          }
        }

        renderSidebar();
        renderChat();
        chatInput.focus();
      })();
    </script>
