<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Nova AI - Your intelligent recruitment assistant. Get real-time market data, salary benchmarks, competitive insights, and media planning advice powered by AI."
    />
    <link
      rel="canonical"
      href="https://media-plan-generator.onrender.com/nova"
    />
    <title>Nova AI - Recruitment Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=optional"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/tokens.css" />
    <link
      rel="preload"
      href="/static/css/nova.css"
      as="style"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <noscript><link rel="stylesheet" href="/static/css/nova.css" /></noscript>
    <!-- PostHog Analytics -->

    <script>
      (function () {
        fetch("/api/config")
          .then(function (r) {
            return r.json();
          })
          .then(function (d) {
            if (d && d.posthog_key) {
              posthog.init(d.posthog_key, {
                api_host: "https://us.i.posthog.com",
                person_profiles: "identified_only",
                autocapture: true,
                capture_pageview: true,
                capture_pageleave: true,
              });
            }
          })
          .catch(function () {});
      })();
    </script>
  </head>
  <body>
    <script>
      window.__csrfToken = "";
      window.__csrfTokenFetchedAt = 0;
      function __refreshCsrfToken() {
        return fetch("/api/csrf-token")
          .then(function (r) {
            return r.json();
          })
          .then(function (d) {
            window.__csrfToken = d.token || "";
            window.__csrfTokenFetchedAt = Date.now();
          })
          .catch(function () {});
      }
      window.__csrfReady = __refreshCsrfToken();
      // S25: Auto-refresh CSRF token every 45 minutes to prevent "Session expired"
      setInterval(__refreshCsrfToken, 45 * 60 * 1000);
    </script>

    <!-- Toast container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Sidebar overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="app">
      <!-- Sidebar -->
      <aside
        class="sidebar"
        id="sidebar"
        role="navigation"
        aria-label="Conversation history"
      >
        <div class="sidebar-header">
          <div class="sidebar-brand">
            <div class="sidebar-brand-icon">N</div>
            <div class="sidebar-brand-text">
              Nova AI
              <span>Recruitment Intelligence</span>
            </div>
          </div>
          <button
            class="new-chat-btn"
            id="new-chat-btn"
            title="Start a new conversation"
            aria-label="New chat"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            New Chat
          </button>
        </div>
        <div class="sidebar-search">
          <div class="sidebar-search-wrap">
            <svg
              class="sidebar-search-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input
              type="text"
              class="sidebar-search-input"
              id="conv-search-input"
              placeholder="Search conversations..."
              aria-label="Search conversations"
              autocomplete="off"
            />
          </div>
        </div>
        <div
          class="sidebar-conversations"
          id="conv-list"
          role="list"
          aria-label="Conversations"
        ></div>
        <div class="sidebar-footer">
          <a href="/hub" class="sidebar-footer-link">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3" y="3" width="7" height="7" />
              <rect x="14" y="3" width="7" height="7" />
              <rect x="14" y="14" width="7" height="7" />
              <rect x="3" y="14" width="7" height="7" />
            </svg>
            Back to Suite
          </a>
          <span class="sidebar-footer-link sidebar-footer-brand">
            Powered by Joveo
          </span>
        </div>
      </aside>

      <!-- Main chat -->
      <div class="main">
        <!-- Orb accent (decorative, top-left) -->
        <div class="orb-accent" id="orb-accent" aria-hidden="true">
          <canvas id="orb-canvas" width="240" height="240"></canvas>
        </div>

        <!-- Top bar -->
        <div class="topbar">
          <div class="topbar-left">
            <button
              class="sidebar-toggle"
              id="sidebar-toggle"
              aria-label="Toggle sidebar"
            >
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <line x1="3" y1="6" x2="21" y2="6" />
                <line x1="3" y1="12" x2="21" y2="12" />
                <line x1="3" y1="18" x2="21" y2="18" />
              </svg>
            </button>
            <span class="topbar-title">Nova AI</span>
            <span class="topbar-model">v4.0</span>
          </div>
          <div class="topbar-right">
            <!-- Conversations list (toggles sidebar) -->
            <button
              class="topbar-btn"
              id="conv-list-btn"
              title="Past conversations"
              aria-label="View conversations"
              onclick="document.getElementById('sidebar-toggle').click()"
            >
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <line x1="8" y1="6" x2="21" y2="6" />
                <line x1="8" y1="12" x2="21" y2="12" />
                <line x1="8" y1="18" x2="21" y2="18" />
                <line x1="3" y1="6" x2="3.01" y2="6" />
                <line x1="3" y1="12" x2="3.01" y2="12" />
                <line x1="3" y1="18" x2="3.01" y2="18" />
              </svg>
            </button>
            <!-- Theme toggle (sun/moon) -->
            <button
              class="topbar-btn"
              id="theme-toggle-btn"
              title="Toggle dark/light mode"
              aria-label="Toggle theme"
            >
              <svg
                id="theme-icon-moon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
              </svg>
              <svg
                id="theme-icon-sun"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                style="display: none"
              >
                <circle cx="12" cy="12" r="5" />
                <line x1="12" y1="1" x2="12" y2="3" />
                <line x1="12" y1="21" x2="12" y2="23" />
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                <line x1="1" y1="12" x2="3" y2="12" />
                <line x1="21" y1="12" x2="23" y2="12" />
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
              </svg>
            </button>
            <!-- Auto-TTS toggle -->
            <button
              class="topbar-btn tts-toggle"
              id="auto-tts-btn"
              title="Auto-read responses (off)"
              aria-label="Toggle auto text-to-speech"
            >
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
              </svg>
            </button>
            <!-- Share conversation -->
            <button
              class="topbar-btn"
              id="share-btn"
              title="Share conversation"
              aria-label="Share conversation"
            >
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="18" cy="5" r="3" />
                <circle cx="6" cy="12" r="3" />
                <circle cx="18" cy="19" r="3" />
                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
                <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
              </svg>
            </button>
            <!-- Export conversation -->
            <button
              class="topbar-btn"
              id="export-btn"
              title="Export conversation"
              aria-label="Export conversation"
            >
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="7 10 12 15 17 10" />
                <line x1="12" y1="15" x2="12" y2="3" />
              </svg>
            </button>
            <!-- Keyboard shortcuts -->
            <button
              class="topbar-btn"
              id="shortcuts-btn"
              title="Keyboard shortcuts"
              aria-label="Keyboard shortcuts"
            >
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="2" y="4" width="20" height="16" rx="2" ry="2" />
                <line x1="6" y1="8" x2="6" y2="8" />
                <line x1="10" y1="8" x2="10" y2="8" />
                <line x1="14" y1="8" x2="14" y2="8" />
                <line x1="18" y1="8" x2="18" y2="8" />
                <line x1="6" y1="12" x2="6" y2="12" />
                <line x1="18" y1="12" x2="18" y2="12" />
                <line x1="8" y1="16" x2="16" y2="16" />
              </svg>
            </button>
            <!-- Clear chat -->
            <button
              class="topbar-btn"
              id="clear-chat-btn"
              title="Clear current chat"
              aria-label="Clear chat"
            >
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="3 6 5 6 21 6" />
                <path
                  d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
                />
              </svg>
            </button>
          </div>
        </div>

        <!-- Chat area -->
        <div
          class="chat-area"
          id="chat-area"
          role="log"
          aria-live="polite"
          aria-label="Chat messages"
        >
          <div class="chat-container" id="chat-container"></div>
        </div>

        <!-- Input -->
        <div class="input-wrapper">
          <div class="input-container">
            <!-- File chips area (shown when files are attached) -->
            <div class="file-chips" id="file-chips"></div>
            <input
              type="file"
              id="file-input"
              accept=".pdf,.csv,.xlsx,.txt,.json,.docx"
              style="display: none"
            />
            <div class="input-box" id="input-box">
              <textarea
                class="chat-textarea"
                id="chat-input"
                placeholder="Ask Nova about recruitment, media plans, benchmarks..."
                rows="1"
                aria-label="Message input"
                autocomplete="off"
              ></textarea>
              <div class="input-actions">
                <!-- Attach file -->
                <button
                  class="attach-btn"
                  id="attach-btn"
                  title="Attach file (PDF, CSV, XLSX, TXT, JSON, DOCX, max 5MB)"
                  aria-label="Attach file"
                >
                  <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path
                      d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"
                    />
                  </svg>
                </button>
                <!-- Voice input -->
                <button
                  class="voice-btn"
                  id="voice-btn"
                  title="Voice input"
                  aria-label="Voice input"
                >
                  <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path
                      d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"
                    />
                    <path d="M19 10v2a7 7 0 01-14 0v-2" />
                    <line x1="12" y1="19" x2="12" y2="23" />
                    <line x1="8" y1="23" x2="16" y2="23" />
                  </svg>
                </button>
                <!-- Stop generation -->
                <button
                  class="stop-btn"
                  id="stop-btn"
                  title="Stop generation"
                  aria-label="Stop"
                >
                  <svg viewBox="0 0 24 24" fill="currentColor">
                    <rect x="6" y="6" width="12" height="12" rx="2" />
                  </svg>
                </button>
                <!-- Send -->
                <button
                  class="send-btn"
                  id="send-btn"
                  disabled
                  title="Send message"
                  aria-label="Send"
                >
                  <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <line x1="22" y1="2" x2="11" y2="13" />
                    <polygon points="22 2 15 22 11 13 2 9 22 2" />
                  </svg>
                </button>
              </div>
            </div>
            <div style="display: flex; align-items: center; gap: 0">
              <div class="char-count" id="char-count">0 / 4000</div>
              <div
                id="token-indicator"
                style="
                  font-size: 11px;
                  color: var(--text-muted);
                  display: inline-flex;
                  align-items: center;
                  gap: 4px;
                  margin-left: 8px;
                  opacity: 0;
                  transition: opacity 0.3s;
                "
                title="Approximate token usage for this conversation"
              >
                <svg
                  width="12"
                  height="12"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  style="flex-shrink: 0"
                >
                  <path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z" />
                  <line x1="16" y1="8" x2="2" y2="22" />
                  <line x1="17.5" y1="15" x2="9" y2="15" />
                </svg>
                <span class="token-text">0 tokens</span>
              </div>
            </div>
            <div class="input-hint">
              Enter to send &middot; Shift+Enter for new line
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="/static/js/nova.js" defer></script>

    <footer style="display: none" aria-hidden="true">
      Nova AI Suite &middot; Powered by Joveo &middot; Built by
      <a
        href="https://www.linkedin.com/in/chandel13/"
        target="_blank"
        rel="noopener"
        >Shubham Singh Chandel</a
      >
    </footer>
    <script>
      // Nova Platform shell compatibility
      (function () {
        if (window.__NOVA_PLATFORM) {
          document
            .querySelectorAll(
              "nav, .nav, footer, .footer, .standalone-nav, .standalone-header, .standalone-footer, .nova-chat-widget",
            )
            .forEach(function (el) {
              el.style.display = "none";
            });
          document
            .querySelectorAll('a[href="/"], a[href="/hub"]')
            .forEach(function (a) {
              if (
                a.textContent.includes("Back") ||
                a.textContent.includes("Hub") ||
                a.textContent.includes("Suite")
              ) {
                a.style.display = "none";
              }
            });
          document.dispatchEvent(new CustomEvent("nova:fragment-loaded"));
        }
      })();
    </script>
  </body>
</html>
