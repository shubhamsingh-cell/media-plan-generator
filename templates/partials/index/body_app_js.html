<script>
  let currentStep = 1;
  const totalSteps = 5;
  let channelsDB = null;
  let selectedIndustry = null;
  let selectedJobCategories = [];

  // Module-level AbortController for generation cancellation
  let _genAbortController = null;
  let locations = [];
  let roles = [];
  let competitors = [];
  let lastGeneratedBlob = null;
  let lastGeneratedFilename = null;

  // ============================================
  // File upload state & handlers
  // ============================================
  let briefFiles = [];
  let transcriptFiles = [];
  let historicalFiles = [];

  function initFileUploads() {
    _wireUploadZone("briefUploadZone", "briefFileInput", handleBriefFiles);
    _wireUploadZone(
      "transcriptUploadZone",
      "transcriptFileInput",
      handleTranscriptFiles,
    );
    _wireUploadZone(
      "historicalUploadZone",
      "historicalFileInput",
      handleHistoricalFiles,
    );

    // Exact input toggles
    const budgetSel = document.getElementById("budgetRange");
    const hireSel = document.getElementById("hireVolume");
    if (budgetSel) budgetSel.addEventListener("change", toggleExactBudget);
    if (hireSel) hireSel.addEventListener("change", toggleExactHires);

    // Clear validation errors and add visual feedback on select change
    [
      "budgetRange",
      "campaignDuration",
      "campaignStartMonth",
      "hireVolume",
    ].forEach(function (id) {
      var sel = document.getElementById(id);
      if (sel) {
        sel.addEventListener("change", function () {
          // Clear any field-error state
          if (typeof _clearFieldError === "function") _clearFieldError(sel);
          // Toggle has-value class for visual feedback
          if (sel.value) {
            sel.classList.add("has-value");
          } else {
            sel.classList.remove("has-value");
          }
        });
      }
    });
  }

  function _wireUploadZone(zoneId, inputId, handler) {
    const zone = document.getElementById(zoneId);
    const input = document.getElementById(inputId);
    if (!zone || !input) return;

    zone.addEventListener("click", () => input.click());
    input.addEventListener("change", () => handler(input.files));

    zone.addEventListener("dragover", (e) => {
      e.preventDefault();
      zone.classList.add("drag-over");
    });
    zone.addEventListener("dragleave", () =>
      zone.classList.remove("drag-over"),
    );
    zone.addEventListener("drop", (e) => {
      e.preventDefault();
      zone.classList.remove("drag-over");
      handler(e.dataTransfer.files);
      input.value = "";
    });
  }

  function _readFileAsBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(",")[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function handleBriefFiles(fileList) {
    for (const f of fileList) {
      if (f.size > 10 * 1024 * 1024) {
        showToast(f.name + " exceeds 10MB limit", "warning");
        continue;
      }
      const data = await _readFileAsBase64(f);
      briefFiles.push({
        name: f.name,
        size: f.size,
        type: f.type,
        data: data,
      });
    }
    _renderFileList("briefFileList", briefFiles, "brief");
  }

  async function handleTranscriptFiles(fileList) {
    for (const f of fileList) {
      if (f.size > 10 * 1024 * 1024) {
        showToast(f.name + " exceeds 10MB limit", "warning");
        continue;
      }
      const data = await _readFileAsBase64(f);
      transcriptFiles.push({
        name: f.name,
        size: f.size,
        type: f.type,
        data: data,
      });
    }
    _renderFileList("transcriptFileList", transcriptFiles, "transcript");
  }

  async function handleHistoricalFiles(fileList) {
    for (const f of fileList) {
      if (f.size > 10 * 1024 * 1024) {
        showToast(f.name + " exceeds 10MB limit", "warning");
        continue;
      }
      const data = await _readFileAsBase64(f);
      historicalFiles.push({
        name: f.name,
        size: f.size,
        type: f.type,
        data: data,
      });
    }
    _renderFileList("historicalFileList", historicalFiles, "historical");
  }

  function _renderFileList(containerId, files, type) {
    const el = document.getElementById(containerId);
    if (!el) return;
    el.innerHTML = files
      .map(
        (f, i) =>
          '<div class="file-item">' +
          '<span><span class="file-item-name">' +
          f.name +
          "</span>" +
          '<span class="file-item-size">(' +
          (f.size / 1024).toFixed(0) +
          " KB)</span></span>" +
          '<span class="file-item-remove" onclick="removeFile(\'' +
          type +
          "'," +
          i +
          ')">&#10005;</span>' +
          "</div>",
      )
      .join("");
  }

  function removeFile(type, index) {
    if (type === "brief") {
      briefFiles.splice(index, 1);
      _renderFileList("briefFileList", briefFiles, "brief");
    } else if (type === "transcript") {
      transcriptFiles.splice(index, 1);
      _renderFileList("transcriptFileList", transcriptFiles, "transcript");
    } else if (type === "historical") {
      historicalFiles.splice(index, 1);
      _renderFileList("historicalFileList", historicalFiles, "historical");
    }
  }

  function toggleExactBudget() {
    const sel = document.getElementById("budgetRange");
    const wrap = document.getElementById("exactBudgetWrap");
    if (!sel || !wrap) return;
    wrap.style.display = sel.value === "__exact__" ? "block" : "none";
    if (sel.value !== "__exact__") {
      const inp = document.getElementById("exactBudget");
      if (inp) inp.value = "";
    }
  }

  function toggleExactHires() {
    const sel = document.getElementById("hireVolume");
    const wrap = document.getElementById("exactHiresWrap");
    if (!sel || !wrap) return;
    wrap.style.display = sel.value === "__exact__" ? "block" : "none";
    if (sel.value !== "__exact__") {
      const inp = document.getElementById("exactHires");
      if (inp) inp.value = "";
    }
  }

  // ============================================
  // Budget feasibility check - industry average CPH benchmarks
  // ============================================
  const INDUSTRY_CPH_BENCHMARKS = {
    technology: 4000,
    healthcare: 3500,
    finance: 4500,
    engineering: 5000,
    retail: 1200,
    hospitality: 800,
    logistics: 1500,
    manufacturing: 2500,
    construction: 2000,
    education: 2000,
    aerospace: 5500,
    pharmaceutical: 6000,
    energy: 4000,
    legal: 5000,
    general: 2000,
  };

  // Map budget range strings to approximate midpoint values
  const BUDGET_MIDPOINTS = {
    "< $50,000": 25000,
    "$50,000 - $250,000": 150000,
    "$250,000 - $500,000": 375000,
    "$500,000 - $1,000,000": 750000,
    "$1,000,000 - $3,000,000": 2000000,
    "$3,000,000+": 3000000,
  };

  // Map hire volume strings to approximate counts
  const HIRE_VOLUME_MAP = {
    "1-10 hires": 5,
    "10-50 hires": 30,
    "50-100 hires": 75,
    "100-500 hires": 300,
    "500+ hires": 600,
  };

  // Map data-industry attribute values to CPH benchmark keys
  function getIndustryCphKey(industryAttr) {
    if (!industryAttr) return "general";
    var lower = industryAttr.toLowerCase();
    var keys = Object.keys(INDUSTRY_CPH_BENCHMARKS);
    for (var i = 0; i < keys.length; i++) {
      if (lower.indexOf(keys[i]) !== -1) return keys[i];
    }
    return "general";
  }

  function checkBudgetFeasibility() {
    var budgetEl = document.getElementById("budgetRange");
    var hireEl = document.getElementById("hireVolume");
    if (!budgetEl || !hireEl) return;

    var budgetStr = budgetEl.value;
    var hireStr = hireEl.value;
    var industryStr = getIndustryCphKey(selectedIndustry);

    if (!budgetStr || !hireStr) {
      // Remove any existing warning if inputs are cleared
      var existingWarning = document.getElementById("budgetFeasibilityWarning");
      if (existingWarning) existingWarning.remove();
      return;
    }

    var budgetMid = BUDGET_MIDPOINTS[budgetStr] || 100000;
    var hireCount = HIRE_VOLUME_MAP[hireStr] || 10;
    var industryCph =
      INDUSTRY_CPH_BENCHMARKS[industryStr] ||
      INDUSTRY_CPH_BENCHMARKS["general"];

    var budgetPerHire = budgetMid / hireCount;
    var minViableBudget = industryCph * hireCount;
    var realisticHires = Math.max(1, Math.floor(budgetMid / industryCph));

    // Remove any existing warning
    var existingWarning = document.getElementById("budgetFeasibilityWarning");
    if (existingWarning) existingWarning.remove();

    if (budgetPerHire < industryCph * 0.3) {
      // Create warning banner
      var warningDiv = document.createElement("div");
      warningDiv.id = "budgetFeasibilityWarning";
      warningDiv.style.cssText =
        "background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.25);border-radius:8px;padding:14px 18px;margin:12px 0;color:#FBBF24;font-size:14px;line-height:1.5;";

      var severity =
        budgetPerHire < industryCph * 0.1
          ? "UNREALISTIC"
          : "SEVERELY UNDERFUNDED";
      var warningIcon = "\u26A0\uFE0F";

      warningDiv.innerHTML =
        "<strong>" +
        warningIcon +
        " Budget Reality Check (" +
        severity +
        "):</strong><br>" +
        "A " +
        budgetStr +
        " budget for ~" +
        hireCount +
        " hires equals ~$" +
        Math.round(budgetPerHire).toLocaleString() +
        "/hire \u2014 " +
        "well below the industry average of ~$" +
        industryCph.toLocaleString() +
        "/hire.<br>" +
        "<strong>Realistic estimate:</strong> This budget could support ~" +
        realisticHires +
        " hire(s). " +
        "To hire " +
        hireCount +
        "+, you would need ~$" +
        minViableBudget.toLocaleString() +
        "+.";

      // Insert after the hire volume field's parent row
      var targetEl = hireEl.closest(".form-group") || hireEl.parentElement;
      var targetRow = targetEl.closest(".form-row") || targetEl;
      if (targetRow && targetRow.parentElement) {
        targetRow.parentElement.insertBefore(warningDiv, targetRow.nextSibling);
      }
    }
  }

  // ============================================
  // HTML escaping helper to prevent XSS
  // ============================================
  function escapeHtml(str) {
    if (str == null) return "";
    const div = document.createElement("div");
    div.textContent = String(str);
    return div.innerHTML;
  }

  // ============================================
  // 22. Toast notification system
  // ============================================
  function showToast(message, type = "info") {
    const container = document.getElementById("toastContainer");
    const toast = document.createElement("div");
    toast.className = `toast-item toast-${type}`;
    toast.setAttribute("role", "alert");
    toast.setAttribute("aria-live", "polite");

    const icons = {
      success: "&#10004;",
      error: "&#10008;",
      warning: "&#9888;",
      info: "&#8505;",
    };

    const iconSpan = document.createElement("span");
    iconSpan.className = "toast-icon";
    iconSpan.innerHTML = icons[type] || icons.info;
    const msgSpan = document.createElement("span");
    msgSpan.className = "toast-message";
    msgSpan.textContent = message;

    const closeSpan = document.createElement("span");
    closeSpan.className = "toast-close";
    closeSpan.textContent = "\u00d7";
    closeSpan.setAttribute("aria-label", "Dismiss notification");
    closeSpan.setAttribute("role", "button");
    closeSpan.setAttribute("tabindex", "0");
    closeSpan.onclick = function () {
      toast.classList.add("toast-exiting");
      setTimeout(() => toast.remove(), 300);
    };
    closeSpan.onkeydown = function (e) {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        closeSpan.onclick();
      }
    };

    toast.appendChild(iconSpan);
    toast.appendChild(msgSpan);
    toast.appendChild(closeSpan);

    container.appendChild(toast);

    // Error toasts persist until manually dismissed; others auto-dismiss after 5s
    if (type !== "error") {
      setTimeout(() => {
        if (toast.parentElement) {
          toast.classList.add("toast-exiting");
          setTimeout(() => {
            if (toast.parentElement) toast.remove();
          }, 300);
        }
      }, 5000);
    }
  }

  // ============================================
  // Plan Summary Dashboard Builder
  // ============================================
  function buildPlanDashboard(payload, serverData) {
    const container = document.getElementById("planDashboardContent");
    if (!container) return;
    const sd = serverData || {};
    const channels = sd.channels || [];
    const bs = sd.budget_summary || {};
    const mi = sd.market_insights || {};
    const recs = sd.recommendations || [];
    const meta = sd.metadata || {};

    // Fallback values from payload when server data is unavailable
    const budgetDisplay = bs.total
      ? "$" + Number(bs.total).toLocaleString()
      : payload.budget_range || "Not specified";
    const rolesCount = (meta.roles || payload.target_roles || []).length;
    const locationsCount = (meta.locations || payload.locations || []).length;
    const channelCount =
      channels.length ||
      Object.keys(payload.channel_categories || {}).filter(
        (k) => payload.channel_categories[k] !== false,
      ).length;

    // Compute avg CPC from server channels
    let avgCpc = "N/A";
    if (channels.length > 0) {
      const cpcNums = channels
        .map((c) => parseFloat(String(c.cpc_range).replace(/[^0-9.]/g, "")))
        .filter((n) => n > 0);
      if (cpcNums.length > 0)
        avgCpc =
          "$" +
          (cpcNums.reduce((a, b) => a + b, 0) / cpcNums.length).toFixed(2);
    }

    const hiringDiff = mi.hiring_difficulty || "moderate";
    const diffClass = /easy|low|favorable/i.test(hiringDiff)
      ? "favorable"
      : /hard|high|challenging|difficult/i.test(hiringDiff)
        ? "challenging"
        : "moderate";

    let html = '<div class="plan-dashboard">';

    // ── 1. Summary Cards Row ──
    html += '<div class="plan-dashboard-title">Plan Results Dashboard</div>';
    html += '<div class="plan-metrics-row">';
    html +=
      '<div class="plan-metric-card"><div class="plan-metric-label">Total Budget</div><div class="plan-metric-value accent">' +
      escapeHtml(budgetDisplay) +
      "</div></div>";
    html +=
      '<div class="plan-metric-card"><div class="plan-metric-label">Channels Selected</div><div class="plan-metric-value">' +
      channelCount +
      "</div></div>";
    html +=
      '<div class="plan-metric-card"><div class="plan-metric-label">Avg CPC</div><div class="plan-metric-value">' +
      escapeHtml(avgCpc) +
      "</div></div>";
    html +=
      '<div class="plan-metric-card"><div class="plan-metric-label">Hiring Difficulty</div><div class="plan-metric-value ' +
      diffClass +
      '">' +
      escapeHtml(hiringDiff.charAt(0).toUpperCase() + hiringDiff.slice(1)) +
      "</div></div>";
    html += "</div>";

    // ── 2. Channel Allocation Chart (inline SVG) ──
    if (channels.length > 0) {
      html += '<div class="plan-section-label">Channel Budget Allocation</div>';
      html += '<div class="plan-svg-chart">';
      const maxBudget = Math.max(...channels.map((c) => c.budget), 1);
      const barH = 28,
        gap = 8,
        labelW = 150,
        chartW = 500,
        padR = 90;
      const svgH = channels.length * (barH + gap) + 10;
      const colors = [
        "#5a54bd",
        "#6bb3cd",
        "#7b75d4",
        "#f59e0b",
        "#06b6d4",
        "#f43f5e",
        "#a78bfa",
        "#34d399",
      ];
      html +=
        '<svg width="100%" viewBox="0 0 ' +
        (labelW + chartW + padR) +
        " " +
        svgH +
        '" role="img" aria-label="Channel allocation chart">';
      channels.forEach((ch, i) => {
        const y = i * (barH + gap) + 5;
        const w = Math.max((ch.budget / maxBudget) * chartW, 4);
        const col = colors[i % colors.length];
        html +=
          '<text x="' +
          (labelW - 8) +
          '" y="' +
          (y + barH / 2 + 4) +
          '" fill="#a1a1a1" font-size="12" text-anchor="end" font-family="Inter,sans-serif">' +
          escapeHtml(ch.name) +
          "</text>";
        html +=
          '<rect x="' +
          labelW +
          '" y="' +
          y +
          '" width="0" height="' +
          barH +
          '" rx="4" fill="' +
          col +
          '" opacity="0.85"><animate attributeName="width" from="0" to="' +
          w +
          '" dur="0.8s" fill="freeze" begin="0.' +
          i * 1 +
          's"/></rect>';
        html +=
          '<text x="' +
          (labelW + w + 8) +
          '" y="' +
          (y + barH / 2 + 4) +
          '" fill="#d4d4d8" font-size="11" font-family="Inter,sans-serif" font-weight="600">$' +
          Number(ch.budget).toLocaleString() +
          " (" +
          ch.allocation_pct +
          "%)</text>";
      });
      html += "</svg></div>";
    }

    // ── 2b. Sankey Flow Budget Visualizer ──
    if (channels.length > 1) {
      html += '<div class="plan-section-label">Budget Flow</div>';
      html +=
        '<div id="sankeyFlowContainer" style="margin:0 0 16px;padding:12px;' +
        "background:rgba(32,32,88,0.15);border-radius:12px;" +
        'border:1px solid rgba(90,84,189,0.15);overflow:hidden;">' +
        '<div style="color:#9ca3af;text-align:center;padding:30px;font-family:Inter,sans-serif;">' +
        "Loading flow diagram...</div></div>";
    }

    // ── 3. Channel Details Table (sortable) ──
    if (channels.length > 0) {
      html += '<div class="plan-section-label">Channel Details</div>';
      html +=
        '<div class="plan-table-wrap"><table class="plan-table" id="planChannelTable">';
      html += "<thead><tr>";
      html +=
        '<th data-col="name">Channel <span class="sort-arrow">&#9650;</span></th>';
      html +=
        '<th data-col="budget">Budget <span class="sort-arrow">&#9650;</span></th>';
      html +=
        '<th data-col="allocation_pct">% <span class="sort-arrow">&#9650;</span></th>';
      html +=
        '<th data-col="cpc_range">CPC Range <span class="sort-arrow">&#9650;</span></th>';
      html +=
        '<th data-col="cpa_range">CPA Range <span class="sort-arrow">&#9650;</span></th>';
      html +=
        '<th data-col="projected_clicks">Proj. Clicks <span class="sort-arrow">&#9650;</span></th>';
      html += "</tr></thead><tbody>";
      channels.forEach((ch) => {
        html += "<tr>";
        html +=
          '<td style="color:white;font-weight:500">' +
          escapeHtml(ch.name) +
          "</td>";
        html += "<td>$" + Number(ch.budget).toLocaleString() + "</td>";
        html += "<td>" + ch.allocation_pct + "%</td>";
        html += "<td>" + escapeHtml(ch.cpc_range) + "</td>";
        html += "<td>" + escapeHtml(ch.cpa_range) + "</td>";
        html += "<td>" + Number(ch.projected_clicks).toLocaleString() + "</td>";
        html += "</tr>";
      });
      html += "</tbody></table></div>";
    }

    // ── 4. Market Insights Panel ──
    html += '<div class="plan-section-label">Market Insights</div>';
    html += '<div class="plan-market-insights">';
    const insightItems = [
      {
        label: "Hiring Difficulty",
        val: mi.hiring_difficulty || "moderate",
      },
      { label: "Competition Level", val: mi.competition_level || "medium" },
      { label: "Salary Range", val: mi.salary_range || "N/A" },
      { label: "Demand Trend", val: mi.demand_trend || "stable" },
    ];
    insightItems.forEach((item) => {
      const cls = /easy|low|favorable|growing|high.demand/i.test(item.val)
        ? "favorable"
        : /hard|challenging|difficult|declining/i.test(item.val)
          ? "challenging"
          : "moderate";
      html +=
        '<div class="plan-insight-item"><div class="insight-label">' +
        escapeHtml(item.label) +
        '</div><div class="insight-val ' +
        cls +
        '">' +
        escapeHtml(
          String(item.val).charAt(0).toUpperCase() + String(item.val).slice(1),
        ) +
        "</div></div>";
    });
    html += "</div>";

    // ── 4b. Seasonal Impact Card ──
    var startMonth = payload.campaign_start_month || new Date().getMonth() + 1;
    var seasonalData = {
      quarter: "",
      label: "",
      impact: "",
      color: "",
      adjustment: 1.0,
    };
    if (startMonth >= 1 && startMonth <= 3) {
      seasonalData = {
        quarter: "Q1",
        label: "Peak Hiring Season",
        impact:
          "Expect 15-20% higher costs due to New Year hiring surge and budget refreshes. Competition for talent is at its highest.",
        color: "#f87171",
        adjustment: 1.18,
      };
    } else if (startMonth >= 4 && startMonth <= 6) {
      seasonalData = {
        quarter: "Q2",
        label: "Strong Hiring Period",
        impact:
          "Moderate competition with steady demand. Good balance of candidate availability and cost efficiency.",
        color: "#fbbf24",
        adjustment: 1.08,
      };
    } else if (startMonth >= 7 && startMonth <= 9) {
      seasonalData = {
        quarter: "Q3",
        label: "Summer Slowdown",
        impact:
          "Potential cost savings as competition decreases. Candidate response rates may be lower due to vacations.",
        color: "#4ade80",
        adjustment: 0.92,
      };
    } else {
      seasonalData = {
        quarter: "Q4",
        label: "Holiday Slowdown",
        impact:
          "Reduced activity as holiday season approaches. Plan ahead for Q1 ramp-up to secure budget and placements early.",
        color: "#60a5fa",
        adjustment: 0.88,
      };
    }
    html += '<div class="plan-section-label">Seasonal Impact</div>';
    html +=
      '<div class="plan-insights-card" style="border-left:3px solid ' +
      seasonalData.color +
      '">';
    html +=
      '<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">';
    html +=
      '<span style="font-size:24px;font-weight:700;color:' +
      seasonalData.color +
      '">' +
      seasonalData.quarter +
      "</span>";
    html +=
      '<div><div style="color:white;font-weight:600;font-size:14px">' +
      escapeHtml(seasonalData.label) +
      "</div>";
    html +=
      '<div style="color:var(--text-muted);font-size:12px">Month ' +
      startMonth +
      " start</div></div></div>";
    html +=
      '<div style="color:var(--text-secondary);font-size:13px;line-height:1.6">' +
      escapeHtml(seasonalData.impact) +
      "</div>";
    html +=
      '<div style="margin-top:10px;padding:8px 12px;background:rgba(255,255,255,0.04);border-radius:8px;font-size:12px;color:var(--text-muted)">';
    html +=
      'Budget adjustment factor: <strong style="color:' +
      seasonalData.color +
      '">' +
      (seasonalData.adjustment >= 1 ? "+" : "") +
      Math.round((seasonalData.adjustment - 1) * 100) +
      "%</strong>";
    html +=
      " — Consider " +
      (seasonalData.adjustment >= 1 ? "increasing" : "decreasing") +
      " budget by this factor for optimal ROI.</div>";
    html += "</div>";

    // ── 5. AI Recommendations ──
    const finalRecs =
      recs.length > 0
        ? recs
        : [
            "Targeting " +
              rolesCount +
              " role(s) across " +
              locationsCount +
              " location(s).",
            "Full channel strategy included in downloaded files.",
            "Review plan and reallocate underperforming channels after 2 weeks.",
          ];
    html += '<div class="plan-section-label">AI Recommendations</div>';
    html += '<div class="plan-insights-card"><ul class="plan-recs-list">';
    finalRecs.forEach((r, i) => {
      html +=
        '<li><span class="plan-rec-icon">' +
        (i + 1) +
        "</span><span>" +
        escapeHtml(r) +
        "</span></li>";
    });
    html += "</ul></div>";

    // ── 6. Download Section ──

          Number(bs.total) ||
          channels.reduce(function (s, c) {
            return s + (Number(c.budget) || 0);
          }, 0);
        SankeyViz.render(
          sankeyContainer,
          {
            budget: sankeyBudget,
            channels: channels,
          },
          {
            width: 900,
            height: Math.max(320, channels.length * 60 + 80),
            animate: true,
            interactive: true,
          },

          '<div style="color:#9ca3af;text-align:center;padding:20px;font-size:12px;">' +
          "Flow diagram unavailable</div>";

    // Wire sortable table headers
    const table = document.getElementById("planChannelTable");
    if (table && channels.length > 0) {
      let sortCol = null,
        sortAsc = true;
      table.querySelectorAll("th[data-col]").forEach((th) => {
        th.addEventListener("click", function () {
          const col = this.dataset.col;
          if (sortCol === col) {
            sortAsc = !sortAsc;
          } else {
            sortCol = col;
            sortAsc = true;
          }
          table
            .querySelectorAll("th")
            .forEach((h) => h.classList.remove("sorted"));
          this.classList.add("sorted");
          this.querySelector(".sort-arrow").innerHTML = sortAsc
            ? "&#9650;"
            : "&#9660;";
          const sorted = [...channels].sort((a, b) => {
            let va = a[col],
              vb = b[col];
            if (typeof va === "number") return sortAsc ? va - vb : vb - va;
            return sortAsc
              ? String(va).localeCompare(String(vb))
              : String(vb).localeCompare(String(va));
          });
          const tbody = table.querySelector("tbody");
          tbody.innerHTML = "";
          sorted.forEach((ch) => {
            let row = "<tr>";
            row +=
              '<td style="color:white;font-weight:500">' +
              escapeHtml(ch.name) +
              "</td>";
            row += "<td>$" + Number(ch.budget).toLocaleString() + "</td>";
            row += "<td>" + ch.allocation_pct + "%</td>";
            row += "<td>" + escapeHtml(ch.cpc_range) + "</td>";
            row += "<td>" + escapeHtml(ch.cpa_range) + "</td>";
            row +=
              "<td>" + Number(ch.projected_clicks).toLocaleString() + "</td>";
            row += "</tr>";
            tbody.innerHTML += row;
          });
        });
      });
    }

    // Show the dashboard section
    const section = document.getElementById("planDashboardSection");
    if (section) {
      section.classList.add("visible");
    }
  }

  const _FORM_STORAGE_KEY = "nova_plan_form";
  function saveFormState() {
    try {
      const state = {
        clientName: (document.getElementById("clientName") || {}).value || "",
        clientWebsite:
          (document.getElementById("clientWebsite") || {}).value || "",
        useCase: (document.getElementById("useCase") || {}).value || "",
        budgetRange: (document.getElementById("budgetRange") || {}).value || "",
        exactBudget: (document.getElementById("exactBudget") || {}).value || "",

        exactHires: (document.getElementById("exactHires") || {}).value || "",
        targetDemographic:
          (document.getElementById("targetDemographic") || {}).value || "",
        requesterName:
          (document.getElementById("requesterName") || {}).value || "",
        requesterEmail:
          (document.getElementById("requesterEmail") || {}).value || "",
        selectedIndustry: selectedIndustry || null,
        locations: locations || [],
        roles: roles || [],
        competitors: competitors || [],
        ts: Date.now(),
      };
      sessionStorage.setItem(_FORM_STORAGE_KEY, JSON.stringify(state));
    } catch (_e) {
      /* quota exceeded or private browsing */
    }
  }
  function restoreFormState() {
    try {
      const raw = sessionStorage.getItem(_FORM_STORAGE_KEY);
      if (!raw) return false;
      const s = JSON.parse(raw);
      if (!s || !s.ts) return false;
      // Only restore if saved within last 2 hours
      if (Date.now() - s.ts > 7200000) {
        sessionStorage.removeItem(_FORM_STORAGE_KEY);
        return false;
      }
      const setVal = (id, val) => {
        const el = document.getElementById(id);
        if (el && val) el.value = val;
      };
      setVal("clientName", s.clientName);
      setVal("clientWebsite", s.clientWebsite);
      setVal("useCase", s.useCase);
      setVal("budgetRange", s.budgetRange);
      setVal("exactBudget", s.exactBudget);
      setVal("campaignDuration", s.campaignDuration);
      setVal("campaignStartMonth", s.campaignStartMonth);
      setVal("hireVolume", s.hireVolume);
      setVal("exactHires", s.exactHires);
      setVal("targetDemographic", s.targetDemographic);
      setVal("requesterName", s.requesterName);
      setVal("requesterEmail", s.requesterEmail);
      if (s.selectedIndustry) {
        selectedIndustry = s.selectedIndustry;
      }
      if (Array.isArray(s.locations) && s.locations.length > 0) {
        s.locations.forEach((loc) => {
          if (typeof addTag === "function")
            addTag("locationsContainer", "locationInput", locations, loc);
          else locations.push(loc);
        });
      }
      if (Array.isArray(s.roles) && s.roles.length > 0) {
        s.roles.forEach((r) => {
          if (typeof addTag === "function")
            addTag("rolesContainer", "roleInput", roles, r);
          else roles.push(r);
        });
      }
      if (Array.isArray(s.competitors) && s.competitors.length > 0) {
        s.competitors.forEach((c) => {
          if (typeof addTag === "function")
            addTag("competitorsContainer", "competitorInput", competitors, c);
          else competitors.push(c);
        });
      }
      return true;
    } catch (_e) {
      return false;
    }
  }
  function clearFormState() {

    // Reset all fields
    [

  function _wireFormPersistence() {
    // Save on every input/change event in the form area

  function cancelGeneration() {

  function updateGenProgress(pct, statusMessage) {
    const fill = document.getElementById("genProgressFill");
    if (fill) fill.style.width = pct + "%";
    const steps = [
      { id: "genStep1", threshold: 10 },
      { id: "genStep2", threshold: 40 },
      { id: "genStep3", threshold: 60 },
      { id: "genStep4", threshold: 80 },
    ];
    steps.forEach(function (s, idx) {
      const el = document.getElementById(s.id);
      if (!el) return;
      if (pct >= s.threshold) {
        const nextThreshold = steps[idx + 1] ? steps[idx + 1].threshold : 100;
        if (pct >= nextThreshold) {
          el.classList.remove("gen-active");
          el.classList.add("gen-complete");
          el.querySelector(".gen-step-icon").innerHTML = "&#10003;";
        } else {
          el.classList.add("gen-active");
          el.classList.remove("gen-complete");
        }
      }
    });
    if (statusMessage) {
      const subtitleEl = document.getElementById("genSubtitle");
      if (subtitleEl) subtitleEl.textContent = statusMessage;
    }
  }

  const GEN_FACTS = [
    "Your plan queries up to 25 live APIs including BLS, Adzuna, SEC EDGAR, and Google Ads.",
    "The budget engine computes channel-by-channel dollar allocations based on your industry and role mix.",
    "Salary benchmarks are fused from multiple sources with confidence scoring for accuracy.",

  function showGenerationOverlay() {
    const overlay = document.getElementById("generationOverlay");
    overlay.style.display = "flex";
    requestAnimationFrame(() => {
      overlay.classList.add("visible");
    });

    // Reset all steps
    for (let i = 1; i <= 4; i++) {
      const step = document.getElementById(`genStep${i}`);
      step.classList.remove("gen-active", "gen-complete");
      step.querySelector(".gen-step-icon").innerHTML =
        '<span class="gen-spinner"></span>';
    }
    document.getElementById("genProgressFill").style.width = "0%";

    // Start elapsed timer
    genStartTime = Date.now();
    const elapsedEl = document.getElementById("genElapsed");
    if (elapsedEl) elapsedEl.textContent = "0:00";
    genElapsedInterval = setInterval(() => {
      const elapsed = Math.floor((Date.now() - genStartTime) / 1000);
      const mins = Math.floor(elapsed / 60);
      const secs = elapsed % 60;
      if (elapsedEl)
        elapsedEl.textContent = mins + ":" + (secs < 10 ? "0" : "") + secs;
    }, 1000);

    // Start countdown timer (5:00 -> 0:00)
    const countdownEl = document.getElementById("genCountdown");
    if (countdownEl) countdownEl.textContent = "5:00";
    if (genCountdownInterval) clearInterval(genCountdownInterval);
    genCountdownInterval = setInterval(() => {
      const elapsed = Math.floor((Date.now() - genStartTime) / 1000);
      const remaining = Math.max(0, GEN_TIMEOUT_SECS - elapsed);
      const rMins = Math.floor(remaining / 60);
      const rSecs = remaining % 60;
      if (countdownEl)
        countdownEl.textContent = rMins + ":" + (rSecs < 10 ? "0" : "") + rSecs;
      if (remaining <= 0 && genCountdownInterval) {
        clearInterval(genCountdownInterval);
        genCountdownInterval = null;
      }
    }, 1000);

    // Rotating "Did you know" facts while user waits
    const dykEl = document.getElementById("genDidYouKnow");
    if (dykEl) {
      let factIdx = Math.floor(Math.random() * GEN_FACTS.length);
      dykEl.textContent = GEN_FACTS[factIdx];
      dykEl.style.transition = "opacity 0.3s ease";
      genDidYouKnowInterval = setInterval(() => {
        factIdx = (factIdx + 1) % GEN_FACTS.length;
        dykEl.style.opacity = "0";
        setTimeout(() => {
          dykEl.textContent = GEN_FACTS[factIdx];
          dykEl.style.opacity = "1";
        }, 300);
      }, 6000);
    }

    // If using async polling, skip fake step timers -- server drives progress.
    // Only show initial step active as visual feedback until first poll arrives.
    if (!genCurrentJobId) {
      // Sync mode fallback: animate steps with fake timers
      const stepDelays = [0, 1000, 3000, 6000];
      stepDelays.forEach((delay, idx) => {
        const timer = setTimeout(() => {
          if (idx > 0) {
            const prevStep = document.getElementById(`genStep${idx}`);
            prevStep.classList.remove("gen-active");
            prevStep.classList.add("gen-complete");
            prevStep.querySelector(".gen-step-icon").innerHTML = "&#10003;";
          }
          const curStep = document.getElementById(`genStep${idx + 1}`);
          curStep.classList.add("gen-active");
          document.getElementById("genProgressFill").style.width =
            `${Math.min((idx + 1) * 22, 88)}%`;
        }, delay);
        genStepTimers.push(timer);
      });
    } else {
      // Async mode: activate step 1 immediately, server polling drives the rest
      const firstStep = document.getElementById("genStep1");
      if (firstStep) firstStep.classList.add("gen-active");
      document.getElementById("genProgressFill").style.width = "2%";
    }
  }

  function hideGenerationOverlay(success) {
    // Clear any pending timers
    genStepTimers.forEach((t) => clearTimeout(t));
    genStepTimers = [];

    // Clear elapsed timer
    if (genElapsedInterval) {
      clearInterval(genElapsedInterval);
      genElapsedInterval = null;
    }

    // Clear countdown timer
    if (genCountdownInterval) {
      clearInterval(genCountdownInterval);
      genCountdownInterval = null;
    }

    // Clear did-you-know rotation
    if (genDidYouKnowInterval) {
      clearInterval(genDidYouKnowInterval);
      genDidYouKnowInterval = null;
    }

    if (success) {
      // Complete all steps visually
      for (let i = 1; i <= 4; i++) {
        const step = document.getElementById(`genStep${i}`);
        step.classList.remove("gen-active");
        step.classList.add("gen-complete");
        step.querySelector(".gen-step-icon").innerHTML = "&#10003;";
      }
      document.getElementById("genProgressFill").style.width = "100%";

      // Show final elapsed time
      if (genStartTime) {
        const total = Math.floor((Date.now() - genStartTime) / 1000);
        const elapsedEl = document.getElementById("genElapsed");
        const mins = Math.floor(total / 60);
        const secs = total % 60;
        if (elapsedEl)
          elapsedEl.textContent = mins + ":" + (secs < 10 ? "0" : "") + secs;
      }
    }

    setTimeout(
      () => {
        const overlay = document.getElementById("generationOverlay");
        overlay.classList.remove("visible");
        setTimeout(() => {
          overlay.style.display = "none";
        }, 300);
      },
      success ? 800 : 0,
    );
  }

  // ============================================
  // 27. Inline validation
  // ============================================
  function validateField(fieldId) {
    const field = document.getElementById(fieldId);
    if (!field) return true;
    const formGroup = field.closest(".form-group");
    if (!formGroup) return true;

    const value = field.value.trim();
    const errorMsg = formGroup.querySelector(".field-error-msg");

    if (!value) {
      formGroup.classList.add("field-error");
      formGroup.classList.remove("field-valid");
      if (errorMsg) errorMsg.style.display = "block";
      return false;
    } else {
      formGroup.classList.remove("field-error");
      formGroup.classList.add("field-valid");
      if (errorMsg) errorMsg.style.display = "none";
      return true;
    }
  }

  // Wire validation to blur events for required fields
  // Use immediate invocation if DOM is already loaded (e.g. fragment mode),
  // otherwise wait for DOMContentLoaded (standalone page load).
  (function _initOnReady() {
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", _doInit);
    } else {
      _doInit();
    }
  })();
  function _doInit() {
    // Initialize file upload zones and exact input toggles
    initFileUploads();

    const requiredFields = [
      "requesterName",
      "requesterEmail",
      "clientName",
      "useCase",
    ];
    requiredFields.forEach((fieldId) => {
      const field = document.getElementById(fieldId);
      if (field) {
        field.addEventListener("blur", () => validateField(fieldId));
        field.addEventListener("input", () => {
          const formGroup = field.closest(".form-group");
          if (formGroup && formGroup.classList.contains("field-error")) {
            validateField(fieldId);
          }
        });
      }
    });

    // Clear field errors on location/role inputs when typing
    ["locationInput", "roleInput"].forEach((id) => {
      const el = document.getElementById(id);
      if (el) {
        el.addEventListener("input", () => {
          if (typeof _clearFieldError === "function") _clearFieldError(el);
        });
      }
    });

    // Add ready-pulse to generate button when on step 5
    const generateBtn = document.getElementById("generateBtn");
    if (generateBtn) {
      generateBtn.classList.add("ready-pulse");
    }

    // Preset prompt chips -- auto-fill form fields on click
    document.querySelectorAll(".preset-chip").forEach((chip) => {
      chip.addEventListener("click", function () {
        // Fill client name
        const clientNameEl = document.getElementById("clientName");
        if (clientNameEl && this.dataset.client) {
          clientNameEl.value = this.dataset.client;
          clientNameEl.dispatchEvent(new Event("input", { bubbles: true }));
        }

        // Fill use case
        const useCaseEl = document.getElementById("useCase");
        if (useCaseEl && this.dataset.title) {
          useCaseEl.value =
            "Hiring " +
            this.dataset.title +
            " roles in " +
            (this.dataset.location || "multiple locations") +
            ". Looking for a data-driven media plan to optimize recruitment spend and maximize qualified applicant volume.";
          useCaseEl.dispatchEvent(new Event("input", { bubbles: true }));
        }

        // Fill budget range (select)
        const budgetEl = document.getElementById("budgetRange");
        if (budgetEl && this.dataset.budget) {
          budgetEl.value = this.dataset.budget;
          budgetEl.dispatchEvent(new Event("change", { bubbles: true }));
        }

        // Add location as tag
        if (this.dataset.location) {
          // Clear existing locations and add the preset one
          locations.length = 0;
          addTag(
            "locationsContainer",
            "locationInput",
            locations,
            this.dataset.location,
          );
        }

        // Select industry card
        if (this.dataset.industry) {
          const industryCard = document.querySelector(
            '.industry-card[data-industry="' + this.dataset.industry + '"]',
          );
          if (industryCard) {
            selectIndustry(industryCard);
          }
        }

        // Add role as tag (deferred slightly so industry roles load first)
        if (this.dataset.title) {
          setTimeout(() => {
            // Add the specific role if not already present from industry defaults
            if (!roles.includes(this.dataset.title)) {
              addTag("rolesContainer", "roleInput", roles, this.dataset.title);
            }
          }, 100);
        }

        // Visual feedback -- highlight active chip
        document
          .querySelectorAll(".preset-chip")
          .forEach((c) => c.classList.remove("preset-active"));
        this.classList.add("preset-active");
        setTimeout(() => this.classList.remove("preset-active"), 600);

        // Show toast
        showToast(
          'Example loaded: "' + this.textContent.trim() + '"',
          "success",
        );
      });
    });

    // Form state persistence: restore + wire auto-save
    _wireFormPersistence();
    const wasRestored = restoreFormState();
    if (wasRestored) {
      const toast = document.createElement("div");
      toast.className = "form-restored-toast";
      toast.textContent = "Restored from previous session";
      document.body.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = "0";
        toast.style.transition = "opacity 0.5s";
        setTimeout(() => toast.remove(), 600);
      }, 3000);
    }
  }

  // Load channels database with retry logic
  function loadChannelsDB(retries = 2) {
    const channelController = new AbortController();
    const channelTimeout = setTimeout(() => channelController.abort(), 15000);

    fetch("/api/channels", { signal: channelController.signal })
      .then((r) => {
        clearTimeout(channelTimeout);
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then((data) => {
        channelsDB = data;
        populateChannels();
      })
      .catch((err) => {
        clearTimeout(channelTimeout);
        console.error("Failed to load channels:", err);
        if (retries > 0 && err.name !== "AbortError") {
          console.log(`Retrying channels load (${retries} attempts left)...`);
          setTimeout(() => loadChannelsDB(retries - 1), 2000);
        } else {
          showToast(
            "Failed to load channel data. Please refresh the page.",
            "error",
          );
        }
      });
  }
  loadChannelsDB();

          "locationInput",
          locations,
          this.value.replace(",", "").trim(),
        );
      }
    });
  document
    .getElementById("locationInput")
    .addEventListener("blur", function () {
      const val = this.value.replace(",", "").trim();
      if (val) {
        addTag("locationsContainer", "locationInput", locations, val);
      }
    });

  // Tags input for roles
  document
    .getElementById("roleInput")
    .addEventListener("keydown", function (e) {
      if (e.key === "Enter" && this.value.trim()) {
        e.preventDefault();
        addTag("rolesContainer", "roleInput", roles, this.value.trim());
      }
    });

  // Tags input for competitors
  document
    .getElementById("competitorInput")
    .addEventListener("keydown", function (e) {
      if (e.key === "Enter" && this.value.trim()) {
        e.preventDefault();
        addTag(
          "competitorsContainer",
          "competitorInput",
          competitors,
          this.value.trim(),
        );
      }
    });

  function addTag(containerId, inputId, arr, value) {
    if (arr.includes(value)) return;
    arr.push(value);
    renderTags(containerId, inputId, arr);
    document.getElementById(inputId).value = "";
    if (containerId === "locationsContainer") updateRegionalSections();
  }

  function removeTag(containerId, inputId, arr, index) {
    arr.splice(index, 1);
    renderTags(containerId, inputId, arr);
    if (containerId === "locationsContainer") updateRegionalSections();
  }

  function getArrayByContainerId(containerId) {
    if (containerId === "locationsContainer") return locations;
    if (containerId === "competitorsContainer") return competitors;
    return roles;
  }

  function renderTags(containerId, inputId, arr) {
    const container = document.getElementById(containerId);
    const input = document.getElementById(inputId);
    container.innerHTML = "";
    arr.forEach((val, i) => {
      const tag = document.createElement("span");
      tag.className = "tag";
      const textSpan = document.createElement("span");
      textSpan.textContent = val;
      const removeSpan = document.createElement("span");
      removeSpan.className = "remove";
      removeSpan.textContent = "\u00d7";
      removeSpan.onclick = function () {
        removeTag(containerId, inputId, getArrayByContainerId(containerId), i);
      };
      tag.appendChild(textSpan);
      tag.appendChild(removeSpan);
      container.appendChild(tag);
    });
    container.appendChild(input);
    input.focus();
  }

  /* ── Competitor Analysis ── */
  function analyzeCompetitors() {
    if (competitors.length === 0) {
      showToast("Add at least one competitor name first.", "error");
      return;
    }
    const btn = document.getElementById("btn-analyze-competitors");
    const panel = document.getElementById("competitor-analysis-panel");
    const results = document.getElementById("competitor-results");
    btn.disabled = true;
    btn.textContent = "Analyzing...";
    panel.style.display = "block";
    results.innerHTML = competitors
      .map(
        (c) =>
          `<div class="competitor-card competitor-skeleton" id="comp-card-${c.replace(/[^a-zA-Z0-9]/g, "_")}">
                <h4>${_escHtml(c)}</h4>
                <div class="competitor-skeleton-line long"></div>
                <div class="competitor-skeleton-line medium"></div>
                <div class="competitor-skeleton-line short"></div>
              </div>`,
      )
      .join("");

    const allResults = [];
    const promises = competitors.map((comp) => {
      const domain = comp.includes(".")
        ? comp
        : comp.replace(/\s+/g, "").toLowerCase() + ".com";
      return fetch("/api/competitive/scrape", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ domain: domain, company: comp }),
      })
        .then((r) => r.json())
        .then((data) => {
          allResults.push({ competitor: comp, domain: domain, data: data });
          _renderCompetitorCard(comp, domain, data);
        })
        .catch((err) => {
          allResults.push({
            competitor: comp,
            domain: domain,
            error: err.message,
          });
          const safeId = comp.replace(/[^a-zA-Z0-9]/g, "_");
          const card = document.getElementById("comp-card-" + safeId);
          if (card) {
            card.classList.remove("competitor-skeleton");
            card.innerHTML =
              `<h4>${_escHtml(comp)}</h4>` +
              `<div class="competitor-error">Analysis unavailable: ${_escHtml(err.message)}</div>`;
          }
        });
    });

    Promise.allSettled(promises).then(() => {
      btn.disabled = false;
      btn.innerHTML =
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> Analyze Careers Pages';
      const successful = allResults.filter(
        (r) => !r.error && r.data && !r.data.error,
      );
      if (successful.length > 0) {
        _renderCompetitorSuggestions(successful, results);
      }
    });
  }

  function _escHtml(str) {
    const d = document.createElement("div");
    d.textContent = str;
    return d.innerHTML;
  }

  function _renderCompetitorCard(comp, domain, data) {
    const safeId = comp.replace(/[^a-zA-Z0-9]/g, "_");
    const card = document.getElementById("comp-card-" + safeId);
    if (!card) return;
    card.classList.remove("competitor-skeleton");

    if (data.error) {
      card.innerHTML =
        `<h4>${_escHtml(comp)}</h4>` +
        `<div class="competitor-error">${_escHtml(data.error)}</div>`;
      return;
    }

    const openRoles = data.total_jobs || data.jobs_found || 0;
    const categories = data.job_categories || data.categories || [];
    const locations = data.locations || data.hiring_locations || [];
    const jobspy = data.jobspy_hiring_data || {};
    const jobspyCount = jobspy.postings_found || 0;

    let statsHtml =
      `<div class="competitor-card-stats">` +
      `<span class="competitor-stat"><strong>${openRoles + jobspyCount}</strong> open roles</span>`;
    if (categories.length > 0) {
      statsHtml += `<span class="competitor-stat"><strong>${categories.length}</strong> job categories</span>`;
    }
    if (locations.length > 0) {
      statsHtml += `<span class="competitor-stat"><strong>${locations.length}</strong> hiring locations</span>`;
    }
    statsHtml += "</div>";

    let catsHtml = "";
    if (categories.length > 0) {
      const topCats = categories.slice(0, 8);
      catsHtml =
        '<div class="competitor-categories">' +
        topCats
          .map((c) => {
            const label =
              typeof c === "string" ? c : c.name || c.category || "";
            return `<span class="competitor-cat-tag">${_escHtml(label)}</span>`;
          })
          .join("") +
        "</div>";
    }

    let locsHtml = "";
    if (locations.length > 0) {
      const topLocs = locations.slice(0, 6);
      locsHtml =
        '<div class="competitor-categories" style="margin-top:4px">' +
        topLocs
          .map((l) => {
            const label =
              typeof l === "string" ? l : l.name || l.location || "";
            return `<span class="competitor-loc-tag">${_escHtml(label)}</span>`;
          })
          .join("") +
        "</div>";
    }

    card.innerHTML =
      `<h4>${_escHtml(comp)} <span style="font-weight:400;color:#64748b;font-size:12px;">${_escHtml(domain)}</span></h4>` +
      statsHtml +
      catsHtml +
      locsHtml;
  }

  function _renderCompetitorSuggestions(successfulResults, container) {
    const allCategories = [];
    const allLocations = [];
    let totalRoles = 0;

    successfulResults.forEach((r) => {
      const d = r.data;
      totalRoles +=
        (d.total_jobs || d.jobs_found || 0) +
        ((d.jobspy_hiring_data || {}).postings_found || 0);
      (d.job_categories || d.categories || []).forEach((c) => {
        const label = typeof c === "string" ? c : c.name || c.category || "";
        if (label && !allCategories.includes(label)) allCategories.push(label);
      });
      (d.locations || d.hiring_locations || []).forEach((l) => {
        const label = typeof l === "string" ? l : l.name || l.location || "";
        if (label && !allLocations.includes(label)) allLocations.push(label);
      });
    });

    const suggestions = [];
    if (totalRoles > 50) {
      suggestions.push(
        "Competitors are hiring aggressively (" +
          totalRoles +
          " open roles). Consider increasing budget by 15-20% for competitive visibility.",
      );
    } else if (totalRoles > 20) {
      suggestions.push(
        "Moderate competitor hiring activity (" +
          totalRoles +
          " roles). Maintain current spend with targeted channel emphasis.",
      );
    }

    const techCategories = allCategories.filter((c) =>
      /engineer|developer|software|data|cloud|devops|sre|platform/i.test(c),
    );
    if (techCategories.length > 0) {
      suggestions.push(
        "Tech roles dominate competitor hiring. Prioritize channels: GitHub Jobs, Stack Overflow, LinkedIn Tech, HackerNews.",
      );
    }

    if (allLocations.some((l) => /remote|distributed|anywhere/i.test(l))) {
      suggestions.push(
        "Competitors offer remote positions. Add remote-friendly job boards (WeWorkRemotely, FlexJobs, RemoteOK) to your mix.",
      );
    }

    if (
      allCategories.some((c) => /sales|business development|account/i.test(c))
    ) {
      suggestions.push(
        "Sales hiring detected among competitors. Consider LinkedIn Sales Navigator ads and industry-specific boards.",
      );
    }

    if (suggestions.length === 0) {
      suggestions.push(
        "Diversify your channel mix across job boards and social platforms to match competitor presence.",
      );
    }

    const suggestionsHtml =
      '<div class="competitor-suggestions">' +
      "<h4>Channel & Budget Recommendations</h4>" +
      suggestions
        .map(
          (s) =>
            `<div class="competitor-suggestion-item">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#6BB3CD" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                  <span>${_escHtml(s)}</span>
                </div>`,
        )
        .join("") +
      '<button type="button" class="btn-apply-suggestions" onclick="_applyCompetitorSuggestions()">Apply to Plan</button>' +
      "</div>";

    container.insertAdjacentHTML("beforeend", suggestionsHtml);
  }

  // Helper: show inline validation error on a form group
  function _showFieldError(el, message) {
    if (!el) return;
    var group = el.closest(".form-group");
    if (!group) return;
    group.classList.add("field-error");
    var errEl = group.querySelector(".field-error-msg");
    if (!errEl) {
      errEl = document.createElement("div");
      errEl.className = "field-error-msg";
      group.appendChild(errEl);
    }
    errEl.textContent = message;
    errEl.style.display = "block";
  }

  // Helper: clear inline validation error on a form group
  function _clearFieldError(el) {
    if (!el) return;
    var group = el.closest(".form-group");
    if (!group) return;
    group.classList.remove("field-error");
    var errEl = group.querySelector(".field-error-msg");
    if (errEl) errEl.style.display = "none";
  }

  // 23. Step transition animations - enhanced nextStep
  function nextStep() {
    try {
      if (currentStep === 1) {
        // --- Client Name ---
        var clientNameEl = document.getElementById("clientName");
        if (!clientNameEl || !clientNameEl.value.trim()) {
          showToast("Please enter a client name", "error");
          _showFieldError(clientNameEl, "Client name is required");
          if (clientNameEl) {
            clientNameEl.focus();
            clientNameEl.scrollIntoView({
              behavior: "smooth",
              block: "center",
            });
          }
          return;
        } else {
          _clearFieldError(clientNameEl);
        }
        // --- Use Case ---
        var useCaseEl = document.getElementById("useCase");
        if (!useCaseEl || !useCaseEl.value.trim()) {
          showToast("Please describe the client's use case", "error");
          _showFieldError(useCaseEl, "Use case / brief is required");
          if (useCaseEl) {
            useCaseEl.focus();
            useCaseEl.scrollIntoView({
              behavior: "smooth",
              block: "center",
            });
          }
          return;
        } else {
          _clearFieldError(useCaseEl);
        }
        // --- Budget Range ---
        var budgetRangeEl = document.getElementById("budgetRange");
        if (!budgetRangeEl || !budgetRangeEl.value) {
          showToast("Please select a budget range", "error");
          _showFieldError(budgetRangeEl, "Please select a budget range");
          if (budgetRangeEl) {
            budgetRangeEl.focus();
            budgetRangeEl.scrollIntoView({
              behavior: "smooth",
              block: "center",
            });
          }
          return;
        } else {
          _clearFieldError(budgetRangeEl);
        }
        // --- Campaign Duration ---
        var durationEl = document.getElementById("campaignDuration");
        if (!durationEl || !durationEl.value) {
          showToast("Please select a campaign duration", "error");
          _showFieldError(durationEl, "Please select a campaign duration");
          if (durationEl) {
            durationEl.focus();
            durationEl.scrollIntoView({
              behavior: "smooth",
              block: "center",
            });
          }
          return;
        } else {
          _clearFieldError(durationEl);
        }
        // --- Locations ---
        // Auto-add typed text the user forgot to press Enter on
        var locInput = document.getElementById("locationInput");
        if (locInput && locInput.value.trim() && locations.length === 0) {
          if (typeof addTag === "function") {
            addTag(
              "locationsContainer",
              "locationInput",
              locations,
              locInput.value.trim(),
            );
          }
        }
        if (locations.length === 0) {
          showToast(
            "Please add at least one target location (type and press Enter)",
            "error",
          );
          _showFieldError(locInput, "At least one target location is required");
          if (locInput) {
            locInput.focus();
            locInput.scrollIntoView({
              behavior: "smooth",
              block: "center",
            });
          }
          return;
        } else {
          _clearFieldError(locInput);
        }
      }
      if (currentStep === 2 && !selectedIndustry) {
        showToast("Please select an industry", "error");
        var indGrid = document.querySelector(".industry-grid");
        if (indGrid)
          indGrid.scrollIntoView({ behavior: "smooth", block: "center" });
        return;
      }
      if (currentStep === 2 && roles.length === 0) {
        showToast(
          "Please add at least one target role for a more relevant media plan",
          "warning",
        );
        var roleInputEl = document.getElementById("roleInput");
        if (roleInputEl) {
          _showFieldError(roleInputEl, "At least one target role is required");
          roleInputEl.focus();
          roleInputEl.scrollIntoView({
            behavior: "smooth",
            block: "center",
          });
        }
        return;
      }

      if (currentStep === 4) {
        populateReview();
      }

      if (currentStep < totalSteps) {
        const currentEl = document.getElementById(`step${currentStep}`);
        // Add exiting animation
        currentEl.style.animation = "fadeOutDown 0.3s ease-in forwards";

        setTimeout(() => {
          currentEl.classList.remove("active");
          currentEl.style.animation = "";
          currentStep++;
          const nextEl = document.getElementById(`step${currentStep}`);
          nextEl.classList.add("active");
          nextEl.classList.add("step-animating");
          setTimeout(() => nextEl.classList.remove("step-animating"), 400);
          updateProgress();
          updateStepCheckmarks();
          window.scrollTo({ top: 0, behavior: "smooth" });
          // Auto-fetch live pricing when entering step 4
          if (currentStep === 4 && (roles.length > 0 || locations.length > 0)) {
            fetchLivePricing();
          }
        }, 280);
      }
    } catch (err) {
      console.error("nextStep error:", err);
      showToast("An error occurred. Please try again.", "error");

  // 23. Step transition animations - enhanced prevStep
  function prevStep() {
    if (currentStep > 1) {
      const currentEl = document.getElementById(`step${currentStep}`);
      currentEl.style.animation = "fadeOutDown 0.3s ease-in forwards";

      setTimeout(() => {
        currentEl.classList.remove("active");
        currentEl.style.animation = "";
        currentStep--;
        const prevEl = document.getElementById(`step${currentStep}`);
        prevEl.classList.add("active");
        prevEl.classList.add("step-animating");
        setTimeout(() => prevEl.classList.remove("step-animating"), 400);
        updateProgress();
        updateStepCheckmarks();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }, 280);
    }
  }

  // handleStepClick - navigate to completed steps when clicked
  function handleStepClick(step) {
    if (step < currentStep) {
      goToStep(step);
    }
  }

  // goToStep function for review edit buttons
  function goToStep(step) {
    if (step >= 1 && step <= totalSteps && step !== currentStep) {
      const currentEl = document.getElementById(`step${currentStep}`);
      currentEl.classList.remove("active");
      currentEl.style.animation = "";
      currentStep = step;
      const targetEl = document.getElementById(`step${currentStep}`);
      targetEl.classList.add("active");
      targetEl.classList.add("step-animating");
      setTimeout(() => targetEl.classList.remove("step-animating"), 400);
      updateProgress();
      // Mark previous steps as completed with checkmarks
      updateStepCheckmarks();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  }

  function updateStepCheckmarks() {
    document.querySelectorAll(".step-circle").forEach((circle, idx) => {
      if (idx < currentStep - 1) {
        circle.classList.add("completed");
      } else {
        circle.classList.remove("completed");
      }
    });
  }

  // 24. Update page progress bar in updateProgress
  function updateProgress() {
    document.querySelectorAll(".step-indicator").forEach((el) => {
      const step = parseInt(el.dataset.step);
      el.classList.remove("active", "completed");
      if (step === currentStep) el.classList.add("active");
      else if (step < currentStep) el.classList.add("completed");
    });

    // Update page-level progress bar
    const progressFill = document.querySelector(".page-progress-fill");
    const progressBar = document.getElementById("pageProgress");
    if (progressFill) {
      const pct = currentStep * 20;
      progressFill.style.width = pct + "%";
      if (progressBar) progressBar.setAttribute("aria-valuenow", pct);
    }

    // Update the progress line fill between step circles
    const lineFill = document.getElementById("progressLineFill");
    if (lineFill) {
      // Scale: 0 at step 1, 1 at the last step
      const fillScale = (currentStep - 1) / (totalSteps - 1);
      lineFill.style.transform = "scaleX(" + fillScale + ")";
    }

    // Update aria-current on step indicators
    document.querySelectorAll(".step-indicator").forEach((el) => {
      if (parseInt(el.dataset.step) === currentStep) {
        el.setAttribute("aria-current", "step");
      } else {
        el.removeAttribute("aria-current");
      }
    });
  }

  function validateBudgetInput(budgetValue) {
    if (!budgetValue) {
      return { valid: false, error: "Budget is required" };
    }

    // Parse budget string (handles formats like $50,000, 50K, 50000, etc)
    const budgetStr = budgetValue.replace(/[\$,]/g, "").trim();
    let amount = 0;

    // Handle K, M, B suffixes
    if (/^\d+\.?\d*[KMB]$/.test(budgetStr.toUpperCase())) {
      const num = parseFloat(budgetStr);
      const suffix = budgetStr.charAt(budgetStr.length - 1).toUpperCase();
      if (suffix === "K") amount = num * 1000;
      else if (suffix === "M") amount = num * 1000000;
      else if (suffix === "B") amount = num * 1000000000;
    } else {
      amount = parseFloat(budgetStr);
    }

    if (isNaN(amount) || amount <= 0) {
      return { valid: false, error: "Budget must be greater than 0" };
    }
    if (amount > 1000000000) {
      return {
        valid: false,
        error: "Budget exceeds maximum allowed value ($1B)",
      };
    }
    return { valid: true, error: "" };
  }

  function validateLocations(locationList) {
    const errors = [];

    if (!locationList || locationList.length === 0) {
      errors.push("At least one location is required");
      return { valid: false, errors };
    }

    // Invalid location patterns
    const invalidPatterns = [
      /^hell$/i,
      /^test$/i,
      /^xxx$/i,
      /^fake$/i,
      /^placeholder$/i,
      /^n\/a$/i,
      /^\d+$/, // only numbers
      /^[^a-z0-9\s,\-\.]*$/i, // no alphanumeric
    ];

    locationList.forEach((loc, idx) => {
      const normalized = loc.trim().toUpperCase();

      // Check against invalid patterns
      if (invalidPatterns.some((p) => p.test(loc))) {
        errors.push(`Location "${loc}" is not valid`);
        return;
      }

      // Check if it looks like a real location (at least 2 characters, contains letters)
      if (loc.length < 2 || !/[a-zA-Z]/.test(loc)) {
        errors.push(`Location "${loc}" is too short or invalid`);
        return;
      }

      // Try to match against known countries/states
      const isValidLocation =
        VALID_US_STATES.has(normalized.split(/[\s,]+/)[0]) ||
        VALID_COUNTRIES.has(normalized.split(/[\s,]+/)[0]) ||
        /^[a-zA-Z\s,\-\.]{2,}$/.test(loc); // Allow if contains valid city/region format

      if (!isValidLocation && !/[a-z]{3,}/i.test(loc)) {
        // Allow if at least 3 consecutive letters
        errors.push(
          `Location "${loc}" appears invalid (should be city/state/country)`,
        );
      }
    });

    return { valid: errors.length === 0, errors };
  }

  function validateHireVolume(hireVolumeStr) {
    if (!hireVolumeStr) {
      return { valid: true, error: "" }; // Optional field
    }

    // Parse hire volume (handles "100", "100 hires", "100-500", etc)
    const match = hireVolumeStr.match(/(\d+)/);
    if (!match) {
      return {
        valid: false,
        error: "Hire volume must be a number greater than 0",
      };
    }

    const num = parseInt(match[1], 10);
    if (num <= 0) {
      return { valid: false, error: "Hire volume must be greater than 0" };
    }
    if (num > 100000) {
      return {
        valid: false,
        error: "Hire volume exceeds maximum (100,000)",
      };
    }

    return { valid: true, error: "" };
  }

  function validateCompetitors(competitorList) {
    const errors = [];

    competitorList.forEach((comp) => {
      const normalized = comp.trim();
      if (normalized.length < 2) {
        errors.push(`Competitor "${comp}" is too short`);
      } else if (!/[a-zA-Z]/.test(normalized)) {
        errors.push(`Competitor "${comp}" must contain letters`);
      }
    });

    return { valid: errors.length === 0, errors };
  }
