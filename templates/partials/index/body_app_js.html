      uploaded_briefs: briefFiles.map((f) => ({
        name: f.name,
        type: f.type,
        data: f.data,
      })),
      uploaded_transcripts: transcriptFiles.map((f) => ({
        name: f.name,
        type: f.type,
        data: f.data,
      })),
      uploaded_historical: historicalFiles.map((f) => ({
        name: f.name,
        type: f.type,
        data: f.data,
      })),
      work_environment: getCheckboxGroupValues("workEnvironment"),
      competitors: competitors,
      experience_level: getCheckboxGroupValues("experienceLevel"),
      channel_categories: {
        regional_boards: document.getElementById("chRegionalBoards").checked,
        global_boards: document.getElementById("chGlobalBoards").checked,
        niche_boards: document.getElementById("chNicheBoards").checked,
        social_media: document.getElementById("chSocial").checked,
        programmatic_dsp: document.getElementById("chProgrammatic").checked,
        employer_branding: document.getElementById("chEmployerBrand").checked,
        apac_regional: document.getElementById("chApac")?.checked || false,
        emea_regional: document.getElementById("chEmea")?.checked || false,
      },
      include_educational:
        document.getElementById("includeEducational").checked,
      include_events: document.getElementById("includeEvents").checked,
      include_radio_podcasts: document.getElementById("includeRadioPodcasts")
        .checked,
      include_media_platforms: document.getElementById("includeMediaPlatforms")
        .checked,
      include_dei: document.getElementById("includeDEI").checked,
      include_innovative: document.getElementById("includeInnovative").checked,
      include_global_supply: document.getElementById("includeGlobalSupply")
        .checked,
      include_budget_guide:
        document.getElementById("includeBudgetGuide").checked,
    };

    // ── Async generation with progress polling ──
    genCurrentJobId = null;
    try {
      // Step 1: Submit async generation request
      const initResponse = await fetch("/api/generate", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-CSRF-Token": getCsrfToken(),
          "X-Async": "true",
        },
        body: JSON.stringify(payload),
      });
      if (!initResponse.ok) {
        const errData = await initResponse.json().catch(() => ({}));
        const errMsg =
          errData.error || `Server returned ${initResponse.status}`;
        const serverErr = new Error(errMsg);
        serverErr.httpStatus = initResponse.status;
        throw serverErr;
      }
      const initData = await initResponse.json();
      const jobId = initData.job_id;
      if (!jobId) throw new Error("Server did not return a job_id");
      genCurrentJobId = jobId;

      // Step 2: Poll /api/jobs/{jobId} every 2s for real server progress
      await new Promise(function (pollResolve, pollReject) {
        var _pst = Date.now(),
          _ptm = GEN_TIMEOUT_SECS * 1000;
        genPollInterval = setInterval(async function () {
          if (Date.now() - _pst > _ptm) {
            clearInterval(genPollInterval);
            genPollInterval = null;
            genCurrentJobId = null;
            pollReject(new Error("Generation timed out after 5 minutes."));
            return;
          }
          try {
            var pr = await fetch("/api/jobs/" + jobId, {
              headers: { Accept: "application/json" },
            });
            if (!pr.ok) return;
            var pd = await pr.json();
            if (pd.status === "processing") {
              updateGenProgress(
                pd.progress_pct || 0,
                pd.status_message || "Processing...",
              );
            } else if (pd.status === "completed") {
              clearInterval(genPollInterval);
              genPollInterval = null;
              updateGenProgress(100, "Complete");
              pollResolve(pd);
            } else if (pd.status === "failed") {
              clearInterval(genPollInterval);
              genPollInterval = null;
              genCurrentJobId = null;
              pollReject(new Error(pd.error || "Generation failed."));
            }
          } catch (pe) {
            console.warn("Poll error:", pe.message);
          }
        }, 2000);
      });

      // Step 3: Download the completed file
      var _dlRes = await fetch("/api/jobs/" + jobId);
      if (!_dlRes.ok) throw new Error("Failed to download generated file");
      {
        const contentType = _dlRes.headers.get("Content-Type") || "";
        const blob = await _dlRes.blob();
        genCurrentJobId = null;
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        const safeName = payload.client_name.replace(/[^\w\-]/g, "_");
        let filename;
        if (contentType.includes("zip")) {
          filename = `${safeName}_Media_Plan_Bundle.zip`;
        } else {
          filename = `${safeName}_Media_Plan.xlsx`;
        }
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);

        // Cache blob for re-download
        lastGeneratedBlob = blob;
        lastGeneratedFilename = filename;

        // Cache payload for export
        _lastPlanPayload = payload;

        // Try to capture plan_id from download response headers
        var _dlPlanId = _dlRes.headers.get("X-Plan-Id");
        if (_dlPlanId) _lastPlanId = _dlPlanId;

        // Auto-save campaign context for platform shell
        try {
          fetch("/api/campaign/save", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              name:
                (payload.client_name || "Unnamed") +
                " - " +
                new Date().toLocaleDateString(),
              client: payload.client_name || "",
              budget: payload.budget_range || "",
              industry: payload.industry || "",
              roles: payload.target_roles || [],
              locations: payload.locations || [],
              channels: payload.channels || [],
              plan_result: _lastPlanPayload || {},
              generated_at: new Date().toISOString(),
            }),
          })
            .then(function (r) {
              return r.json();
            })
            .then(function (data) {
              if (data.ok) {
                window._currentCampaignId = data.id;
                // Dispatch event for platform shell
                window.dispatchEvent(
                  new CustomEvent("nova:campaign-saved", { detail: data }),
                );
              }
            })
            .catch(function () {});
        } catch (e) {
          console.warn("Auto-save failed:", e);
        }

        // Hide overlay with success
        hideGenerationOverlay(true);

        // Show hero stat section
        const heroSection = document.getElementById("heroStatSection");
        if (heroSection) {
          const isZip = contentType.includes("zip");
          document.getElementById("heroStatNumber").textContent = isZip
            ? "2"
            : "1";
          document.getElementById("heroStatLabel").textContent = isZip
            ? "Files Generated Successfully"
            : "File Generated Successfully";
          heroSection.classList.add("visible");
        }

        // Build plan dashboard (async mode has no X-Plan-Id header)
        buildPlanDashboard(payload, null);

        // Scroll to dashboard (or hero section)
        const scrollTarget =
          document.getElementById("planDashboardSection") || heroSection;
        if (scrollTarget) {
          scrollTarget.scrollIntoView({
            behavior: "smooth",
            block: "start",
          });
        }

        // Show confetti and success toast
        const successMsg = contentType.includes("zip")
          ? "Media plan bundle (Excel + PPT) downloaded successfully!"
          : "Media plan generated and downloaded successfully!";
        setTimeout(() => {
          showConfetti();
          showToast(successMsg, "success");
        }, 600);

        btn.innerHTML = "&#10003; Downloaded!";
        btn.style.background = "var(--secondary)";
        setTimeout(() => {
          btn.disabled = false;
          btn.classList.add("ready-pulse");
          btn.innerHTML =
            '<span style="display:flex;align-items:center;justify-content:center;gap:8px;"><span>&#128640;</span><span>Generate Media Plan</span><span style="font-size:11px;opacity:0.8;margin-left:4px;">(Excel + PPT)</span></span>';
          btn.style.background = "";
        }, 3000);
      }
    } catch (err) {
      if (genPollInterval) {
        clearInterval(genPollInterval);
        genPollInterval = null;
      }
      genCurrentJobId = null;
      _genAbortController = null;
      hideGenerationOverlay(false);
      let userMsg;
      if (err.name === "AbortError") {
        userMsg = "Generation cancelled.";
      } else if (!navigator.onLine) {
        userMsg =
          "You appear to be offline. Please check your internet connection and try again.";
      } else if (err.httpStatus && err.httpStatus >= 500) {
        userMsg = `Server error (${err.httpStatus}): ${err.message}. Please try again later.`;
      } else if (err.httpStatus && err.httpStatus >= 400) {
        userMsg = `Request error (${err.httpStatus}): ${err.message}. Please review your inputs.`;
      } else if (
        err.message === "Failed to fetch" ||
        err.message === "NetworkError when attempting to fetch resource."
      ) {
        userMsg =
          "Network error -- could not reach the server. Please check your connection and try again.";
      } else if (err.message) {
        userMsg = err.message;
      } else {
        userMsg =
          "Failed to generate media plan. Please check your inputs and try again.";
      }
      showToast(userMsg, "error");
      btn.disabled = false;
      btn.classList.add("ready-pulse");
      btn.innerHTML =
        '<span style="display:flex;align-items:center;justify-content:center;gap:8px;"><span>&#128640;</span><span>Generate Media Plan</span><span style="font-size:11px;opacity:0.8;margin-left:4px;">(Excel + PPT)</span></span>';
    }
  }
  // Re-download cached bundle without regenerating
  function redownloadBundle() {
    if (lastGeneratedBlob && lastGeneratedFilename) {
      const url = URL.createObjectURL(lastGeneratedBlob);
      const a = document.createElement("a");
      a.href = url;
      a.download = lastGeneratedFilename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      showToast("Bundle re-downloaded successfully!", "success");
    } else {
      generatePlan();
    }
  }

  // ============================================
  // Export dropdown & Google Sheets / CSV / XLSX
  // ============================================
  var _lastPlanPayload = null; // cached from generatePlan

  function toggleExportMenu(e) {
    e.stopPropagation();
    var menu = document.getElementById("exportDropdown");
    menu.classList.toggle("open");
  }
  // Close dropdown when clicking outside
  document.addEventListener("click", function () {
    var menu = document.getElementById("exportDropdown");
    if (menu) menu.classList.remove("open");
  });

  // Check if Google Sheets is configured (on page load)
  (function checkExportStatus() {
    fetch("/api/export/status", { method: "POST" })
      .then(function (r) {
        return r.json();
      })
      .then(function (data) {
        if (data.configured) {
          var btn = document.getElementById("exportSheetsBtn");
          var div = document.getElementById("exportSheetsDivider");
          if (btn) btn.style.display = "";
          if (div) div.style.display = "";
        }
      })
      .catch(function () {
        /* ignore -- sheets just won't show */
      });
  })();

  function exportPlan(format) {
    var menu = document.getElementById("exportDropdown");
    if (menu) menu.classList.remove("open");

    if (!_lastPlanPayload) {
      showToast("Generate a media plan first before exporting.", "warning");
      return;
    }

    var exportBtn = document.getElementById("exportBtn");
    var origHTML = exportBtn.innerHTML;
    exportBtn.disabled = true;
    exportBtn.innerHTML =
      '<span style="display:flex;align-items:center;gap:6px;"><span class="spinner-sm"></span> Exporting...</span>';

    var body = JSON.stringify({
      plan_data: _lastPlanPayload,
      format: format,
    });

    fetch("/api/export/sheets", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: body,
    })
      .then(function (response) {
        var ct = response.headers.get("Content-Type") || "";
        if (ct.includes("application/json")) {
          return response.json().then(function (data) {
            if (data.url) {
              window.open(data.url, "_blank");
              showToast("Media plan exported to Google Sheets!", "success");
            } else if (data.error) {
              showToast("Export error: " + data.error, "error");
            }
          });
        } else {
          // File download (XLSX or CSV)
          return response.blob().then(function (blob) {
            var disposition = response.headers.get("Content-Disposition") || "";
            var filenameMatch = disposition.match(/filename="?([^"]+)"?/);
            var filename = filenameMatch
              ? filenameMatch[1]
              : "Media_Plan_Export." + (format === "csv" ? "csv" : "xlsx");
            var url = URL.createObjectURL(blob);
            var a = document.createElement("a");
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
            var label = format === "csv" ? "CSV" : "Excel";
            showToast("Media plan downloaded as " + label + "!", "success");
          });
        }
      })
      .catch(function (err) {
        showToast(
          "Export failed: " + (err.message || "Unknown error"),
          "error",
        );
      })
      .finally(function () {
        exportBtn.disabled = false;
        exportBtn.innerHTML = origHTML;
      });
  }

  // ============================================
  // Attach budget feasibility check to form inputs
  // ============================================
  ["budgetRange", "hireVolume"].forEach(function (id) {
    var el = document.getElementById(id);
    if (el) el.addEventListener("change", checkBudgetFeasibility);
  });

  // ============================================
  // Industry search/filter
  // ============================================
  document
    .getElementById("industrySearch")
    .addEventListener("input", function (e) {
      const query = e.target.value.toLowerCase();
      document.querySelectorAll(".industry-card").forEach((card) => {
        const name = card.querySelector(".name").textContent.toLowerCase();
        const desc = card.querySelector(".desc").textContent.toLowerCase();
        card.style.display =
          name.includes(query) || desc.includes(query) ? "" : "none";
      });
    });
  // Focus styles for industry search
  document
    .getElementById("industrySearch")
    .addEventListener("focus", function () {
      this.style.borderColor = "var(--primary)";
      this.style.boxShadow = "0 0 0 3px rgba(99,102,241,0.1)";
    });
  document
    .getElementById("industrySearch")
    .addEventListener("blur", function () {
      this.style.borderColor = "";
      this.style.boxShadow = "";
    });

  // Header particles removed in UI redesign (header-particle is display:none)
  // Kept as no-op stub for backward compatibility
  function createHeaderParticles() {
    /* stripped */
  }

  // ============================================
  // Live CPC/CPA Pricing
  // ============================================
  let _pricingCache = {};
  let _pricingFetching = false;

  function fetchLivePricing() {
    if (_pricingFetching) return;
    const grid = document.getElementById("pricing-grid");
    const sourceEl = document.getElementById("pricing-source");
    if (!grid) return;

    const currentRoles = typeof roles !== "undefined" ? roles : [];
    const currentLocations = typeof locations !== "undefined" ? locations : [];
    const industry = selectedIndustry || "";

    if (currentRoles.length === 0 && currentLocations.length === 0) {
      grid.innerHTML =
        '<div class="pricing-loading">Add roles and locations in previous steps to see live pricing</div>';
      return;
    }

    const role = currentRoles[0] || "";
    const location = currentLocations[0] || "";
    const cacheKey = `${role}|${location}|${industry}`;

    // Check cache (5 min TTL)
    if (
      _pricingCache[cacheKey] &&
      Date.now() - _pricingCache[cacheKey].ts < 300000
    ) {
      renderPricingGrid(_pricingCache[cacheKey].data);
      return;
    }

    _pricingFetching = true;
    grid.innerHTML =
      '<div class="pricing-loading"><span class="spinner"></span> Fetching live pricing data...</div>';

    const params = new URLSearchParams({
      role: role,
      location: location,
      industry: industry,
    });
    fetch("/api/pricing/live?" + params.toString())
      .then(function (res) {
        if (!res.ok) throw new Error("HTTP " + res.status);
        return res.json();
      })
      .then(function (data) {
        _pricingCache[cacheKey] = { data: data, ts: Date.now() };
        renderPricingGrid(data);
        if (sourceEl && data.source) {
          sourceEl.textContent =
            "Source: " +
            data.source +
            (data.updated_at
              ? " | Updated: " + new Date(data.updated_at).toLocaleTimeString()
              : "");
        }
      })
      .catch(function (err) {
        grid.innerHTML =
          '<div class="pricing-error">Unable to fetch live pricing: ' +
          escapeHtml(err.message) +
          "</div>";
      })
      .finally(function () {
        _pricingFetching = false;
      });
  }

  function renderPricingGrid(data) {
    const grid = document.getElementById("pricing-grid");
    if (!grid || !data || !data.channels) {
      if (grid)
        grid.innerHTML =
          '<div class="pricing-loading">No pricing data available</div>';
      return;
    }

    const channels = data.channels;
    if (channels.length === 0) {
      grid.innerHTML =
        '<div class="pricing-loading">No pricing data available for this role/location</div>';
      return;
    }

    // Find best value (lowest CPA)
    let bestCPA = Infinity;
    let bestIdx = -1;
    channels.forEach(function (ch, i) {
      if (ch.cpa && ch.cpa < bestCPA) {
        bestCPA = ch.cpa;
        bestIdx = i;
      }
    });

    let html = "";
    channels.forEach(function (ch, i) {
      const trendIcon =
        ch.trend === "up"
          ? "&#9650;"
          : ch.trend === "down"
            ? "&#9660;"
            : "&#9644;";
      const trendClass =
        ch.trend === "up"
          ? "trend-up"
          : ch.trend === "down"
            ? "trend-down"
            : "trend-stable";
      const isBest = i === bestIdx;

      html += '<div class="pricing-card">';
      html += '<div class="channel-name">' + escapeHtml(ch.name);
      if (isBest) html += ' <span class="pricing-badge">Best Value</span>';
      html += "</div>";
      if (ch.cpc != null) {
        html +=
          '<div class="pricing-metric"><span>CPC</span><span class="value">$' +
          Number(ch.cpc).toFixed(2) +
          ' <span class="' +
          trendClass +
          '">' +
          trendIcon +
          "</span></span></div>";
      }
      if (ch.cpa != null) {
        html +=
          '<div class="pricing-metric"><span>CPA</span><span class="value">$' +
          Number(ch.cpa).toFixed(2) +
          "</span></div>";
      }
      if (ch.cph != null) {
        html +=
          '<div class="pricing-metric"><span>CPH</span><span class="value">$' +
          Number(ch.cph).toLocaleString() +
          "</span></div>";
      }
      if (ch.apply_rate) {
        html +=
          '<div class="pricing-metric"><span>Apply Rate</span><span class="value">' +
          escapeHtml(ch.apply_rate) +
          "</span></div>";
      }
      if (ch.notes) {
        html +=
          '<div style="font-size:10px;color:var(--text-muted);margin-top:6px">' +
          escapeHtml(ch.notes) +
          "</div>";
      }
      html += "</div>";
    });

    grid.innerHTML = html;
  }

  // ============================================
  // Unsaved changes warning (beforeunload)
  // ============================================
  let formDirty = false;
  document.querySelectorAll("input, textarea, select").forEach((el) => {
    el.addEventListener("input", () => {
      formDirty = true;
    });
    el.addEventListener("change", () => {
      formDirty = true;
    });
  });
  window.addEventListener("beforeunload", (e) => {
    if (formDirty) {
      e.preventDefault();
      e.returnValue = "";
    }
  });
</script>
