<link rel="stylesheet" href="/static/css/tokens.css" />
<link rel="stylesheet" href="/static/css/buttons.css" />
<style>
  :root {
    /* ============================================
               Design System: 30 Canonical Tokens
               Vercel/Linear-Inspired Pure Black
               ============================================ */

    /* Brand */
    --primary: #5a54bd;
    --primary-light: #7b75d4;
    --primary-pale: rgba(90, 84, 189, 0.08);
    --secondary: #6bb3cd;
    --dark: #202058;

    /* States */
    --success: #6bb3cd;
    --warning: #f59e0b;
    --error: #ef4444;
    --info: #5a54bd;

    /* Surfaces */
    --bg-primary: #000000;
    --bg-secondary: #0a0a0a;
    --bg-card: rgba(17, 17, 17, 0.8);
    --bg-input: rgba(26, 26, 26, 0.7);
    --card-solid: #111111;
    --card-hover: rgba(26, 26, 26, 0.85);
    --surface-3: rgba(38, 38, 38, 0.6);

    /* Glass effects */
    --glass-blur: blur(40px) saturate(1.5);
    --glass-blur-md: blur(24px) saturate(1.3);
    --glass-blur-sm: blur(16px) saturate(1.2);
    --glass-border: rgba(255, 255, 255, 0.08);
    --glass-border-hover: rgba(255, 255, 255, 0.14);
    --glass-inset: 0 0 0 1px rgba(255, 255, 255, 0.04) inset;

    /* Text */
    --text-primary: #e4e4e7;
    --text-secondary: #a1a1a1;
    --text-muted: #9ca3af;
    --text-inverse: #000000;

    /* Borders -- White opacity (Vercel style) */
    --border: rgba(255, 255, 255, 0.08);
    --border-subtle: rgba(255, 255, 255, 0.04);
    --border-accent: rgba(90, 84, 189, 0.25);

    /* Shadows */
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
    --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.5), 0 1px 3px rgba(0, 0, 0, 0.4);
    --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.6), 0 2px 8px rgba(0, 0, 0, 0.4);
    --shadow-xl: 0 16px 48px rgba(0, 0, 0, 0.7), 0 4px 16px rgba(0, 0, 0, 0.5);
    --shadow-glow: 0 0 20px rgba(90, 84, 189, 0.1);
    --shadow-accent:
      0 0 30px rgba(90, 84, 189, 0.08), 0 0 60px rgba(90, 84, 189, 0.04);

    /* Typography – display font */
    --font-display: "Space Grotesk", sans-serif;
    --tracking-tight: -0.025em;

    /* Accent aliases (spec tokens) */
    --accent: #5a54bd;
    --accent-glow: rgba(90, 84, 189, 0.15);
    --text-base: 0.9375rem;
    --duration-base: 200ms;

    /* Radius */
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;

    /* Gradients */
    --gradient-primary: linear-gradient(135deg, #5a54bd 0%, #7b75d4 100%);
    --gradient-accent: linear-gradient(135deg, #5a54bd 0%, #6bb3cd 100%);
    --gradient-mesh:
      radial-gradient(
        ellipse at 20% 50%,
        rgba(90, 84, 189, 0.08) 0%,
        transparent 50%
      ),
      radial-gradient(
        ellipse at 80% 20%,
        rgba(107, 179, 205, 0.06) 0%,
        transparent 50%
      ),
      radial-gradient(
        ellipse at 40% 80%,
        rgba(90, 84, 189, 0.04) 0%,
        transparent 50%
      );

    /* Animation */
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);
    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    --ease-snap: cubic-bezier(0.2, 0, 0, 1);
    --duration-fast: 100ms;
    --duration-normal: 200ms;
    --duration-slow: 300ms;
    --duration-overlay: 500ms;

    /* Focus */
    --focus-ring: 0 0 0 2px var(--bg-primary), 0 0 0 4px var(--primary);
  }

  /* Hide standalone header when loaded as platform fragment */
  .fragment-mode .standalone-header {
    display: none;
  }
  .breadcrumb {
    display: none;
    padding: 8px 16px;
    font-size: 13px;
    color: #94a3b8;
  }
  .breadcrumb a {
    color: #6bb3cd;
    text-decoration: none;
  }
  .breadcrumb a:hover {
    text-decoration: underline;
  }
  .fragment-mode .breadcrumb {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── Phase 4 Effect 2: Ambient glow spots ── */
  .ambient-glow {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
  }

  .ambient-glow--violet {
    width: 350px;
    height: 350px;
    background: rgba(90, 84, 189, 0.1);
    top: -5%;
    left: 15%;
    animation: glow-drift-1 20s ease-in-out infinite alternate;
  }

  .ambient-glow--teal {
    width: 300px;
    height: 300px;
    background: rgba(107, 179, 205, 0.08);
    top: 5%;
    right: 10%;
    animation: glow-drift-2 24s ease-in-out infinite alternate;
  }

  @keyframes glow-drift-1 {
    0% {
      transform: translate(0, 0);
    }
    100% {
      transform: translate(25px, -15px);
    }
  }

  @keyframes glow-drift-2 {
    0% {
      transform: translate(0, 0);
    }
    100% {
      transform: translate(-20px, 12px);
    }
  }

  /* ── Phase 4 Effect 5: Text blur halo ── */
  .hero-halo {
    position: relative;
  }

  .hero-halo::before {
    content: "";
    position: absolute;
    inset: -25px;
    background: radial-gradient(
      ellipse at center,
      rgba(90, 84, 189, 0.2),
      transparent 70%
    );
    filter: blur(25px);
    z-index: -1;
    pointer-events: none;
  }

  /* ── Phase 4 Effect 7: Scanning line ── */
  @keyframes scan-line {
    0% {
      top: -2px;
      opacity: 0;
    }
    5% {
      opacity: 1;
    }
    90% {
      opacity: 0.6;
    }
    100% {
      top: 100%;
      opacity: 0;
    }
  }

  .hero-scan {
    position: relative;
    overflow: hidden;
  }

  .hero-scan::after {
    content: "";
    position: absolute;
    left: 10%;
    right: 10%;
    height: 1px;
    background: linear-gradient(
      90deg,
      transparent,
      rgba(107, 179, 205, 0.3),
      rgba(90, 84, 189, 0.3),
      transparent
    );
    animation: scan-line 6s ease-in-out infinite;
    pointer-events: none;
    z-index: 3;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    /* scroll-behavior: smooth removed -- was blocking normal scroll on homepage */
  }

  ::selection {
    background: var(--primary);
    color: white;
  }

  body {
    font-family:
      "Inter",
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      Roboto,
      "Helvetica Neue",
      Arial,
      sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    position: relative;
  }

  /* Ambient gradient mesh -- living background for Glassmorphism 2.0 */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: var(--gradient-mesh);
    pointer-events: none;
    z-index: 0;
    animation: ambientDrift 20s ease-in-out infinite alternate;
  }

  @keyframes ambientDrift {
    0% {
      background:
        radial-gradient(
          ellipse at 20% 50%,
          rgba(90, 84, 189, 0.08) 0%,
          transparent 50%
        ),
        radial-gradient(
          ellipse at 80% 20%,
          rgba(107, 179, 205, 0.06) 0%,
          transparent 50%
        ),
        radial-gradient(
          ellipse at 40% 80%,
          rgba(90, 84, 189, 0.04) 0%,
          transparent 50%
        );
    }
    50% {
      background:
        radial-gradient(
          ellipse at 60% 30%,
          rgba(90, 84, 189, 0.1) 0%,
          transparent 50%
        ),
        radial-gradient(
          ellipse at 20% 70%,
          rgba(107, 179, 205, 0.05) 0%,
          transparent 50%
        ),
        radial-gradient(
          ellipse at 80% 60%,
          rgba(123, 117, 212, 0.06) 0%,
          transparent 50%
        );
    }
    100% {
      background:
        radial-gradient(
          ellipse at 40% 60%,
          rgba(90, 84, 189, 0.07) 0%,
          transparent 50%
        ),
        radial-gradient(
          ellipse at 70% 40%,
          rgba(107, 179, 205, 0.08) 0%,
          transparent 50%
        ),
        radial-gradient(
          ellipse at 30% 20%,
          rgba(90, 84, 189, 0.05) 0%,
          transparent 50%
        );
    }
  }

  /* Subtle noise texture overlay for depth */
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    z-index: 9999;
    pointer-events: none;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  }

  /* ============================================
           APP HEADER - Dark glass, ambient glow
           ============================================ */
  .app-header {
    background: rgba(8, 9, 13, 0.8);
    backdrop-filter: blur(20px) saturate(1.3);
    -webkit-backdrop-filter: blur(20px) saturate(1.3);
    color: var(--text-primary);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid var(--glass-border);
  }

  .app-header::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(
      90deg,
      transparent,
      rgba(90, 84, 189, 0.3),
      transparent
    );
  }

  /* Hide orbs - kept in DOM for backward compat */
  .header-orb {
    display: none;
  }

  .header-content {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .app-header h1 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--text-primary);
  }

  .app-header p {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 400;
  }

  .logo-mark {
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    border-radius: 10px;
    box-shadow: 0 0 12px rgba(90, 84, 189, 0.1);
    animation: logo-breathe 4s ease-in-out infinite;
    flex-shrink: 0;
  }
  .header-brand {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.8rem;
    margin-bottom: 4px;
  }
  .brand-primary {
    color: #7b75d4;
    font-weight: 600;
  }
  .brand-separator {
    color: rgba(255, 255, 255, 0.2);
    font-weight: 300;
  }
  .brand-secondary {
    color: var(--text-secondary, #a1a1a1);
    font-weight: 500;
  }
  .hero-subtitle {
    font-size: 1.15rem;
    color: #6bb3cd;
    font-weight: 500;
    margin-bottom: 2px;
    letter-spacing: -0.01em;
  }
  .hero-subline {
    font-size: 0.85rem;
    color: var(--text-muted);
    font-weight: 400;
    margin-bottom: 4px;
    letter-spacing: -0.01em;
  }
  .logo {
    font-size: 24px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--primary-pale);
    border-radius: 10px;
    border: 1px solid rgba(90, 84, 189, 0.15);
    box-shadow: 0 0 12px rgba(90, 84, 189, 0.1);
    animation: logo-breathe 4s ease-in-out infinite;
  }
  @keyframes logo-breathe {
    0%,
    100% {
      filter: drop-shadow(0 0 6px rgba(90, 84, 189, 0.3));
      transform: scale(1);
    }
    50% {
      filter: drop-shadow(0 0 14px rgba(90, 84, 189, 0.6));
      transform: scale(1.04);
    }
  }

  .header-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 500;
  }

  /* ============================================
           CONTAINER
           ============================================ */
  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 40px 24px;
    position: relative;
    z-index: 1;
  }

  /* ============================================
           PROGRESS STEPS - Segmented bar (Linear style)
           ============================================ */
  .progress-bar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 40px;
    position: relative;
    padding: 0;
    gap: 6px;
  }

  .progress-bar::before {
    display: none;
  }

  .progress-line-fill {
    display: none;
  }

  .step-indicator {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    position: relative;
    z-index: 1;
    flex: 1;
    transition: all var(--duration-slow) var(--ease-standard);
  }

  .step-circle {
    width: 100%;
    height: 4px;
    border-radius: 2px;
    background: rgba(255, 255, 255, 0.06);
    border: none;
    display: block;
    font-size: 0;
    color: transparent;
    overflow: hidden;
    transition: all var(--duration-slow) var(--ease-standard);
    position: relative;
  }

  .step-indicator.active .step-circle {
    background: linear-gradient(
      90deg,
      var(--primary) 0%,
      var(--primary-light) 100%
    );
    border: none;
    color: transparent;
    box-shadow:
      0 0 0 3px rgba(90, 84, 189, 0.2),
      0 0 12px rgba(90, 84, 189, 0.5),
      0 0 4px rgba(90, 84, 189, 0.3),
      0 1px 6px rgba(90, 84, 189, 0.25);
  }

  .step-indicator.completed .step-circle {
    background: linear-gradient(135deg, #5a54bd, #6bb3cd);
    border: none;
    color: transparent;
    box-shadow: 0 0 8px rgba(107, 179, 205, 0.25);
    opacity: 0.9;
  }

  .step-indicator.completed {
    cursor: pointer;
  }

  .step-indicator.completed:hover .step-circle {
    opacity: 1;
    box-shadow: 0 0 8px rgba(90, 84, 189, 0.3);
  }

  .step-label {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 500;
    text-align: center;
    max-width: 100px;
    letter-spacing: -0.1px;
    transition: all var(--duration-slow) ease;
  }

  .step-label .short-label {
    display: none;
  }

  .step-indicator.active .step-label {
    color: var(--text-primary);
    font-weight: 700;
  }

  .step-indicator.completed .step-label {
    color: var(--text-secondary);
    font-weight: 500;
  }

  /* ============================================
           CARDS - Glassmorphism 2.0 (frosted dark glass)
           ============================================ */
  .card {
    background: var(--bg-card);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-md), var(--glass-inset);
    padding: 32px;
    margin-bottom: 24px;
    border: 1px solid var(--glass-border);
    transition:
      border-color var(--duration-normal) var(--ease-standard),
      box-shadow var(--duration-normal) var(--ease-standard),
      background var(--duration-normal) var(--ease-standard);
  }

  .card:hover {
    border-color: var(--glass-border-hover);
    box-shadow: var(--shadow-lg), var(--glass-inset);
  }

  .card h2 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--text-primary);
    margin-bottom: 4px;
  }

  .card .subtitle {
    color: var(--text-muted);
    font-size: 14px;
    margin-bottom: 24px;
    line-height: 1.5;
  }

  /* ============================================
           FORM ELEMENTS - Dark glass inputs
           ============================================ */
  .form-group {
    margin-bottom: 20px;
    position: relative;
  }

  .form-group label {
    display: block;
    font-weight: 500;
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 6px;
    text-transform: none;
    letter-spacing: -0.1px;
  }

  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    padding: 14px 16px;
    border: 1px solid var(--border, rgba(255, 255, 255, 0.08));
    border-radius: var(--radius-md);
    font-size: var(--text-base, 14px);
    font-family: inherit;
    transition:
      border-color var(--duration-base, 200ms) var(--ease-standard),
      box-shadow var(--duration-base, 200ms) var(--ease-standard),
      background var(--duration-base, 200ms) var(--ease-standard);
    background: rgba(15, 15, 25, 0.6);
    color: var(--text-primary);
    height: auto;
  }

  .form-group input::placeholder,
  .form-group textarea::placeholder {
    color: var(--text-muted);
  }

  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus {
    outline: none;
    border-color: var(--accent, rgba(90, 84, 189, 0.5));
    box-shadow:
      0 0 0 3px var(--accent-glow, rgba(90, 84, 189, 0.15)),
      0 0 20px rgba(90, 84, 189, 0.08);
    background: rgba(15, 15, 25, 0.7);
  }

  .form-group input:focus-visible,
  .form-group textarea:focus-visible,
  .form-group select:focus-visible {
    outline: 2px solid #6bb3cd;
    outline-offset: 2px;
  }

  .form-group textarea {
    resize: vertical;
    min-height: 80px;
    height: auto;
    line-height: 1.5;
  }

  .form-group select {
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%23818CF8' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 12px center;
    padding-right: 36px;
    cursor: pointer;
    position: relative;
    z-index: 1;
  }

  .form-group select option {
    background: var(--card-solid);
    color: var(--text-primary);
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .form-row.form-row-3 {
    grid-template-columns: 1fr 1fr 1fr;
  }

  /* ============================================
           TAGS INPUT
           ============================================ */
  .tags-container {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 8px 12px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: var(--radius-sm);
    min-height: 42px;
    cursor: text;
    background: rgba(255, 255, 255, 0.04);
    transition:
      border-color var(--duration-fast) var(--ease-standard),
      box-shadow var(--duration-fast) var(--ease-standard);
  }

  .tags-container:focus-within {
    border-color: rgba(90, 84, 189, 0.5);
    box-shadow: 0 0 0 3px rgba(90, 84, 189, 0.1);
  }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 10px;
    background: var(--primary-pale);
    color: var(--primary-light);
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-weight: 500;
    border: 1px solid rgba(90, 84, 189, 0.2);
    height: 24px;
    animation: tagPop 0.3s var(--ease-spring);
  }

  @keyframes tagPop {
    from {
      opacity: 0;
      transform: scale(0.8);
    }
    to {
      opacity: 1;
      transform: scale(1);
    }
  }

  .tag:hover {
    border-color: rgba(90, 84, 189, 0.4);
  }

  .tag .remove {
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    opacity: 0.5;
    margin-left: 2px;
    transition: opacity var(--duration-fast) ease;
  }

  .tag .remove:hover {
    opacity: 1;
    color: var(--error);
  }

  .tags-input {
    border: none;
    outline: none;
    flex: 1;
    min-width: 120px;
    font-size: 14px;
    padding: 4px;
    color: var(--text-primary);
    background: transparent;
  }

  /* ============================================
           CHANNEL SELECTOR
           ============================================ */
  .channel-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 4px;
    max-height: 300px;
    overflow-y: auto;
    padding: 12px;
    background: rgba(255, 255, 255, 0.02);
    border-radius: var(--radius-sm);
    border: 1px solid var(--glass-border);
  }

  .channel-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background var(--duration-fast) var(--ease-standard);
    font-size: 13px;
    color: var(--text-secondary);
  }

  .channel-item:hover {
    background: rgba(255, 255, 255, 0.04);
    color: var(--text-primary);
  }

  .channel-item input[type="checkbox"] {
    accent-color: var(--primary);
    width: 16px;
    height: 16px;
  }

  .channel-category {
    font-weight: 600;
    font-size: 11px;
    color: var(--text-muted);
    margin: 24px 0 8px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .channel-category:first-child {
    margin-top: 0;
  }

  /* ============================================
           TOGGLE - Dark glass
           ============================================ */
  .toggle-group {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: rgba(255, 255, 255, 0.03);
    border-radius: var(--radius-sm);
    margin-bottom: 8px;
    border: 1px solid var(--glass-border);
    transition:
      border-color var(--duration-fast) var(--ease-standard),
      background var(--duration-fast) var(--ease-standard);
  }

  .toggle-group:hover {
    border-color: var(--glass-border-hover);
    background: rgba(255, 255, 255, 0.05);
  }

  .toggle-group label {
    margin: 0;
    text-transform: none;
    letter-spacing: 0;
    font-size: 14px;
    color: var(--text-primary);
  }

  .toggle {
    position: relative;
    width: 44px;
    height: 24px;
    flex-shrink: 0;
  }

  .toggle input {
    opacity: 0;
    width: 0;
    height: 0;
  }

  .toggle .slider {
    position: absolute;
    inset: 0;
    background: rgba(255, 255, 255, 0.12);
    border-radius: 12px;
    cursor: pointer;
    transition: background var(--duration-normal) var(--ease-standard);
  }

  .toggle .slider::before {
    content: "";
    position: absolute;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: white;
    top: 3px;
    left: 3px;
    transition: transform var(--duration-normal) var(--ease-standard);
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.12);
  }

  .toggle input:checked + .slider {
    background: var(--primary);
  }

  .toggle input:checked + .slider::before {
    transform: translateX(20px);
  }

  /* ============================================
           BUTTONS - Electric Indigo + glass variants
           ============================================ */
  .btn-row {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin-top: 8px;
  }

  .btn {
    padding: 10px 20px;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--duration-normal) var(--ease-spring);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    letter-spacing: -0.1px;
    position: relative;
    min-height: 40px;
  }

  .btn-primary {
    background: var(--primary);
    color: white;
    box-shadow: 0 2px 8px rgba(90, 84, 189, 0.3);
  }

  .btn-primary:hover {
    background: var(--primary-light);
    box-shadow: 0 4px 16px rgba(90, 84, 189, 0.4);
    transform: scale(var(--btn-hover-scale, 1.05));
  }

  .btn-primary:active {
    transform: scale(var(--btn-active-scale, 0.98));
    box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.3);
    transition:
      transform 0.1s ease,
      box-shadow 0.1s ease;
  }

  .btn-primary {
    position: relative;
    overflow: hidden;
  }
  .btn-primary::after {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: inherit;
    background: linear-gradient(
      135deg,
      rgba(90, 84, 189, 0.3),
      rgba(6, 182, 212, 0.15)
    );
    z-index: -1;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .btn-primary:hover::after {
    opacity: 1;
  }

  .btn-secondary {
    background: rgba(255, 255, 255, 0.04);
    color: var(--text-primary);
    border: 1px solid var(--glass-border);
  }

  .btn-secondary:hover {
    background: rgba(255, 255, 255, 0.08);
    border-color: var(--glass-border-hover);
    transform: scale(var(--btn-hover-scale, 1.05));
  }

  .btn-secondary:active {
    transform: scale(var(--btn-active-scale, 0.98));
    box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.3);
    transition:
      transform 0.1s ease,
      box-shadow 0.1s ease;
  }

  .btn-success {
    background: var(--gradient-primary);
    color: white;
    font-size: 15px;
    font-weight: 700;
    padding: 14px 40px;
    border-radius: var(--radius-sm);
    min-height: 48px;
    box-shadow:
      0 4px 20px rgba(90, 84, 189, 0.35),
      0 0 40px rgba(90, 84, 189, 0.1);
    position: relative;
    overflow: hidden;
  }

  .btn-success::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
      135deg,
      rgba(255, 255, 255, 0.1) 0%,
      transparent 50%
    );
    pointer-events: none;
  }

  .btn-success:hover {
    box-shadow:
      0 6px 28px rgba(90, 84, 189, 0.45),
      0 0 60px rgba(90, 84, 189, 0.15);
    transform: scale(var(--btn-hover-scale, 1.05));
  }

  .btn-success:active {
    transform: scale(var(--btn-active-scale, 0.98));
    box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.3);
    transition:
      transform 0.1s ease,
      box-shadow 0.1s ease;
  }

  .btn-success.ready-pulse:not(:disabled) {
    animation: btnGlow 2s ease-in-out infinite;
  }

  @keyframes btnGlow {
    0%,
    100% {
      box-shadow:
        0 0 0 0 rgba(90, 84, 189, 0.4),
        0 4px 20px rgba(90, 84, 189, 0.35),
        0 0 40px rgba(90, 84, 189, 0.1);
    }
    50% {
      box-shadow:
        0 0 0 8px rgba(90, 84, 189, 0),
        0 4px 28px rgba(90, 84, 189, 0.5),
        0 0 60px rgba(90, 84, 189, 0.2);
    }
  }

  .btn:disabled {
    opacity: var(--btn-disabled-opacity, 0.4);
    cursor: not-allowed;
    transform: none !important;
    box-shadow: none !important;
  }

  /* ============================================
           INDUSTRY CARDS - Dark glass 2-column
           ============================================ */
  .industry-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }

  .industry-card {
    padding: 12px 16px;
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all var(--duration-normal) var(--ease-spring);
    text-align: left;
    background: rgba(255, 255, 255, 0.03);
    position: relative;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .industry-card::before {
    display: none;
  }

  .industry-card:hover {
    border-color: var(--glass-border-hover);
    background: rgba(255, 255, 255, 0.06);
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(90, 84, 189, 0.15);
  }

  .industry-card.selected {
    border-color: rgba(90, 84, 189, 0.5) !important;
    background: rgba(90, 84, 189, 0.08) !important;
    box-shadow:
      0 0 0 2px rgba(90, 84, 189, 0.3),
      inset 0 0 0 1px rgba(90, 84, 189, 0.3),
      0 8px 24px rgba(90, 84, 189, 0.15) !important;
  }

  .industry-card.selected::before {
    display: none;
  }

  .industry-card .icon {
    font-size: 24px;
    margin-bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 40px;
    height: 40px;
    flex-shrink: 0;
  }

  .industry-card .name {
    font-weight: 600;
    font-size: 14px;
    color: var(--text-primary);
    margin-bottom: 0;
  }

  .industry-card .desc {
    font-size: 12px;
    color: var(--text-muted);
    display: none;
  }

  /* ============================================
           JOB CATEGORY CARDS (3 columns)
           ============================================ */
  .job-category-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 8px;
  }

  .job-cat-card {
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-sm);
    padding: 12px 10px;
    text-align: center;
    cursor: pointer;
    transition: all var(--duration-normal) var(--ease-spring);
    background: rgba(255, 255, 255, 0.03);
    position: relative;
    user-select: none;
  }

  .job-cat-card::before {
    display: none;
  }

  .job-cat-card:hover {
    border-color: var(--glass-border-hover);
    background: rgba(255, 255, 255, 0.06);
    transform: translateY(-1px);
  }

  .job-cat-card.selected {
    border-color: rgba(90, 84, 189, 0.5);
    background: rgba(90, 84, 189, 0.08);
    box-shadow:
      inset 0 0 0 1px rgba(90, 84, 189, 0.3),
      0 0 12px rgba(90, 84, 189, 0.08);
  }

  .job-cat-card .cat-icon {
    font-size: 22px;
    margin-bottom: 4px;
    display: block;
  }

  .job-cat-card .cat-name {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.3;
  }

  .job-cat-card .cat-check {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--primary);
    color: white;
    font-size: 9px;
    display: none;
    align-items: center;
    justify-content: center;
    font-weight: 700;
  }

  .job-cat-card.selected .cat-check {
    display: flex;
  }

  /* ============================================
           JOB CATEGORY INSIGHT PANEL
           ============================================ */
  .job-category-insight {
    margin-top: 16px;
    padding: 16px 20px;
    background: rgba(90, 84, 189, 0.06);
    border-radius: var(--radius-md);
    border: 1px solid rgba(90, 84, 189, 0.15);
    animation: fadeIn 0.3s ease;
  }

  .job-category-insight .insight-header {
    font-weight: 700;
    color: var(--text-primary);
    font-size: 13px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .job-category-insight .insight-header .insight-badge {
    background: var(--primary);
    color: white;
    font-size: 9px;
    padding: 2px 8px;
    border-radius: var(--radius-sm);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }

  .insight-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .insight-item {
    background: rgba(255, 255, 255, 0.04);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    border: 1px solid var(--glass-border);
  }

  .insight-item .insight-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .insight-item .insight-value {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.4;
  }

  .insight-channels {
    margin-top: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .insight-channels .insight-ch {
    background: rgba(90, 84, 189, 0.06);
    border: 1px solid rgba(90, 84, 189, 0.15);
    border-radius: 16px;
    padding: 3px 10px;
    font-size: 10px;
    color: var(--primary-light);
    font-weight: 500;
  }

  /* ============================================
           REVIEW SECTION (base styles - enhanced in card section below)
           ============================================ */
  .review-section h3 {
    font-size: 12px;
    color: var(--primary-light);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 700;
  }

  .review-item {
    display: flex;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.04);
  }

  .review-item:last-child {
    border-bottom: none;
  }

  .review-item .label {
    font-weight: 500;
    width: 180px;
    flex-shrink: 0;
    color: var(--text-muted);
    font-size: 13px;
  }

  .review-item .value {
    font-size: 13px;
    color: var(--text-primary);
    font-weight: 500;
  }

  .review-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }

  .review-edit-btn {
    font-size: 12px;
    color: var(--primary-light);
    cursor: pointer;
    text-decoration: none;
    padding: 4px 14px;
    border-radius: 20px;
    border: 1px solid rgba(90, 84, 189, 0.2);
    transition: all 0.2s ease;
    font-weight: 500;
    background: rgba(90, 84, 189, 0.06);
  }

  .review-edit-btn:hover {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }

  /* Chips */
  .chip-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .chip {
    padding: 4px 12px;
    background: rgba(90, 84, 189, 0.08);
    border-radius: 20px;
    font-size: 12px;
    color: var(--primary-light);
    font-weight: 500;
    border: 1px solid rgba(90, 84, 189, 0.15);
  }

  /* ============================================
           WIZARD STEP VISIBILITY + Transition polish
           ============================================ */
  .wizard-step {
    display: none;
    opacity: 0;
    transform: translateX(20px);
    transition:
      opacity var(--duration-slow) var(--ease-standard),
      transform var(--duration-slow) var(--ease-standard);
  }
  .wizard-step.active {
    display: block;
    opacity: 1;
    transform: translateX(0);
  }

  .wizard-step.step-animating {
    animation: fadeInUp 0.4s ease-out;
  }

  /* Space Grotesk for step headings */
  .wizard-step h2,
  .card h2 {
    font-family: var(--font-display);
    letter-spacing: var(--tracking-tight);
  }

  /* ============================================
           SPINNER
           ============================================ */
  .spinner {
    width: 20px;
    height: 20px;
    border: 3px solid rgba(255, 255, 255, 0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: inline-block;
  }

  /* ============================================
           SELECT CONTROLS
           ============================================ */
  .select-controls {
    display: flex;
    gap: 12px;
    margin-bottom: 8px;
  }

  .select-controls a {
    font-size: 12px;
    color: var(--primary-light);
    cursor: pointer;
    text-decoration: none;
    font-weight: 500;
    transition: color 0.2s;
  }

  .select-controls a:hover {
    color: var(--text-primary);
    text-decoration: underline;
  }

  /* ============================================
           SECTION DIVIDERS
           ============================================ */
  .section-divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 32px 0;
    color: var(--primary-light);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    font-weight: 700;
  }

  .section-divider::before,
  .section-divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--glass-border);
  }

  .section-divider::after {
    background: var(--glass-border);
  }

  /* ============================================
           CHECKBOX GROUPS - Rounded pill/card style
           ============================================ */
  .checkbox-group {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .checkbox-group label {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    text-transform: none;
    letter-spacing: 0;
    color: var(--text-secondary);
    transition: all 0.25s var(--ease-spring);
    user-select: none;
    background: rgba(255, 255, 255, 0.03);
  }

  .checkbox-group label:hover {
    border-color: var(--glass-border-hover);
    background: rgba(255, 255, 255, 0.06);
  }

  .checkbox-group input[type="checkbox"] {
    accent-color: var(--primary);
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }

  .checkbox-group input[type="checkbox"]:checked + span,
  .checkbox-group label:has(input:checked) {
    border-color: rgba(90, 84, 189, 0.5);
    background: rgba(90, 84, 189, 0.08);
    color: var(--text-primary);
  }

  /* ============================================
           KEYFRAME ANIMATIONS - Reduced set
           ============================================ */
  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
    }
    to {
      opacity: 1;
    }
  }

  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(12px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes fadeOutDown {
    from {
      opacity: 1;
      transform: translateY(0);
    }
    to {
      opacity: 0;
      transform: translateY(-8px);
    }
  }

  @keyframes scaleIn {
    from {
      transform: scale(0.96);
      opacity: 0;
    }
    to {
      transform: scale(1);
      opacity: 1;
    }
  }

  @keyframes slideUp {
    from {
      opacity: 0;
      transform: translateY(8px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes pulse {
    0% {
      transform: scale(1);
    }
    50% {
      transform: scale(1.03);
    }
    100% {
      transform: scale(1);
    }
  }

  @keyframes shimmer {
    0% {
      background-position: -200% 0;
    }
    100% {
      background-position: 200% 0;
    }
  }

  @keyframes shake {
    0%,
    100% {
      transform: translateX(0);
    }
    20%,
    60% {
      transform: translateX(-3px);
    }
    40%,
    80% {
      transform: translateX(3px);
    }
  }

  @keyframes checkmarkDraw {
    0% {
      stroke-dashoffset: 20;
    }
    100% {
      stroke-dashoffset: 0;
    }
  }

  @keyframes progressPulse {
    0%,
    100% {
      opacity: 1;
    }
    50% {
      opacity: 0.6;
    }
  }

  @keyframes toastSlideIn {
    from {
      transform: translateX(100%);
      opacity: 0;
    }
    to {
      transform: translateX(0);
      opacity: 1;
    }
  }

  @keyframes toastSlideOut {
    from {
      transform: translateX(0);
      opacity: 1;
    }
    to {
      transform: translateX(100%);
      opacity: 0;
    }
  }

  @keyframes confetti-fall {
    0% {
      transform: translateY(-100vh) rotate(0deg);
      opacity: 1;
    }
    100% {
      transform: translateY(100vh) rotate(720deg);
      opacity: 0;
    }
  }

  /* Step content animations */
  .step-content.active {
    animation: stepFadeIn 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  .step-content.exiting {
    animation: fadeOutDown 0.3s ease-in;
  }

  @keyframes stepFadeIn {
    from {
      opacity: 0;
      transform: translateY(12px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* ============================================
           PAGE PROGRESS BAR
           ============================================ */
  .page-progress {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 2px;
    background: transparent;
    z-index: 9999;
  }

  .page-progress-fill {
    height: 100%;
    background: var(--primary);
    transition: width 0.5s var(--ease-standard);
    border-radius: 0 1px 1px 0;
  }

  /* ============================================
           TOAST NOTIFICATIONS - Dark, bottom-right
           ============================================ */
  .toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
  }

  .toast-item {
    pointer-events: auto;
    background: rgba(15, 18, 30, 0.85);
    backdrop-filter: var(--glass-blur-md);
    -webkit-backdrop-filter: var(--glass-blur-md);
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow-xl);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 300px;
    max-width: 400px;
    animation: toastSlideIn 0.3s var(--ease-out);
    font-size: 13px;
    color: rgba(255, 255, 255, 0.9);
    border: 1px solid var(--glass-border);
  }

  .toast-item.toast-exiting {
    animation: toastSlideOut 0.2s ease-in forwards;
  }

  .toast-item .toast-icon {
    font-size: 18px;
    flex-shrink: 0;
  }

  .toast-item .toast-message {
    flex: 1;
    font-weight: 500;
  }

  .toast-item .toast-close {
    cursor: pointer;
    opacity: 0.4;
    font-size: 16px;
    padding: 0 4px;
    flex-shrink: 0;
    transition: opacity var(--duration-fast);
    color: white;
  }

  .toast-item .toast-close:hover {
    opacity: 1;
  }

  /* Error toasts: make close button prominent since they persist */
  .toast-error .toast-close {
    opacity: 0.7;
    font-size: 18px;
    font-weight: 600;
  }

  .toast-error {
    border-color: rgba(239, 68, 68, 0.3);
  }

  .toast-success .toast-icon {
    color: #4ade80;
  }
  .toast-error .toast-icon {
    color: #fb7185;
  }
  .toast-info .toast-icon {
    color: #60a5fa;
  }
  .toast-warning .toast-icon {
    color: #fbbf24;
  }

  /* ============================================
           CONFETTI
           ============================================ */
  .confetti-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10000;
    overflow: hidden;
  }

  .confetti-piece {
    position: absolute;
    width: 10px;
    height: 10px;
    top: -10px;
    animation: confetti-fall linear forwards;
    opacity: 0.9;
  }

  /* ============================================
           GENERATION OVERLAY - Clean solid
           ============================================ */
  .generation-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    z-index: 9998;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity var(--duration-slow) ease;
  }

  .generation-overlay.visible {
    opacity: 1;
  }

  .generation-card {
    background: rgba(15, 18, 30, 0.85);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border-radius: var(--radius-lg);
    padding: 40px;
    box-shadow:
      var(--shadow-xl),
      0 0 80px rgba(90, 84, 189, 0.08);
    text-align: center;
    max-width: 420px;
    width: 90%;
    border: 1px solid var(--glass-border);
  }

  .generation-card h3 {
    font-size: 20px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 4px;
    letter-spacing: -0.03em;
  }

  .generation-card .gen-subtitle {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 24px;
  }

  .gen-steps {
    text-align: left;
  }

  .gen-step {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 0;
    font-size: 14px;
    color: var(--text-muted);
    opacity: 0.4;
    transition: all var(--duration-normal) var(--ease-standard);
  }

  .gen-step.gen-active {
    opacity: 1;
    color: var(--text-primary);
    font-weight: 600;
  }

  .gen-step.gen-complete {
    opacity: 1;
    color: var(--secondary);
  }

  .gen-step-icon {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0;
    flex-shrink: 0;
    background: rgba(255, 255, 255, 0.12);
    transition: all var(--duration-normal) var(--ease-standard);
    position: relative;
    margin-left: 4px;
  }

  .gen-step-icon::before {
    content: "";
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 2px;
    height: 20px;
    background: rgba(255, 255, 255, 0.08);
  }

  .gen-step:last-child .gen-step-icon::before {
    display: none;
  }

  .gen-step.gen-active .gen-step-icon {
    background: var(--primary);
    animation: progressPulse 1.5s ease-in-out infinite;
    box-shadow: none;
    width: 10px;
    height: 10px;
    margin-left: 3px;
  }

  .gen-step.gen-complete .gen-step-icon {
    background: var(--secondary);
    box-shadow: none;
  }

  .gen-step.gen-complete .gen-step-icon::before {
    background: rgba(107, 179, 205, 0.4);
  }

  .gen-step.gen-active .gen-step-icon .gen-spinner {
    display: none;
  }

  /* ── Lottie loading animation in generation overlay ── */
  .gen-lottie-wrap {
    width: 64px;
    height: 64px;
    margin: 0 auto 16px;
    position: relative;
  }

  .gen-lottie-dots {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .gen-lottie-dots .gen-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--primary);
    animation: gen-dot-pulse 1.4s ease-in-out infinite;
  }

  .gen-lottie-dots .gen-dot:nth-child(2) {
    animation-delay: 0.2s;
    background: var(--primary-light, #7b75d4);
  }

  .gen-lottie-dots .gen-dot:nth-child(3) {
    animation-delay: 0.4s;
    background: var(--secondary, #6bb3cd);
  }

  @keyframes gen-dot-pulse {
    0%,
    80%,
    100% {
      transform: scale(0.6);
      opacity: 0.4;
    }
    40% {
      transform: scale(1.2);
      opacity: 1;
    }
  }

  /* Success checkmark animation */
  .gen-success-check {
    display: none;
    width: 64px;
    height: 64px;
    margin: 0 auto 16px;
    position: relative;
  }

  .gen-success-check.visible {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .gen-success-check svg {
    width: 48px;
    height: 48px;
  }

  .gen-success-check .check-circle {
    stroke: var(--secondary, #6bb3cd);
    stroke-width: 2;
    fill: none;
    stroke-dasharray: 166;
    stroke-dashoffset: 166;
    animation: gen-check-circle 0.6s ease-out 0.1s forwards;
  }

  .gen-success-check .check-mark {
    stroke: var(--secondary, #6bb3cd);
    stroke-width: 3;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 50;
    stroke-dashoffset: 50;
    animation: gen-check-mark 0.4s ease-out 0.5s forwards;
  }

  @keyframes gen-check-circle {
    to {
      stroke-dashoffset: 0;
    }
  }
  @keyframes gen-check-mark {
    to {
      stroke-dashoffset: 0;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .gen-lottie-dots .gen-dot {
      animation: none;
      opacity: 0.7;
      transform: none;
    }
    .gen-success-check .check-circle,
    .gen-success-check .check-mark {
      animation: none;
      stroke-dashoffset: 0;
    }
  }

  .gen-progress-bar {
    margin-top: 20px;
    height: 3px;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 2px;
    overflow: hidden;
  }

  .gen-progress-fill {
    height: 100%;
    background: var(--primary);
    border-radius: 2px;
    transition: width 0.6s var(--ease-standard);
    width: 0%;
  }

  /* ============================================
           FORM VALIDATION
           ============================================ */
  .form-group.floating-label {
    position: relative;
  }

  .form-group.field-valid input,
  .form-group.field-valid select,
  .form-group.field-valid textarea {
    border-color: rgba(90, 84, 189, 0.4);
  }

  .form-group.field-valid::after {
    content: "\2713";
    position: absolute;
    right: 12px;
    top: 38px;
    color: var(--primary-light);
    font-size: 16px;
    font-weight: bold;
  }

  .form-group.field-error input,
  .form-group.field-error select,
  .form-group.field-error textarea {
    border-color: var(--error) !important;
    animation: shake 0.4s ease;
  }

  .field-error-msg {
    color: var(--error);
    font-size: 12px;
    margin-top: 4px;
    display: none;
  }

  .form-group.field-error .field-error-msg {
    display: block;
  }

  /* Visual feedback when select has a value chosen */
  .form-group select.has-value {
    border-color: rgba(90, 84, 189, 0.35);
    color: var(--text-primary);
  }

  /* Error state for tags container (locations/roles) */
  .form-group.field-error .tags-container {
    border-color: var(--error) !important;
    animation: shake 0.4s ease;
  }

  /* ============================================
           CUSTOM SCROLLBAR
           ============================================ */
  ::-webkit-scrollbar {
    width: 6px;
    height: 6px;
  }

  ::-webkit-scrollbar-track {
    background: transparent;
    border-radius: 3px;
  }

  ::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 3px;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.18);
  }

  .channel-grid::-webkit-scrollbar {
    width: 5px;
  }

  .channel-grid::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.08);
    border-radius: 3px;
  }

  /* ============================================
           FOCUS VISIBLE
           ============================================ */
  *:focus-visible {
    outline: none;
    box-shadow: var(--focus-ring);
  }

  input:focus-visible,
  select:focus-visible,
  textarea:focus-visible {
    outline: 2px solid #6bb3cd;
    outline-offset: 2px;
  }

  /* ============================================
           RESPONSIVE
           ============================================ */
  @media (max-width: 1024px) {
    .container {
      padding: 28px 16px;
    }
    .card {
      padding: 24px;
    }
    .industry-grid {
      grid-template-columns: repeat(2, 1fr);
    }
    .job-category-grid {
      grid-template-columns: repeat(3, 1fr);
    }
  }

  @media (max-width: 768px) {
    .form-row {
      grid-template-columns: 1fr;
    }
    .industry-grid {
      grid-template-columns: repeat(2, 1fr);
    }
    .job-category-grid {
      grid-template-columns: repeat(2, 1fr);
    }
    .container {
      padding: 20px 16px;
    }
    .card {
      padding: 20px;
    }
    .app-header {
      padding: 0 16px;
      height: 56px;
    }
    .app-header h1 {
      font-size: 15px;
    }
    .btn {
      min-height: 44px;
    }
    .btn-success {
      padding: 12px 28px;
      font-size: 14px;
    }
    .toast-item {
      min-width: 260px;
      max-width: 90vw;
    }
    .generation-card {
      padding: 28px 24px;
    }
    .review-item .label {
      width: 140px;
    }
    .checkbox-group {
      grid-template-columns: 1fr 1fr;
    }
    .insight-grid {
      grid-template-columns: 1fr;
    }
    .step-label {
      font-size: 10px;
    }
  }

  @media (max-width: 480px) {
    .progress-bar {
      gap: 4px;
    }
    .step-label {
      font-size: 9px;
      max-width: 60px;
    }
    .step-label .full-label {
      display: none;
    }
    .step-label .short-label {
      display: inline;
    }
    .container {
      padding: 16px 10px;
    }
    .card {
      padding: 16px;
    }
    .card h2 {
      font-size: 18px;
    }
    .industry-grid {
      grid-template-columns: 1fr;
      gap: 6px;
    }
    .industry-card {
      padding: 10px 14px;
    }
    .industry-card .icon {
      font-size: 20px;
      width: 32px;
      height: 32px;
    }
    .industry-card .name {
      font-size: 13px;
    }
    .btn {
      padding: 10px 20px;
      font-size: 13px;
    }
    .btn-success {
      padding: 12px 24px;
      font-size: 14px;
    }
    .form-group label {
      font-size: 12px;
    }
    .toast-container {
      right: 12px;
      left: 12px;
      bottom: 90px;
    }
    .toast-item {
      min-width: auto;
    }
    .checkbox-group {
      grid-template-columns: 1fr;
    }
    .job-category-grid {
      grid-template-columns: repeat(2, 1fr);
    }
    .app-header h1 {
      font-size: 14px;
    }
    .app-header p {
      display: none;
    }
    .logo {
      width: 32px;
      height: 32px;
      font-size: 18px;
    }
    .form-section [style*="grid-template-columns: 1fr 1fr"] {
      grid-template-columns: 1fr !important;
    }
    .review-item {
      flex-direction: column;
      gap: 2px;
    }
    .review-item .label {
      width: auto;
    }
  }

  /* ============================================
           ANIMATIONS - Minimal, purposeful
           ============================================ */

  /* Hide decorative elements */
  .header-particle {
    display: none;
  }
  .ai-badge {
    display: none;
  }

  .loading-shimmer {
    background: linear-gradient(
      90deg,
      rgba(255, 255, 255, 0.03) 25%,
      rgba(255, 255, 255, 0.06) 50%,
      rgba(255, 255, 255, 0.03) 75%
    );
    background-size: 200% 100%;
    animation: shimmer 1.5s ease infinite;
    border-radius: var(--radius-sm);
  }

  .wizard-step.active .card {
    animation: fadeInUp 0.4s var(--ease-out) forwards;
  }
  /* Toggle Switch */
  .toggle-switch {
    position: relative;
    display: inline-block;
    width: 44px;
    height: 24px;
    flex-shrink: 0;
    cursor: pointer;
  }

  .toggle-switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }

  .toggle-slider {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: rgba(255, 255, 255, 0.12);
    border-radius: 12px;
    transition: background var(--duration-normal) var(--ease-standard);
  }

  .toggle-slider:before {
    position: absolute;
    content: "";
    height: 18px;
    width: 18px;
    left: 3px;
    bottom: 3px;
    background-color: white;
    border-radius: 50%;
    transition: transform var(--duration-normal) var(--ease-standard);
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.12);
  }

  .toggle-switch input:checked + .toggle-slider {
    background-color: var(--primary);
  }

  .toggle-switch input:checked + .toggle-slider:before {
    transform: translateX(20px);
  }

  /* Channel Category Cards */
  .channel-categories {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .channel-category-card {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-sm);
    padding: 20px 24px;
    transition: all 0.3s var(--ease-spring);
  }

  .channel-category-card:hover {
    border-color: var(--glass-border-hover);
    background: rgba(255, 255, 255, 0.05);
  }

  .category-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .category-info {
    display: flex;
    align-items: center;
    gap: 16px;
    flex: 1;
  }

  .category-icon {
    font-size: 28px;
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(90, 84, 189, 0.06);
    border-radius: 12px;
    flex-shrink: 0;
  }

  .category-info h3 {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 2px;
  }

  .category-info p {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.4;
  }

  /* Nav buttons for step 3 */
  .nav-buttons {
    display: flex;
    justify-content: space-between;
    margin-top: 24px;
  }

  /* ============================================
           CHANNEL INFO TOOLTIPS
           ============================================ */
  .channel-info-tooltip {
    position: relative;
    display: inline-block;
    margin-left: 8px;
    cursor: help;
    color: var(--primary);
    font-size: 14px;
  }
  .channel-info-tooltip .tooltip-content {
    visibility: hidden;
    opacity: 0;
    position: absolute;
    bottom: 125%;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(15, 18, 30, 0.9);
    backdrop-filter: var(--glass-blur-md);
    -webkit-backdrop-filter: var(--glass-blur-md);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    padding: 12px 16px;
    width: 280px;
    font-size: 12px;
    color: var(--text-secondary);
    box-shadow: var(--shadow-lg);
    z-index: 100;
    transition: all 0.2s ease;
    line-height: 1.5;
  }
  .channel-info-tooltip:hover .tooltip-content {
    visibility: visible;
    opacity: 1;
  }
  .tooltip-content strong {
    display: block;
    margin-bottom: 4px;
    color: var(--text-primary);
    font-size: 13px;
  }

  /* ============================================
           STEP CIRCLE COMPLETION CHECKMARKS
           ============================================ */
  .step-circle.completed::after {
    display: none;
  }

  /* ============================================
           IMPROVED REVIEW SECTION CARDS
           ============================================ */
  .review-section {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-md);
    padding: 20px 24px;
    margin-bottom: 12px;
    transition: border-color var(--duration-fast) var(--ease-standard);
  }
  .review-section:hover {
    border-color: var(--glass-border-hover);
  }
  .review-section h3 {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .review-section .edit-link {
    font-size: 12px;
    padding: 4px 10px;
    background: transparent;
    border-radius: var(--radius-sm);
    color: var(--primary-light);
    cursor: pointer;
    text-decoration: none;
    transition: background var(--duration-fast);
    font-weight: 500;
  }
  .review-section .edit-link:hover {
    background: rgba(90, 84, 189, 0.08);
  }

  /* ============================================
           LINKEDIN-INSPIRED SECTION DIVIDERS (Numbered)
           ============================================ */
  .li-section-divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 32px 0 24px;
    padding: 0;
  }

  .li-section-divider .section-number {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--primary);
    color: white;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 0 12px rgba(90, 84, 189, 0.3);
  }

  .li-section-divider .section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--primary-light);
    text-transform: uppercase;
    letter-spacing: 1.2px;
  }

  .li-section-divider .section-line {
    flex: 1;
    height: 1px;
    background: var(--glass-border);
  }

  /* ============================================
           HERO STAT SUCCESS SECTION
           ============================================ */
  .hero-stat-section {
    display: none;
    margin-bottom: 24px;
    animation: fadeInUp 0.5s ease-out;
  }

  .hero-stat-section.visible {
    display: block;
  }

  .hero-stat-card {
    background: rgba(15, 18, 30, 0.8);
    backdrop-filter: var(--glass-blur-md);
    -webkit-backdrop-filter: var(--glass-blur-md);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-md);
    padding: 40px 32px;
    text-align: center;
    color: white;
    position: relative;
    overflow: hidden;
  }

  .hero-stat-card::before {
    display: none;
  }

  .hero-stat-card::after {
    display: none;
  }

  .hero-stat-number {
    font-size: 72px;
    font-weight: 800;
    color: var(--primary);
    line-height: 1;
    margin-bottom: 8px;
    text-shadow: 0 2px 20px rgba(90, 84, 189, 0.4);
    position: relative;
    z-index: 1;
  }

  .hero-stat-label {
    font-size: 18px;
    font-weight: 600;
    opacity: 0.95;
    margin-bottom: 24px;
    position: relative;
    z-index: 1;
  }

  .hero-stat-files {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: 28px;
    position: relative;
    z-index: 1;
  }

  .hero-file-card {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 12px;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.3s ease;
  }

  .hero-file-card:hover {
    background: rgba(255, 255, 255, 0.15);
    transform: translateY(-2px);
  }

  .hero-file-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  .hero-file-icon.excel {
    background: rgba(69, 112, 46, 0.3);
  }

  .hero-file-icon.ppt {
    background: rgba(90, 84, 189, 0.3);
  }

  .hero-file-info {
    text-align: left;
  }

  .hero-file-name {
    font-size: 14px;
    font-weight: 600;
  }

  .hero-file-status {
    font-size: 12px;
    opacity: 0.7;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .hero-file-status .check {
    color: var(--primary-light);
  }

  /* ============================================
           CHANNEL CATEGORY METRIC CARD ENHANCEMENTS
           ============================================ */
  .channel-category-card {
    transition: border-color var(--duration-fast) var(--ease-standard);
  }

  .channel-category-card:has(input:checked) {
    border-color: rgba(90, 84, 189, 0.4);
    background: rgba(90, 84, 189, 0.06);
  }

  .channel-category-card:has(input:checked) .category-icon {
    background: rgba(90, 84, 189, 0.12);
  }

  .channel-category-card:has(input:checked) h3 {
    color: var(--text-primary);
  }

  /* ============================================
           TOGGLE GROUP CHECKED STATE
           ============================================ */

  .toggle-group:has(input:checked) {
    border-color: rgba(90, 84, 189, 0.4);
    background: rgba(90, 84, 189, 0.06);
  }

  .toggle-group:has(input:checked) strong {
    color: var(--text-primary);
  }

  /* ============================================
           FOOTER / BRANDING
           ============================================ */
  .app-footer {
    background: transparent;
    border-top: 1px solid var(--glass-border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-muted);
    position: relative;
    z-index: 1;
  }

  .app-footer .footer-brand {
    font-weight: 600;
    color: var(--text-secondary);
  }

  .app-footer .footer-dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--primary);
    display: inline-block;
  }

  /* ============================================
           ENHANCED GENERATION OVERLAY
           ============================================ */
  .generation-card h3 {
    color: var(--text-primary);
  }

  .gen-step.gen-active {
    color: var(--text-primary);
  }

  .gen-step.gen-complete {
    color: var(--secondary);
  }

  /* ============================================
           RESPONSIVE UPDATES FOR NEW ELEMENTS
           ============================================ */
  @media (max-width: 768px) {
    .hero-stat-number {
      font-size: 48px;
    }
    .hero-stat-files {
      flex-direction: column;
      align-items: center;
    }
    .hero-file-card {
      width: 100%;
      max-width: 280px;
    }
    .app-footer {
      padding: 16px 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .li-section-divider .section-number {
      width: 28px;
      height: 28px;
      font-size: 11px;
    }
  }

  @media (max-width: 480px) {
    .hero-stat-number {
      font-size: 36px;
    }
    .hero-stat-card {
      padding: 28px 20px;
    }
    .hero-stat-label {
      font-size: 15px;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    *,
    *::before,
    *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
    .logo {
      animation: none;
    }
    .reveal-on-scroll {
      opacity: 1;
      transform: none;
      transition: none;
    }
    .streaming-text .word {
      opacity: 1 !important;
      transform: none !important;
      animation: none !important;
    }
    .page-enter {
      opacity: 1 !important;
      transform: none !important;
      animation: none !important;
    }
    .form-group label {
      transition: none !important;
      transform: none !important;
    }
    .form-group:focus-within label {
      transform: none;
    }
    /* Phase 4 reduced motion */
    .ambient-glow {
      animation: none !important;
    }
    .hero-scan::after {
      animation: none !important;
      display: none;
    }
    .preset-chip {
      transition: none !important;
      transform: none !important;
    }
    .plan-channel-fill {
      transition: none !important;
    }
    .plan-dashboard {
      animation: none !important;
    }
  }

  /* ============================================
           PRESET PROMPT CHIPS
           ============================================ */
  .preset-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
    margin-bottom: 24px;
    padding: 0 4px;
  }
  .preset-label {
    font-size: 0.82rem;
    color: var(--text-muted, #666);
    white-space: nowrap;
  }
  .preset-chip {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 0.82rem;
    color: var(--text-secondary, #a1a1a1);
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .preset-chip:hover {
    background: rgba(90, 84, 189, 0.15);
    border-color: rgba(90, 84, 189, 0.3);
    color: white;
    transform: translateY(-1px);
  }
  .preset-chip.preset-active {
    background: rgba(90, 84, 189, 0.3);
    border-color: rgba(90, 84, 189, 0.5);
    color: white;
  }

  /* ============================================
           PLAN DASHBOARD (Structured Output)
           ============================================ */
  .plan-dashboard {
    display: flex;
    flex-direction: column;
    gap: 24px;
    animation: fadeInUp 0.5s ease-out;
  }
  .plan-dashboard-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text, white);
    margin-bottom: 4px;
  }
  .plan-metrics-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }
  .plan-metric-card {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
  }
  .plan-metric-label {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .plan-metric-value {
    font-size: 1.6rem;
    font-weight: 700;
    color: white;
  }
  .plan-metric-value.accent {
    color: var(--primary);
  }
  .plan-section-label {
    font-size: 0.88rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted, #666);
    margin-top: 24px;
    margin-bottom: 8px;
  }
  .plan-channels {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .plan-channel-bar {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .plan-channel-name {
    width: 140px;
    font-size: 0.85rem;
    color: #a1a1a1;
    flex-shrink: 0;
  }
  .plan-channel-track {
    flex: 1;
    height: 8px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 4px;
    overflow: hidden;
  }
  .plan-channel-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 1s ease;
  }
  .plan-channel-fill.bar-indigo {
    background: linear-gradient(90deg, #5a54bd, #7b75d4);
  }
  .plan-channel-fill.bar-cyan {
    background: linear-gradient(90deg, #06b6d4, #6bb3cd);
  }
  .plan-channel-fill.bar-green {
    background: linear-gradient(90deg, #5a54bd, #7b76d1);
  }
  .plan-channel-fill.bar-amber {
    background: linear-gradient(90deg, #f59e0b, #fbbf24);
  }
  .plan-channel-fill.bar-rose {
    background: linear-gradient(90deg, #f43f5e, #fb7185);
  }
  .plan-channel-value {
    width: 80px;
    text-align: right;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-secondary, #a1a1a1);
  }
  .plan-channel-cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  .plan-channel-card {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    padding: 20px;
  }
  .plan-channel-card-name {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text, white);
    margin-bottom: 4px;
  }
  .plan-channel-badge {
    display: inline-block;
    font-size: 0.68rem;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    margin-bottom: 12px;
  }
  .plan-channel-badge.badge-major {
    background: rgba(90, 84, 189, 0.15);
    color: #7b75d4;
  }
  .plan-channel-badge.badge-programmatic {
    background: rgba(6, 182, 212, 0.15);
    color: #6bb3cd;
  }
  .plan-channel-badge.badge-social {
    background: rgba(107, 179, 205, 0.15);
    color: #6bb3cd;
  }
  .plan-channel-badge.badge-other {
    background: rgba(245, 158, 11, 0.15);
    color: #fbbf24;
  }
  .plan-channel-card-stat {
    display: flex;
    justify-content: space-between;
    font-size: 0.82rem;
    padding: 4px 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.04);
  }
  .plan-channel-card-stat:last-child {
    border-bottom: none;
  }
  .plan-channel-card-stat .stat-label {
    color: var(--text-muted);
  }
  .plan-channel-card-stat .stat-value {
    color: var(--text-secondary, #a1a1a1);
    font-weight: 600;
  }
  .plan-insights-card {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    padding: 24px;
  }
  .plan-insights-card ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .plan-insights-card li {
    padding: 8px 0;
    font-size: 0.88rem;
    color: var(--text-secondary, #a1a1a1);
    border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    line-height: 1.5;
  }
  .plan-insights-card li:last-child {
    border-bottom: none;
  }
  .plan-insights-card li::before {
    content: "\2022";
    color: var(--primary);
    font-weight: bold;
    margin-right: 10px;
  }

  @media (max-width: 768px) {
    .plan-metrics-row {
      grid-template-columns: repeat(2, 1fr);
    }
    .plan-channel-cards {
      grid-template-columns: 1fr;
    }
    .plan-channel-name {
      width: 100px;
    }
    .preset-row {
      gap: 8px;
    }
    .preset-chip {
      font-size: 0.76rem;
      padding: 5px 12px;
    }
  }

  @media (max-width: 480px) {
    .plan-metrics-row {
      grid-template-columns: 1fr;
    }
    .plan-metric-value {
      font-size: 1.4rem;
    }
    .plan-channel-bar {
      flex-wrap: wrap;
      gap: 6px;
    }
    .plan-channel-name {
      width: 100%;
    }
    .plan-channel-value {
      width: auto;
    }
  }

  /* ============================================
           PLAN DASHBOARD ENHANCEMENTS (server-driven)
           ============================================ */
  .plan-market-insights {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }
  .plan-insight-item {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 10px;
    padding: 16px;
  }
  .plan-insight-item .insight-label {
    font-size: 0.7rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .plan-insight-item .insight-val {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text-primary);
  }
  .plan-insight-item .insight-val.favorable {
    color: #6bb3cd;
  }
  .plan-insight-item .insight-val.moderate {
    color: #f59e0b;
  }
  .plan-insight-item .insight-val.challenging {
    color: #ef4444;
  }
  .plan-svg-chart {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 12px;
    padding: 20px;
    overflow-x: auto;
  }
  .plan-table-wrap {
    overflow-x: auto;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.08);
  }
  .plan-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }
  .plan-table th {
    background: rgba(255, 255, 255, 0.06);
    color: #a1a1a1;
    font-weight: 600;
    text-transform: uppercase;
    font-size: 0.7rem;
    letter-spacing: 0.5px;
    padding: 12px 16px;
    text-align: left;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  .plan-table th:hover {
    color: white;
  }
  .plan-table th .sort-arrow {
    opacity: 0.4;
    margin-left: 4px;
  }
  .plan-table th.sorted .sort-arrow {
    opacity: 1;
    color: var(--primary);
  }
  .plan-table td {
    padding: 12px 16px;
    color: var(--text-secondary);
    border-top: 1px solid rgba(255, 255, 255, 0.04);
  }
  .plan-table tr:hover td {
    background: rgba(255, 255, 255, 0.03);
  }
  .plan-recs-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .plan-recs-list li {
    padding: 10px 0;
    font-size: 0.88rem;
    color: var(--text-secondary);
    border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .plan-recs-list li:last-child {
    border-bottom: none;
  }
  .plan-rec-icon {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: rgba(90, 84, 189, 0.15);
    color: var(--primary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: 700;
    margin-top: 1px;
  }
  .plan-clear-form {
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.12);
    color: var(--text-muted);
    font-size: 0.78rem;
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .plan-clear-form:hover {
    border-color: #ef4444;
    color: #ef4444;
  }
  .form-restored-toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(90, 84, 189, 0.9);
    color: white;
    padding: 10px 24px;
    border-radius: 10px;
    font-size: 0.82rem;
    z-index: 9999;
    backdrop-filter: blur(12px);
    animation: fadeInUp 0.4s ease-out;
    pointer-events: none;
  }
  @media (max-width: 768px) {
    .plan-market-insights {
      grid-template-columns: repeat(2, 1fr);
    }
  }
  @media (max-width: 480px) {
    .plan-market-insights {
      grid-template-columns: 1fr;
    }
  }

  /* ============================================
           SKIP NAVIGATION (Accessibility)
           ============================================ */
  .skip-nav {
    position: absolute;
    top: -50px;
    left: 0;
    background: var(--card-solid);
    color: white;
    padding: 10px 20px;
    z-index: 10001;
    font-size: 14px;
    font-weight: 600;
    border-radius: 0 0 8px 0;
    transition: top 0.2s ease;
    text-decoration: none;
  }
  .skip-nav:focus {
    top: 0;
    outline: 2px solid var(--primary);
    outline-offset: 2px;
  }

  /* ============================================
           HELPER TEXT (consistent class for form hints)
           ============================================ */
  .form-hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    line-height: 1.5;
  }

  /* ============================================
           FILE UPLOAD ZONES
           ============================================ */
  .file-upload-zone {
    border: 1.5px dashed rgba(255, 255, 255, 0.1);
    border-radius: var(--radius-sm);
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition:
      border-color var(--duration-fast),
      background var(--duration-fast);
    background: rgba(255, 255, 255, 0.02);
  }
  .file-upload-zone:hover,
  .file-upload-zone.drag-over {
    border-color: rgba(90, 84, 189, 0.5);
    border-style: solid;
    background: rgba(90, 84, 189, 0.06);
  }
  .file-upload-zone.file-upload-sm {
    padding: 14px;
  }
  .file-upload-icon {
    font-size: 28px;
    margin-bottom: 8px;
    opacity: 0.7;
  }
  .file-upload-text {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
  }
  .file-upload-hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .file-list {
    margin-top: 8px;
  }
  .file-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-sm);
    margin-bottom: 4px;
    font-size: 12px;
  }
  .file-item-name {
    font-weight: 600;
    color: var(--text-primary);
  }
  .file-item-size {
    color: var(--text-muted);
    margin-left: 8px;
  }
  .file-item-remove {
    color: var(--error);
    cursor: pointer;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
  }
  .file-item-remove:hover {
    background: rgba(231, 76, 60, 0.1);
  }
  .exact-input-wrap {
    margin-top: 8px;
    animation: fadeInUp 0.3s ease-out;
  }
  .section-optional-badge {
    display: inline-block;
    font-size: 9px;
    font-weight: 600;
    background: rgba(255, 255, 255, 0.06);
    color: var(--text-muted);
    padding: 2px 8px;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-left: 8px;
    vertical-align: middle;
  }

  /* ============================================
           GENERATION TIME ESTIMATE
           ============================================ */
  .gen-time-estimate {
    margin-top: 16px;
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .gen-time-estimate .gen-elapsed {
    font-weight: 700;
    color: var(--primary-light);
    font-variant-numeric: tabular-nums;
  }

  /* ============================================
           ENHANCED FOCUS INDICATORS (Accessibility)
           ============================================ */
  .btn:focus-visible {
    outline: 2px solid var(--primary);
    outline-offset: 3px;
  }

  .industry-card:focus-visible,
  .job-cat-card:focus-visible {
    outline: 2px solid var(--primary);
    outline-offset: 2px;
  }

  /* Make interactive cards keyboard-accessible */
  .industry-card,
  .job-cat-card {
    outline: none;
  }

  /* ============================================
           SCROLL REVEAL ANIMATION
           ============================================ */
  .reveal-on-scroll {
    opacity: 0;
    transform: translateY(24px);
    transition:
      opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1),
      transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .reveal-on-scroll.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ── Phase 2/3: Streaming text effect ── */
  .streaming-text .word {
    display: inline-block;
    opacity: 0;
    transform: translateY(6px);
    animation: stream-word 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  @keyframes stream-word {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* ── Phase 2/3: Page enter transition ── */
  .page-enter {
    animation: page-fade-in 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  /* NO transform on body -- breaks position:fixed children (chat widget) */
  @keyframes page-fade-in {
    from {
      opacity: 0;
    }
    to {
      opacity: 1;
    }
  }

  /* ── Phase 2/3: Progressive form experience ── */
  .form-group input,
  .form-group textarea,
  .form-group select {
    transition:
      border-color 0.25s cubic-bezier(0.4, 0, 0.2, 1),
      box-shadow 0.25s cubic-bezier(0.4, 0, 0.2, 1),
      background 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus {
    border-color: rgba(90, 84, 189, 0.6);
    box-shadow:
      0 0 0 3px rgba(90, 84, 189, 0.12),
      0 0 20px rgba(90, 84, 189, 0.05);
  }

  .form-group label {
    transition:
      color 0.2s ease,
      transform 0.2s ease;
  }

  .form-group:focus-within label {
    color: var(--primary-light);
    transform: translateX(2px);
  }

  .btn-primary {
    transition:
      background 0.25s ease,
      box-shadow 0.25s ease,
      transform 0.15s ease;
  }

  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  /* ── Recommended Strategy Decision Card ── */
  .plan-decision-card {
    background: rgba(90, 84, 189, 0.08);
    border: 1px solid rgba(90, 84, 189, 0.2);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 24px;
  }
  .plan-decision-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #5a54bd;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .plan-decision-text {
    font-size: 1rem;
