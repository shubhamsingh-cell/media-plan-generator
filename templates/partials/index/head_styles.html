    color: white;
    font-weight: 500;
    line-height: 1.4;
  }

  /* ── Copy Plan Button ── */
  .btn-copy-plan {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 10px;
    color: var(--text-secondary, #a1a1a1);
    font-size: 0.85rem;
    font-family: inherit;
    cursor: pointer;
    transition:
      background 0.2s,
      border-color 0.2s,
      color 0.2s;
  }
  .btn-copy-plan:hover {
    background: rgba(255, 255, 255, 0.1);
    border-color: rgba(255, 255, 255, 0.2);
    color: white;
  }

  .btn-open-sheets {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: rgba(15, 157, 88, 0.12);
    border: 1px solid rgba(15, 157, 88, 0.3);
    border-radius: 10px;
    color: #34a853;
    font-size: 0.85rem;
    font-family: inherit;
    cursor: pointer;
    text-decoration: none;
    font-weight: 500;
    transition:
      background 0.2s,
      border-color 0.2s,
      color 0.2s;
  }
  .btn-open-sheets:hover {
    background: rgba(15, 157, 88, 0.2);
    border-color: rgba(15, 157, 88, 0.5);
    color: #2e9e4b;
  }

  .btn-regenerate {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: transparent;
    border: 1px solid rgba(90, 84, 189, 0.4);
    border-radius: 10px;
    color: var(--primary-light);
    font-size: 0.85rem;
    font-family: inherit;
    cursor: pointer;
    transition:
      background 0.2s,
      border-color 0.2s,
      color 0.2s;
  }
  .btn-regenerate:hover {
    background: rgba(90, 84, 189, 0.1);
    border-color: rgba(90, 84, 189, 0.6);
    color: white;
  }

  /* Export dropdown */
  .export-dropdown-wrap {
    position: relative;
    display: inline-block;
  }
  .btn-export {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: rgba(107, 179, 205, 0.12);
    border: 1px solid rgba(107, 179, 205, 0.3);
    border-radius: 10px;
    color: #6bb3cd;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-export:hover {
    background: rgba(107, 179, 205, 0.2);
    border-color: rgba(107, 179, 205, 0.5);
    color: white;
  }
  .btn-export svg {
    flex-shrink: 0;
  }
  .export-dropdown-menu {
    display: none;

  /* ============================================
           AI CO-PILOT INLINE SUGGESTIONS
           ============================================ */
  .copilot-suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
    min-height: 0;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .copilot-suggestions.loading {
    opacity: 0.6;
  }
  .copilot-label {
    font-size: 11px;
    color: #6bb3cd;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 4px;
    width: 100%;
  }
  .copilot-label svg {
    width: 12px;
    height: 12px;
    flex-shrink: 0;
  }
  .copilot-chip {
    background: rgba(90, 84, 189, 0.12);
    border: 1px solid rgba(90, 84, 189, 0.25);
    border-radius: 16px;
    padding: 4px 12px;
    font-size: 12px;
    color: #a5b4fc;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    white-space: nowrap;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    position: relative;
  }
  .copilot-chip:hover {
    background: rgba(90, 84, 189, 0.25);
    transform: translateY(-1px);
    border-color: rgba(90, 84, 189, 0.5);
  }
  .copilot-chip:active {
    transform: translateY(0);
  }
  .copilot-chip.applied {
    background: rgba(90, 84, 189, 0.35);
    border-color: #5a54bd;
    color: #c7d2fe;
  }
  @keyframes copilot-fade-in {
    from {
      opacity: 0;
      transform: translateY(4px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  .copilot-chip {
    animation: copilot-fade-in 0.25s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  .copilot-chip:nth-child(2) {
    animation-delay: 0.05s;
  }
  .copilot-chip:nth-child(3) {
    animation-delay: 0.1s;
  }
  .copilot-chip:nth-child(4) {
    animation-delay: 0.15s;
  }
  .copilot-chip:nth-child(5) {
    animation-delay: 0.2s;
  }
  .copilot-chip:nth-child(6) {
    animation-delay: 0.25s;
  }
  @media (prefers-reduced-motion: reduce) {
    .copilot-chip {
      animation: none;
    }
    .copilot-suggestions {
      transition: none;
    }
  }

  /* ── Inline Nudge Bubbles ── */
  .copilot-nudge {
    display: none;
    margin-top: 8px;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 12px;
    line-height: 1.5;
    position: relative;
    animation: nudge-slide-in 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  .copilot-nudge.visible {
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .copilot-nudge .nudge-icon {
    flex-shrink: 0;
    width: 16px;
    height: 16px;
    margin-top: 1px;
  }
  .copilot-nudge .nudge-text {
    flex: 1;
  }

    display: block;
    font-size: 10px;
    opacity: 0.6;
    margin-top: 3px;

  .copilot-nudge .nudge-dismiss {
    position: absolute;
    top: 6px;
    right: 8px;
    background: none;
    border: none;
    color: inherit;
    opacity: 0.5;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 2px 4px;

  .copilot-nudge--clickable {
    cursor: pointer;
    transition:
      border-color 0.2s,
      background 0.2s,
      transform 0.15s;
  }
  .copilot-nudge--clickable:hover {
    border-color: rgba(90, 84, 189, 0.5);

  @keyframes nudge-slide-in {
    from {
      opacity: 0;
      transform: translateY(-4px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  @media (prefers-reduced-motion: reduce) {

      animation: none;
