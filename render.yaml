services:
  - type: web
    name: media-plan-generator
    runtime: python
    plan: standard  # Explicit plan declaration
    region: oregon
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python3 -c "import py_compile; py_compile.compile('app.py', doraise=True); py_compile.compile('wsgi.py', doraise=True)"
    startCommand: gunicorn --bind 0.0.0.0:$PORT --worker-class gevent --workers 4 --worker-connections 1000 --timeout 300 --preload --access-logfile - --error-logfile - wsgi:app
    healthCheckPath: /api/health/ping
    healthCheckGracePeriod: 300
    # Blue-green deploy gate: poll /api/deploy/ready in CI/CD scripts
    # to confirm the new instance has fully warmed up (KB loaded, caches primed).
    # Render uses healthCheckPath (/) for liveness; /api/deploy/ready is readiness.
    numInstances: 1
    envVars:
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: LOG_LEVEL
        value: INFO
      - key: RENDER
        value: "true"
      # --- Secrets (set via Render dashboard, not committed) ---
      - key: ADMIN_API_KEY
        sync: false  # Must be set in Render dashboard
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: SLACK_REFRESH_TOKEN
        sync: false
      - key: SLACK_CLIENT_ID
        sync: false
      - key: SLACK_CLIENT_SECRET
        sync: false
      - key: BLS_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: CAREERONESTOP_API_KEY
        sync: false
      - key: CAREERONESTOP_USER_ID
        sync: false
      - key: JOOBLE_API_KEY
        sync: false
      - key: ONET_USERNAME
        sync: false
      - key: ONET_PASSWORD
        sync: false
      - key: ONET_API_KEY
        sync: false
      - key: GEONAMES_USERNAME
        sync: false
      # --- Bureau of Economic Analysis (BEA) ---
      - key: BEA_API_KEY
        sync: false
      # --- Free LLM Providers (v3.1 LLM Router) ---
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      # --- Upstash Redis (L3 persistent cache) ---
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      # --- Email Alerts (Resend API) ---
      - key: RESEND_API_KEY
        sync: false
      - key: ALERT_EMAIL_TO
        sync: false
      # --- Slack Alerts (slack_alerts.py, slack_alerter.py, sentry_integration.py) ---
      - key: SLACK_WEBHOOK_URL
        sync: false
      # --- Slack Plan Notifications (slack_plan_notifier.py) ---
      - key: SLACK_PLAN_CHANNEL
        sync: false
      # --- Google Calendar Sync (calendar_sync.py) ---
      - key: GOOGLE_CALENDAR_CREDENTIALS
        sync: false
      - key: GOOGLE_CALENDAR_ID
        sync: false
      # --- USAJobs (Federal Job Listings) ---
      - key: USAJOBS_API_KEY
        sync: false
      - key: USAJOBS_EMAIL
        sync: false
      # --- US Census Bureau (Workforce Demographics) ---
      - key: CENSUS_API_KEY
        sync: false
      # --- TTS (ElevenLabs) ---
      - key: ELEVENLABS_API_KEY
        sync: false
    disk:
      name: media-plan-data
      mountPath: /data/persistent
      sizeGB: 1
