services:
  - type: web
    name: media-plan-generator
    runtime: python
    plan: starter  # Explicit plan declaration
    region: oregon
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python3 -c "import py_compile; py_compile.compile('app.py', doraise=True)"
    startCommand: python app.py
    healthCheckPath: /health
    healthCheckGracePeriod: 120
    numInstances: 1
    envVars:
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: LOG_LEVEL
        value: INFO
      # --- Secrets (set via Render dashboard, not committed) ---
      - key: ADMIN_API_KEY
        sync: false  # Must be set in Render dashboard
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: SLACK_REFRESH_TOKEN
        sync: false
      - key: SLACK_CLIENT_ID
        sync: false
      - key: SLACK_CLIENT_SECRET
        sync: false
      - key: BLS_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: CAREERONESTOP_API_KEY
        sync: false
      - key: CAREERONESTOP_USER_ID
        sync: false
      - key: JOOBLE_API_KEY
        sync: false
      - key: ONET_USERNAME
        sync: false
      - key: ONET_PASSWORD
        sync: false
      - key: GEONAMES_USERNAME
        sync: false
      # --- Free LLM Providers (v3.1 LLM Router) ---
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      # --- Upstash Redis (L3 persistent cache) ---
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      # --- Email Alerts (Resend API) ---
      - key: RESEND_API_KEY
        sync: false
      - key: ALERT_EMAIL_TO
        sync: false
      # --- TTS (ElevenLabs) ---
      - key: ELEVENLABS_API_KEY
        sync: false
    disk:
      name: media-plan-data
      mountPath: /data/persistent
      sizeGB: 1
