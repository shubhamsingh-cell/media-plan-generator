<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <!-- Primary brand gradient -->
    <linearGradient id="nova-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5A54BD"/>
      <stop offset="100%" stop-color="#6BB3CD"/>
    </linearGradient>

    <!-- Subtle glow for the spark -->
    <radialGradient id="nova-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#6BB3CD" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#6BB3CD" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#6BB3CD" stop-opacity="0"/>
    </radialGradient>

    <!-- Glow filter for the star spark -->
    <filter id="nova-spark-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Soft outer glow for the rounded square -->
    <filter id="nova-outer-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feFlood flood-color="#5A54BD" flood-opacity="0.25" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip path for the rounded square -->
    <clipPath id="nova-clip">
      <rect x="12" y="12" width="104" height="104" rx="24"/>
    </clipPath>
  </defs>

  <!-- Background rounded square with gradient -->
  <rect x="12" y="12" width="104" height="104" rx="24" fill="url(#nova-grad)" filter="url(#nova-outer-glow)"/>

  <!-- Subtle inner highlight (glassmorphism effect) -->
  <rect x="12" y="12" width="104" height="52" rx="24" fill="white" opacity="0.08" clip-path="url(#nova-clip)"/>

  <!-- The N letterform: geometric, modern, slightly stylized -->
  <path d="
    M 42 88
    L 42 40
    L 50 40
    L 78 76
    L 78 40
    L 86 40
    L 86 88
    L 78 88
    L 50 52
    L 50 88
    Z
  " fill="white" opacity="0.95"/>

  <!-- Nova spark / starburst at top-right corner of the N -->
  <!-- This is a four-pointed star with a bright center dot -->
  <g filter="url(#nova-spark-glow)" transform="translate(86, 36)">
    <!-- Vertical ray -->
    <line x1="0" y1="-10" x2="0" y2="10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Horizontal ray -->
    <line x1="-10" y1="0" x2="10" y2="0" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Diagonal rays: shorter, thinner for 8-point star feel -->
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
    <!-- Center bright dot -->
    <circle cx="0" cy="0" r="2.5" fill="white"/>
    <!-- Outer glow ring -->
    <circle cx="0" cy="0" r="6" fill="url(#nova-glow)" opacity="0.5"/>
  </g>

  <!-- Small secondary sparkle at bottom-left of N for balance -->
  <g transform="translate(42, 88)" opacity="0.4">
    <line x1="0" y1="-4" x2="0" y2="4" stroke="white" stroke-width="1" stroke-linecap="round"/>
    <line x1="-4" y1="0" x2="4" y2="0" stroke="white" stroke-width="1" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="1.5" fill="white"/>
  </g>
</svg>
