<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="grad-left" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#8B7FF5"/>
      <stop offset="100%" stop-color="#6C5CE7"/>
    </linearGradient>
    <linearGradient id="grad-diag" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B8ACF6"/>
      <stop offset="100%" stop-color="#6C5CE7"/>
    </linearGradient>
    <linearGradient id="grad-right" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#8B7FF5"/>
      <stop offset="100%" stop-color="#6C5CE7"/>
    </linearGradient>
  </defs>

  <!-- N = left vertical + diagonal (top-left to bottom-right) + right vertical -->
  <!-- Mercor-style thick rounded strokes with transparency overlap -->

  <!-- Left vertical stroke -->
  <line x1="28" y1="95" x2="28" y2="25" stroke="url(#grad-left)" stroke-width="15" stroke-linecap="round" opacity="0.85"/>

  <!-- Diagonal stroke: top-left down to bottom-right -->
  <line x1="28" y1="25" x2="92" y2="95" stroke="url(#grad-diag)" stroke-width="15" stroke-linecap="round" opacity="0.65"/>

  <!-- Right vertical stroke -->
  <line x1="92" y1="95" x2="92" y2="25" stroke="url(#grad-right)" stroke-width="15" stroke-linecap="round" opacity="0.85"/>
</svg>
